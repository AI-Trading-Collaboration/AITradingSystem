<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Trading System 数据流总览</title>
  <desc id="desc">从外部数据和配置输入，到本地缓存、数据质量门禁、市场特征、每日评分、仓位建议、日报与回测输出的系统流程示意图。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2f3a45" />
    </marker>
    <style>
      .bg { fill: #f7f9fb; }
      .title { fill: #1e2a36; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #5a6775; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 15px; }
      .lane-title { fill: #263442; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .box-title { fill: #14212d; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .box-text { fill: #3f4d5c; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 13px; }
      .small-text { fill: #536170; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 12px; }
      .line { fill: none; stroke: #2f3a45; stroke-width: 2.1; marker-end: url(#arrow); }
      .soft-line { fill: none; stroke: #73808f; stroke-width: 1.7; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .danger-line { fill: none; stroke: #b5473f; stroke-width: 2.1; marker-end: url(#arrow); }
      .lane { fill: #ffffff; stroke: #d7dee7; stroke-width: 1.2; rx: 8; }
      .input { fill: #eaf3ff; stroke: #8bb8eb; stroke-width: 1.4; rx: 8; }
      .cache { fill: #edf8f2; stroke: #8bc59d; stroke-width: 1.4; rx: 8; }
      .gate { fill: #fff5df; stroke: #d9a64f; stroke-width: 1.6; rx: 8; }
      .work { fill: #eef0ff; stroke: #9aa7e8; stroke-width: 1.4; rx: 8; }
      .output { fill: #f0f9fb; stroke: #7cb9c5; stroke-width: 1.4; rx: 8; }
      .stop { fill: #fff0ed; stroke: #cf756b; stroke-width: 1.5; rx: 8; }
      .govern { fill: #f4f1fb; stroke: #a592cc; stroke-width: 1.3; rx: 8; }
      .badge { fill: #263442; rx: 6; }
      .badge-text { fill: #ffffff; font-family: Arial, sans-serif; font-size: 11px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760" />
  <text class="title" x="54" y="58">AI Trading System 数据流总览</text>
  <text class="subtitle" x="54" y="86">所有评分、回测和报告必须先通过数据质量门禁；默认解释区间为 ChatGPT 后 AI 主线行情（ai_after_chatgpt）。</text>

  <rect class="lane" x="40" y="120" width="1200" height="515" />
  <text class="lane-title" x="64" y="152">主链路：从数据输入到结论输出</text>

  <rect class="input" x="70" y="188" width="190" height="110" />
  <text class="box-title" x="92" y="220">外部数据源</text>
  <text class="box-text" x="92" y="248">Yahoo Finance</text>
  <text class="box-text" x="92" y="270">FRED 利率数据</text>

  <rect class="input" x="70" y="335" width="190" height="150" />
  <text class="box-title" x="92" y="367">项目配置</text>
  <text class="box-text" x="92" y="395">universe / portfolio</text>
  <text class="box-text" x="92" y="417">data_quality / features</text>
  <text class="box-text" x="92" y="439">scoring_rules</text>
  <text class="box-text" x="92" y="461">market_regimes / risk_events</text>

  <rect class="input" x="70" y="515" width="190" height="80" />
  <text class="box-title" x="92" y="547">交易 Thesis</text>
  <text class="box-text" x="92" y="575">data/external/trade_theses</text>

  <rect class="cache" x="325" y="188" width="185" height="110" />
  <text class="box-title" x="348" y="220">下载与缓存</text>
  <text class="box-text" x="348" y="248">aits download-data</text>
  <text class="box-text" x="348" y="270">data/raw/*.csv</text>

  <rect class="gate" x="575" y="188" width="210" height="110" />
  <text class="box-title" x="599" y="220">数据质量门禁</text>
  <text class="box-text" x="599" y="248">aits validate-data</text>
  <text class="box-text" x="599" y="270">schema / freshness / 异常值</text>

  <rect class="work" x="850" y="155" width="185" height="105" />
  <text class="box-title" x="872" y="187">市场特征</text>
  <text class="box-text" x="872" y="215">aits build-features</text>
  <text class="box-text" x="872" y="237">features_daily.csv</text>

  <rect class="work" x="850" y="305" width="185" height="125" />
  <text class="box-title" x="872" y="337">每日评分</text>
  <text class="box-text" x="872" y="365">趋势 / 宏观流动性</text>
  <text class="box-text" x="872" y="387">风险情绪 / 占位项</text>
  <text class="box-text" x="872" y="409">scores_daily.csv</text>

  <rect class="output" x="1090" y="155" width="120" height="105" />
  <text class="box-title" x="1112" y="187">日报结论</text>
  <text class="box-text" x="1112" y="215">仓位区间</text>
  <text class="box-text" x="1112" y="237">数据质量状态</text>

  <rect class="output" x="1090" y="305" width="120" height="125" />
  <text class="box-title" x="1112" y="337">回测报告</text>
  <text class="box-text" x="1112" y="365">CAGR / 回撤</text>
  <text class="box-text" x="1112" y="387">基准对比</text>
  <text class="box-text" x="1112" y="409">市场阶段</text>

  <rect class="stop" x="575" y="365" width="210" height="90" />
  <text class="box-title" x="600" y="397">门禁失败</text>
  <text class="box-text" x="600" y="425">停止下游输出</text>
  <text class="box-text" x="600" y="447">生成质量报告</text>

  <rect class="govern" x="325" y="365" width="185" height="120" />
  <text class="box-title" x="348" y="397">结构校验</text>
  <text class="box-text" x="348" y="425">watchlist validate</text>
  <text class="box-text" x="348" y="447">industry-chain validate</text>
  <text class="box-text" x="348" y="469">risk-events validate</text>

  <rect class="govern" x="325" y="515" width="185" height="80" />
  <text class="box-title" x="348" y="547">假设复核</text>
  <text class="box-text" x="348" y="575">thesis validate / review</text>

  <rect class="output" x="575" y="515" width="210" height="80" />
  <text class="box-title" x="600" y="547">Thesis 报告</text>
  <text class="box-text" x="600" y="575">假设是否仍成立 / 证伪触发</text>

  <rect class="badge" x="590" y="172" width="44" height="18" />
  <text class="badge-text" x="599" y="185">GATE</text>
  <rect class="badge" x="865" y="139" width="50" height="18" />
  <text class="badge-text" x="874" y="152">M1</text>
  <rect class="badge" x="865" y="289" width="50" height="18" />
  <text class="badge-text" x="874" y="302">M2</text>

  <path class="line" d="M260 243 L325 243" />
  <path class="line" d="M510 243 L575 243" />
  <path class="line" d="M785 225 C820 225 820 207 850 207" />
  <path class="line" d="M1035 207 L1090 207" />
  <path class="line" d="M942 260 L942 305" />
  <path class="line" d="M1035 367 L1090 367" />
  <path class="line" d="M785 255 C830 255 820 367 850 367" />
  <path class="danger-line" d="M680 298 L680 365" />
  <path class="soft-line" d="M260 410 L325 410" />
  <path class="soft-line" d="M510 425 C625 500 760 500 872 430" />
  <path class="soft-line" d="M260 555 L325 555" />
  <path class="soft-line" d="M510 555 L575 555" />

  <rect class="lane" x="40" y="665" width="1200" height="62" />
  <text class="lane-title" x="64" y="704">输出解释要求</text>
  <text class="small-text" x="210" y="704">报告必须说明：数据质量是否通过、哪些评分来自硬数据、哪些模块仍是占位、仓位口径、回测区间和市场阶段。</text>
</svg>
