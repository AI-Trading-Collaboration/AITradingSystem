schema_version: "1.0"
campaign_id: "b3-slow-tilt-signal-precheck"
program_id: "weight-research-v1"
title: "B3 slow-tilt signal-direction precheck"
market_regime: "ai_after_chatgpt"
requested_date_range: "2022-12-01..2025-04-30"
hypothesis:
  statement: >
    Slow tilt may add signal-level directional information after redesign, but
    current evidence is mixed and must not produce weights before signal quality
    is repaired.
  expected_gain:
    - "signal_direction_improvement"
  expected_failure_modes:
    - "wrong_tilt_direction"
    - "lagged_signal"
    - "noise_dominant"
module_graph:
  baseline: "b0-static"
  modules:
    - "slow-tilt-b3"
  allowed_mechanisms:
    - "slow_tilt"
  forbidden_mechanisms:
    - "risk_signal"
    - "exposure_scaler"
    - "confidence_shrinkage"
    - "regime_filter"
    - "p0_mixed_allocator"
  allowed_interaction_order: 1
window_policy:
  development_catalog: "b3-development-v1"
  diagnostic_catalog: "b3-diagnostic-v1"
  holdout_catalog: "b3-holdout-v1"
  holdout_access: "FINAL_GATE_ONLY"
scorecard_policy: "signal-only-precheck-v1"
evidence_budget:
  max_mini_rounds: 1
  max_targeted_rounds: 1
  max_window_expansions: 0
  max_redesign_rounds: 1
  max_needs_more_evidence_occurrences: 1
stop_rules:
  - code: "RETURN_TO_DESIGN_IF_SIGNAL_DIRECTION_WRONG"
  - code: "BLOCK_COMBO_BACKFILL_UNTIL_SIGNAL_PRECHECK_PASS"
safety:
  research_only: true
  manual_review_only: true
  official_target_weights: false
  paper_shadow_allowed: false
  broker_effect: "none"
  order_effect: "none"
  production_effect: "none"
