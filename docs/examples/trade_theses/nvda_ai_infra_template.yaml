    description: 数据中心收入和订单能否继续支撑 AI GPU 需求。
    evidence_source: manual_earnings_review
    expected_direction: growth_remains_strong
    latest_status: pending
    updated_at: 2026-05-01
  - metric_id: cloud_capex
    description: 云厂商 CapEx 指引是否继续支持 AI 基建周期。
    evidence_source: manual_capex_tracking
    expected_direction: capex_not_cut
    latest_status: pending
    updated_at: 2026-05-01
falsification_conditions:
  - condition_id: capex_cut
    description: 云厂商 CapEx 指引大幅下修且管理层确认 AI 需求放缓。
    severity: high
    triggered: false
  - condition_id: inventory_build
    description: AI 芯片需求从供不应求转为明显库存积压。
    severity: critical
    triggered: false
risk_events:
  - risk_id: export_controls
    level: L2
    description: 出口限制升级可能影响部分区域收入。
    action: reduce_position_if_revenue_guidance_changes
    active: false
    updated_at: 2026-05-01
review_frequency: weekly
status: draft
notes: >
