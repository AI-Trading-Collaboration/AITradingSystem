thesis_id: nvda_ai_infra_2026_q2
ticker: NVDA
direction: long
created_at: 2026-05-01
time_horizon: medium
position_scope: core_ai_bucket
entry_reason:
  - AI 基础设施需求仍在扩大，GPU/ASIC 需求链条尚未被证伪。
  - 数据中心收入、云厂商 CapEx 和推理需求仍是需要持续验证的核心变量。
ai_chain_nodes:
