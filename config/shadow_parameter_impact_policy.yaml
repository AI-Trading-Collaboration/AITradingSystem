policy_id: shadow_parameter_impact_policy
version: 1
status: pilot_baseline
owner: system
production_effect: none
rationale: >
  First-pass observe-only policy for comparing shadow parameter observations
  against the current production baseline in paper trading, continuous replay,
  and paper signal quality artifacts.
intended_effect: >
  Prevent short-term paper PnL or sparse samples from being interpreted as
  evidence that shadow parameters should affect production.
validation_evidence: TRADING-008 unit tests and ongoing paper-only observation.
review_condition: >
  Revisit thresholds after enough production and shadow forward samples exist
  in the ai_after_chatgpt regime and before any use beyond diagnostics.
thresholds:
  minimum_shadow_sample_count: 7
  minimum_production_baseline_count: 7
  minimum_filled_count_for_comparison: 3
  maximum_synthetic_snapshot_ratio: 0.25
  minimum_historical_ohlc_coverage: 0.70
  minimum_reconciliation_pass_ratio: 0.90
confidence_buckets:
  - bucket: missing
    label: missing_confidence
  - bucket: low
    min_inclusive: 0.0
    max_exclusive: 0.5
  - bucket: medium
    min_inclusive: 0.5
    max_exclusive: 0.7
  - bucket: high
    min_inclusive: 0.7
    max_exclusive: 0.85
  - bucket: very_high
    min_inclusive: 0.85
    max_inclusive: 1.0
