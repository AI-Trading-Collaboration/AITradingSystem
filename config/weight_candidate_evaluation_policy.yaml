policy_id: weight_candidate_evaluation_policy
version: 1
status: pilot_baseline
owner: system
production_effect: none
rationale: >
  First-pass observe-only policy for evaluating generated weight adjustment
  candidates against already-produced paper signal quality, shadow impact, and
  continuous replay evidence without changing production weights.
intended_effect: >
  Keep weight candidates reviewable while preventing sparse samples, weak
  execution quality, higher synthetic snapshot usage, worse drawdown, higher
  exposure, or higher concentration from being interpreted as production
  promotion evidence.
validation_evidence: TRADING-016 unit tests and ongoing observe-only daily review.
review_condition: >
  Revisit thresholds after enough forward paper/shadow/replay evidence exists
  in the ai_after_chatgpt regime and before any promotion workflow is designed.
thresholds:
  minimum_paper_signal_sample_count: 7
  minimum_shadow_sample_count: 7
  minimum_production_baseline_count: 7
  maximum_synthetic_snapshot_ratio: 0.25
  minimum_historical_ohlc_coverage: 0.70
  minimum_reconciliation_pass_ratio: 0.90
  minimum_max_drawdown_delta: 0.0
  maximum_exposure_delta: 0.0
  maximum_concentration_delta: 0.0
required_validations:
  - aits validate-data
  - paper_signal_quality_gate
  - shadow_parameter_impact_gate
  - continuous_portfolio_replay
  - weight_adjustment_candidate_gate
  - manual_owner_review
safety_boundaries:
  manual_approval_required: true
  allow_production_profile_write: false
  allow_daily_dashboard_main_conclusion_change: false
  allow_trade_trigger: false
  allow_ibkr_call: false
  allow_paper_runner: false
  allow_replay_runner: false
