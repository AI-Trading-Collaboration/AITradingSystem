prices:
  # 默认阈值用于股票和 ETF。波动率指数的单日变化天然更大，
  # 因此必须显式配置 ticker 级别覆盖，而不是放宽所有标的。
  max_stale_calendar_days: 7
  suspicious_daily_return_abs: 0.20
  extreme_daily_return_abs: 0.50
  suspicious_adjustment_ratio_change_abs: 0.25
  # 默认研究窗口为 ChatGPT 后 AI 主线行情。早于该日期的复权比例、
  # adjusted close 波动和跨源一致性差异不阻断默认日报质量门禁。
  consistency_start_date: 2022-12-01
  # 价格指数没有真实成交量。此处必须显式列出，缺 volume 只作为
  # 可审计信息记录，不计入数据质量警告。
  volume_optional_tickers:
    - "^VIX"
  # 已核验 corporate action。复权比例跳变只有匹配到这些事件和比例时
  # 才会从 warning 降为可审计信息；未匹配事件继续提示调查。
  known_split_match_window_days: 5
  known_split_ratio_tolerance_abs: 0.08
  known_split_events:
    NVDA:
      - effective_date: 2024-06-10
        ratio: 10
        source_name: NVIDIA 2024 Stock Split FAQ
        source_url: https://investor.nvidia.com/files/doc_downloads/2024/06/nvidia-2024-stock-split_faq_investors.pdf
        note: "NVIDIA common stock began trading split-adjusted at market open."
    AVGO:
      - effective_date: 2024-07-15
        ratio: 10
        source_name: Broadcom fiscal 2024 second quarter results press release
        source_url: https://investors.broadcom.com/news-releases/news-release-details/broadcom-inc-announces-second-quarter-fiscal-year-2024-financial
        note: "Broadcom common stock began trading on a split-adjusted basis at market open."
    LRCX:
      - effective_date: 2024-10-03
        ratio: 10
        source_name: Lam Research stock split press release
        source_url: https://newsroom.lamresearch.com/2024-05-21-Lam-Research-Corporation-Announces-10-Billion-Share-Repurchase-Authorization-and-a-10-for-1-Stock-Split
        note: "Lam Research common stock began trading on a post-split basis at market open."
    SMH:
      - effective_date: 2023-05-05
        ratio: 2
        source_name: VanEck Semiconductor ETF share split press release
        source_url: https://www.vaneck.com/us/en/press-releases/smh-vaneck-semiconductor-etf-share-split-press-release.pdf
        note: "VanEck Semiconductor ETF split-adjusted trading date."
    SOXX:
      - effective_date: 2024-03-07
        ratio: 3
        source_name: OCC information memo 53942 for SOXX split
        source_url: https://www.miaxglobal.com/sites/default/files/alert-files/SOXX_Split_53942.pdf
        note: "iShares Semiconductor ETF split effective date."
  # 第二来源核验使用同一组阈值：raw close 超阈值会阻塞；
  # adjusted close 若仅因分红复权口径不同而 raw close 对齐，则输出警告。
  secondary_source_min_overlap_ratio: 0.80
  secondary_source_adj_close_warning_pct: 0.01
  secondary_source_adj_close_error_pct: 0.05
  # 第二行情源只做核验和告警。其自身坏行必须记录，但在主价格源通过时
  # 不阻断默认日报；真实主源/二源 raw close 冲突仍由 reconciliation 阻断。
  secondary_source_self_check_fail_closed: false
  secondary_source_excluded_tickers:
    - "^VIX"
  ticker_return_threshold_overrides:
    "^VIX":
      suspicious_daily_return_abs: 1.00
      extreme_daily_return_abs: 2.00

rates:
  max_stale_calendar_days: 7
  min_plausible_value: -1.0
  max_plausible_value: 25.0
  suspicious_daily_change_abs: 0.75
  extreme_daily_change_abs: 2.00
  # 与价格一致性窗口保持一致；早于默认 AI 研究窗口的宏观单日变化
  # 不阻断或提示默认日报。
  consistency_start_date: 2022-12-01
  series_overrides:
    DTWEXBGS:
      # Federal Reserve H.10 usually releases the prior business week's daily
      # dollar indexes on Monday afternoon U.S. time, so the latest value can
      # naturally exceed the default daily-rate freshness window.
      max_stale_calendar_days: 14
      min_plausible_value: 0.0
      max_plausible_value: 250.0
      suspicious_daily_change_abs: 2.0
      extreme_daily_change_abs: 5.0
