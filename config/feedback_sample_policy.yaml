version: feedback_sample_policy_v2
status: pilot
owner: system
market_regime_id: ai_after_chatgpt
effective_from: 2026-05-16
rationale: "把 feedback / shadow / promotion 样本下限拆成 reporting、pilot、diagnostic、promotion 四层；当前 pilot 允许用已积累样本启动诊断和候选复核，但 promotion floor 仍保持较高门槛，避免低样本直接影响 production 权重、规则或仓位 gate。"
validation: "由 tests/test_market_feedback_optimization.py、tests/test_decision_outcomes.py、tests/test_prediction_ledger.py、tests/test_feedback_loop_review.py 和 GOV-004 heuristic audit 覆盖；真实 2026-05-14 validation maturity 已验证低样本仅进入 READY_FOR_WEIGHT_DIAGNOSTIC_REVIEW。"
review_after_reports: 8
notes:
  - "当前处于市场反馈优化 pilot 阶段，样本较少时允许启动复盘、因果链和候选规则整理。"
  - "pilot floor 只允许生成诊断和候选复核，不允许晋级 production 权重、规则或仓位 gate。"
  - "2026-05-16 按 owner 要求将 diagnostic floor 下调到当前已积累 outcome 样本刚好可启动后续验证；promotion floor 不下调。"
  - "如果后续周度报告显示节奏过快或噪声过高，提高 pilot floor 或延长 review_after_reports。"
decision_outcomes:
  reporting_floor: 1
  pilot_floor: 5
  diagnostic_floor: 14
  promotion_floor: 60
prediction_outcomes:
  reporting_floor: 1
  pilot_floor: 2
  diagnostic_floor: 13
  promotion_floor: 30
governance:
  reporting_allows:
    - "只读展示 outcome 覆盖和 freshness。"
  pilot_allows:
    - "生成 causal chain、learning queue、rule experiment 候选和 pilot 复盘。"
    - "允许启动 as-if replay 或 forward shadow 的候选准备。"
  diagnostic_allows:
    - "允许输出 weight diagnostics 和候选 overlay 设计。"
  promotion_requires:
    - "达到 promotion floor。"
    - "完成 as-if replay、forward shadow、owner approval 和回滚条件登记。"
