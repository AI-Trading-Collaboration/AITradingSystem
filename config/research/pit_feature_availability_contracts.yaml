  macro_liquidity_indicator.macro_liquidity.DTWEXBGS.return_20d:
    <<: *macro_calendar
  market_stress_indicator.risk_sentiment.VIX.vix_current:
    <<: *price_trend_risk
  market_stress_indicator.risk_sentiment.VIX.vix_percentile_252:
    <<: *price_trend_risk
  market_stress_indicator.risk_sentiment.VIX.return_5d:
    <<: *price_trend_risk
  valuation_crowding_indicator.valuation.AI_CORE_MEDIAN.valuation_percentile:
    <<: *valuation_snapshot
  valuation_crowding_indicator.valuation.AI_CORE.overheated_snapshot_ratio:
    <<: *valuation_snapshot
  policy_geopolitics_risk_indicator.POLICY_GEOPOLITICS.active_or_watch_l3_count.count:
    <<: *macro_calendar
  policy_geopolitics_risk_indicator.POLICY_GEOPOLITICS.active_or_watch_l2_count.count:
    <<: *macro_calendar
  policy_geopolitics_risk_indicator.POLICY_GEOPOLITICS.minimum_exposure_multiplier.multiplier:
    <<: *macro_calendar
  confidence_reliability_indicator.confidence.score_components.source_type_confidence:
    <<: *manual_review
  confidence_reliability_indicator.confidence.manual_review.failure_or_warning:
    <<: *manual_review
  data_quality_gate_indicator.data_quality.cached_market_macro_data.validate_data_status:
    <<: *manual_review
    feature_family: data_quality
    source:
      - aits_validate_data
      - cache_catalog
      - data_refresh_audit
    fail_closed_rule: run aits validate-data first and stop on failure
    repair_strategy: repair cached market/macro data quality gate before any downstream report
    owner: data_governance
  thesis_manual_review_indicator.thesis.trade_theses.validation_status:
    <<: *manual_review
    source:
      - trade_theses
  portfolio_limit_indicator.portfolio.max_total_ai_exposure.configured_limit:
    <<: *manual_review
    feature_family: configuration
    source:
      - portfolio_positions_snapshot
      - portfolio_limit_config
  portfolio_limit_indicator.portfolio.concentration.ai_exposure_bucket:
    <<: *manual_review
    feature_family: configuration
    source:
      - portfolio_positions_snapshot
      - portfolio_limit_config
  execution_deadband_indicator.execution.position_change.minimum_action_delta:
    <<: *manual_review
    feature_family: configuration
    source:
      - scoring_rules_config
      - execution_policy_config
