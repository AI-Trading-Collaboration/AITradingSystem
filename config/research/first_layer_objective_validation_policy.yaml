schema_version: first_layer_objective_validation_policy.v1
policy_id: first_layer_objective_validation_policy_v1
owner: research_governance
status: pilot_contract
rationale: >
  Convert TRADING-2270 first-layer failure evidence and TRADING-2271 proxy
  coverage blockers into an explicit objective / validation contract before
  any challenger experiment or promotion interpretation.
intended_effect: >
  Define the first-layer validation target in auditable terms: false risk-on/off
  costs, drawdown warning lead time, recovery delay days, regime flip penalty,
  benchmark consistency score and stress slice minimum requirements.
validation_evidence: >
  Focused tests cover objective term generation, stress-slice blocker handling,
  proxy replacement blocker propagation and fixed safety fields.
review_condition: >
  Review before TRADING-2273 challenger experiments and before any first-layer
  output is interpreted as validation-ready or promotion evidence.
market_regime: ai_after_chatgpt
requested_window:
  start: "2022-12-01"
  end: latest
data_quality_expected_price_tickers:
  - QQQ
  - SPY
  - SMH
objective_terms:
  false_risk_on_cost:
    definition: >
      Count and later severity-weight cases where first-layer risk-on /
      constructive signals precede weak forward return or drawdown breach.
    measurement_source: first_layer_failure_taxonomy.failure_type.false_risk_on.event_count
    direction: minimize
    validation_role: primary_downside_cost
    promotion_interpretation: diagnostic_contract_only_not_promotion
  false_risk_off_cost:
    definition: >
      Count and later opportunity-cost-weight cases where first-layer risk-off /
      defensive signals miss positive forward returns.
    measurement_source: first_layer_failure_taxonomy.failure_type.false_risk_off.event_count
    direction: minimize
    validation_role: missed_upside_cost
    promotion_interpretation: diagnostic_contract_only_not_promotion
  drawdown_warning_lead_time:
    definition: >
      Minimum signal-day lead time required before drawdown breach; late
      risk-off events show cases that fail this warning objective.
    measurement_source: policy.minimum_warning_lead_days plus late_risk_off.event_count
    direction: maximize_lead_time_and_minimize_late_events
    validation_role: drawdown_warning_objective
    promotion_interpretation: diagnostic_contract_only_not_promotion
    minimum_warning_lead_days: 5
  recovery_delay_days:
    definition: >
      Maximum signal-day delay allowed after recovery threshold; late risk-on
      events show cases that fail this recovery objective.
    measurement_source: policy.maximum_recovery_delay_days plus late_risk_on.event_count
    direction: minimize_delay_and_late_events
    validation_role: recovery_reentry_objective
    promotion_interpretation: diagnostic_contract_only_not_promotion
    maximum_recovery_delay_days: 5
  regime_flip_penalty:
    definition: >
      Penalize excessive first-layer signal-class flips using normalized flips
      per 20 observations from the current-state signal summary.
    measurement_source: first_layer_failure_taxonomy.signal_summary.regime_flip_rate_per_20_observations
    direction: minimize
    validation_role: stability_penalty
    promotion_interpretation: diagnostic_contract_only_not_promotion
  benchmark_consistency_score:
    definition: >
      Require failure behavior to be measured consistently across core
      QQQ/SPY/SMH benchmarks without imputing optional IWM/RSP coverage.
    measurement_source: benchmark_consistency_report.summary.benchmark_consistency_score
    direction: maximize
    validation_role: cross_benchmark_consistency_check
    promotion_interpretation: diagnostic_contract_only_not_promotion
    minimum_core_benchmark_count: 3
  stress_slice_minimum_requirements:
    definition: >
      Require every configured regime slice, including the 2022 bear /
      rate-shock stress comparison, to meet minimum signal coverage before
      stress validation can be claimed.
    measurement_source: first_layer_current_state_summary.regime_slices
    direction: satisfy_all_required_slices
    validation_role: stress_and_regime_coverage_gate
    promotion_interpretation: diagnostic_contract_only_not_promotion
stress_slice_minimum_requirements:
  minimum_signal_observations: 60
  required_coverage_status: SIGNAL_COVERED
  required_slice_ids:
    - 2022_bear_rate_shock
    - 2023_recovery
    - 2024_ai_concentration
    - 2025_2026_trial_like_window
  primary_ai_conclusion_slice_ids:
    - 2023_recovery
    - 2024_ai_concentration
    - 2025_2026_trial_like_window
  stress_validation_requires_2022_signal_coverage: true
proxy_replacement_policy:
  true_breadth_required_for_model_ready_breadth: true
  price_proxy_can_replace_true_breadth: false
  listing_snapshot_can_replace_true_breadth: false
  unverified_holdings_gate_can_replace_true_breadth: false
safety_boundary:
  research_only: true
  actual_path_required: true
  target_path_metrics_role: diagnostic_only
  primary_window_validated: false
  reopen_gate_allowed: false
  validation_ready: false
  promotion_allowed: false
  paper_shadow_allowed: false
  production_allowed: false
  broker_action: none
  production_effect: none
