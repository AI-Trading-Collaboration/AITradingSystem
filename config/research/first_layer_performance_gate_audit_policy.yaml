schema_version: first_layer_performance_gate_audit_policy.v1
policy_id: first_layer_performance_gate_audit_policy_v1
status: pilot_baseline
owner: research_governance
policy_metadata:
  rationale: >
    Audit whether current first-layer performance gates add marginal utility to
    full two-layer actual-path outcomes instead of only filtering candidates by
    local first-layer diagnostics.
  intended_effect: >
    Compare no_gate, relaxed_gate, current_gate and strict_gate counterfactual
    acceptance decisions for each current performance gate using existing
    actual-path rows from frozen second-layer probes.
  validation_evidence: >
    Focused tests cover gate acceptance, utility classification, rejected
    candidate counterfactuals, artifact writing and CLI registration.
  review_condition: >
    Review before changing active first-layer coverage-aware selection rules or
    moving any gate from hard stop to owner review.
actual_path_utility_proxy:
  status: pilot_diagnostic_only
  formula: >
    average_probe_annual_return * return_weight
    - average_abs_max_drawdown * drawdown_penalty_weight
    - average_probe_turnover * turnover_penalty_weight
  return_weight: 1.0
  drawdown_penalty_weight: 0.75
  turnover_penalty_weight: 0.00025
  rationale: >
    Only actual-path annual return, daily-equity drawdown and turnover are
    available for every first-layer policy x frozen second-layer probe row.
    The score is a diagnostic comparison proxy, not a validated utility
    boundary.
marginal_utility_thresholds:
  positive_delta_min: 0.005
  neutral_abs_delta_max: 0.005
  material_opportunity_cost_min: 0.01
gate_modes:
  coverage_pass_rule:
    failure_mode_reduced: late_window_only_or_2023_plus_overfit
  actual_path_improved_probe_count_min:
    failure_mode_reduced: weak_or_non_general_actual_path_improvement
  no_major_regression_in_defensive_probe:
    failure_mode_reduced: defensive_or_drawdown_control_regression
  net_of_cost_not_worse:
    failure_mode_reduced: turnover_or_cost_drag_hidden_by_gross_return
  2022_slice_not_worse_than_flat_reference:
    failure_mode_reduced: stress_recovery_slice_regression
  same_risk_comparison_reported:
    failure_mode_reduced: same_risk_frontier_blind_spot
safety_boundary:
  research_only: true
  actual_path_required: true
  target_path_metrics_role: diagnostic_only
  active_policy_change_allowed: false
  promotion_allowed: false
  paper_shadow_allowed: false
  production_allowed: false
  broker_action: none
  dynamic_promotion_status: BLOCKED
