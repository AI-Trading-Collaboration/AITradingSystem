schema_version: indicator_family_registry.v1
policy_id: indicator_family_registry_v1
status: INDICATOR_FAMILY_REGISTRY_READY
owner: research_governance
policy_metadata:
  rationale: >
    Audit indicator family action value before fitting combined first-layer
    models, so weak, PIT-blocked or beta-only families do not enter an opaque
    composite.
  intended_effect: >
    Make family-level PIT, label, channel and blocked-usage boundaries
    reviewable.
  validation_evidence: >
    Indicator family ablation evidence runner and guardrail tests verify
    required family coverage, PIT gates, channel selection boundaries and
    diagnostic-only output.
  review_condition: >
    Review before adding a family to a combined model or using ablation output
    as candidate evidence.
families:
  - family_name: trend_persistence
    description: QQQ trend persistence and moving-average continuation proxies.
    features:
      - qqq_momentum_20d
      - qqq_momentum_60d
      - qqq_momentum_120d
      - qqq_ma_slope_20_60
      - qqq_ma_slope_60_120
      - qqq_above_ma60_duration_60d
      - qqq_trend_consistency_60d
      - qqq_pullback_contained_above_ma60
    PIT_required: true
    earliest_available_date: "2021-02-22"
    window_coverage:
      primary_window: exact_three_asset_validated
      legacy_window: legacy_research_window_2022_12
      sensitivity_window: exact_three_asset_primary_only_extension
    allowed_labels:
      - do_not_de_risk
      - stay_constructive
      - return_seeking_diagnostic
    allowed_channels:
      - return_seeking_diagnostic
    blocked_channels:
      - add_risk
      - allocation
      - production
      - broker
    blocked_usage:
      - direct_weight
      - promotion
      - production
      - broker
  - family_name: relative_strength
    description: QQQ relative confirmation against cash and leverage consistency.
    features:
