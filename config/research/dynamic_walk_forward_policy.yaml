schema_version: 2
policy_id: dynamic_walk_forward_validation_policy_v2
status: pilot_baseline
owner: research_governance
market_regime:
  regime_id: unified_primary_2021
  anchor_date: 2021-02-22
  default_backtest_start: 2021-02-22
policy_metadata:
  rationale: >
    Dynamic strategy candidates must be reviewed outside the single full-sample
    actual-path result before any paper-shadow preflight discussion.
  intended_effect: >
    Surface one-window, rank-instability, and static-baseline underperformance
    risks while keeping dynamic promotion blocked.
  validation_evidence: >
    TRADING-1361 to 1400 tests cover split construction, actual-path-only
    metrics, verdict generation, matrix output, and blocked promotion status.
  review_condition: >
    Review before changing split dates, stability thresholds, rolling-window
    length, or using this policy outside research-only owner review.
validation_splits:
  - split_id: research_sample
    start_date: 2021-02-22
    end_date: 2023-12-29
    purpose: hypothesis_generation_and_debug
  - split_id: validation_sample
    start_date: 2024-01-02
    end_date: 2024-12-31
    purpose: strategy_selection
  - split_id: historical_seen_2025_sample
    start_date: 2025-01-02
    end_date: 2025-12-31
    purpose: historical_seen_evaluation
    prior_market_outcome_visibility: KNOWN
    unbiased_oos_claim_allowed: false
  - split_id: recent_pre_freeze_diagnostic
    start_date: 2026-01-02
    end_date: 2026-07-20
    purpose: recent_known_diagnostic_only
    include_in_primary_fold_ranking: false
  - split_id: prospective_untouched_holdout
    start_date: 2026-07-22
    end_date: 2027-07-21
    purpose: outcome_blind_final_acceptance_only
    access_allowed: false
    result_consumption_allowed: false
rolling_policy:
  window_trading_days: 126
  step_trading_days: 63
  rationale: >
    Half-year windows with quarterly step provide a pilot OOS stability view
    without pretending to calibrate production-ready acceptance thresholds.
stability_thresholds:
  min_completed_splits_for_stable: 3
  top_half_rate_for_stable: 0.75
  max_rank_std_for_stable: 1.25
  min_positive_split_rate_for_stable: 0.75
  min_baseline_beat_rate_for_full_allocation: 0.5
  rationale: >
    Pilot baseline thresholds require broad top-half ranking, positive split
    behavior, and at least half of completed splits beating qqq_60_sgov_40
    before labeling a candidate stable. These thresholds are not calibrated
    promotion gates and must be reviewed before paper-shadow preflight.
safety_boundary:
  production_effect: none
  broker_action: none
  promotion_allowed: false
  paper_shadow_allowed: false
  production_allowed: false
  manual_review_required: true
  research_only: true
  observe_only: true
