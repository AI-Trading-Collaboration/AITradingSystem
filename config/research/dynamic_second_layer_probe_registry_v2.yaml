schema_version: dynamic_second_layer_probe_registry.v2
policy_id: dynamic_second_layer_probe_registry_v2
status: frozen_research_baseline
owner: research_governance
policy_metadata:
  rationale: >
    First-layer action-value labels require a frozen second-layer dynamic probe
    set. This registry freezes the next probe library before any additional
    first-layer label, feature, model or threshold calibration.
  intended_effect: >
    Provide defensive, balanced, return-seeking, no-TQQQ, low-TQQQ, QQQ-heavy
    and risk-on diagnostic probes under the primary 2021-02-22 research window.
  validation_evidence: >
    Guardrail tests verify required probe families, trend sensitivity, long-only
    weights, sum-to-one weights, TQQQ caps, diagnostic-only restrictions and
    disabled promotion/broker usage.
  review_condition: >
    Review before changing any weight map, entry rule, TQQQ cap, readiness
    status rule, or allowing this library outside research-only action-value
    label generation.
research_window:
  research_window_id: exact_three_asset_validated
  research_window_alias: EXACT_THREE_ASSET_VALIDATED_WINDOW
  requested_start: 2021-02-22
  actual_start: 2021-02-22
  actual_portfolio_start: 2021-02-22
  window_role: primary_validated
  data_quality_contract: secondary_cross_checked
trend_states:
  - risk_off
  - defensive
  - neutral
  - constructive
  - risk_on
freeze_readiness_policy:
  policy_id: second_layer_probe_freeze_readiness_policy_v1
  owner: research_governance
  status: pilot_baseline
  rationale: >
    The policy classifies probes for first-layer action-value use after actual-path
    metrics, same-risk frontier comparison and TQQQ stress review are available.
  intended_effect: >
    Keep weak or diagnostic probes out of promotion/watch interpretation while
    allowing valid probes to serve as frozen action-value label generators.
  validation_evidence: >
    Classification is tested against registry constraints and generated readiness
    artifacts; zero-delta comparisons use exact metric signs rather than hidden
    subjective margins.
  review_condition: >
    Revisit after owner review of the v2 freeze pack or before any v3 probe
    registry is introduced.
  low_tqqq_cap: 0.10
  diagnostic_tqqq_cap: 0.20
  stress_worst_5d_floor: -0.12
  stress_max_drawdown_floor: -0.18
  same_risk_required_for_approved: true
probes:
  - probe_id: defensive_overlay_probe
    role: defensive_overlay
    role_tags:
      - defensive_overlay
    return_seeking: false
    trend_sensitive: true
    frozen: true
    tqqq_usage: none
    research_only: true
    watch_candidate_allowed: false
    promotion_enabled: false
    broker_enabled: false
    allowed_usage:
      - first_layer_action_value_labels
      - defensive_overlay_diagnostic
    blocked_usage:
      - promotion_universe
      - paper_shadow
      - production
      - broker_order
    weights_by_trend_state:
      risk_off: {QQQ: 0.30, SGOV: 0.70, TQQQ: 0.00}
      defensive: {QQQ: 0.45, SGOV: 0.55, TQQQ: 0.00}
      neutral: {QQQ: 0.60, SGOV: 0.40, TQQQ: 0.00}
      constructive: {QQQ: 0.65, SGOV: 0.35, TQQQ: 0.00}
      risk_on: {QQQ: 0.65, SGOV: 0.35, TQQQ: 0.00}
