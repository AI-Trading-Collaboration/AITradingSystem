schema_version: 1
policy_id: expanded_allocation_universe_v1
status: pilot_baseline
owner: research_governance
market_regime:
  regime_id: ai_after_chatgpt
  anchor_date: 2022-11-30
  default_backtest_start: 2022-12-01
policy_metadata:
  rationale: >
    The prior limited_adjustment actual-path strategy only explored two QQQ/SGOV
    allocations. This policy opens a reproducible QQQ/SGOV/TQQQ research universe
    while keeping promotion blocked until TQQQ data quality, stress risk, same-risk
    baselines, walk-forward, and owner review pass.
  intended_effect: >
    Produce static simplex frontier and state-to-portfolio research candidates
    without allowing TQQQ or expanded dynamic results into production/promotion.
  validation_evidence: >
    TRADING-1506 to 1525 focused tests validate grid generation, actual-path-only
    ranking, monotonic risk classification, TQQQ research-only gating, and promotion
    blocked safety fields.
  review_condition: >
    Review before increasing TQQQ promotion candidate caps, adding finer grids,
    using random sampling for candidate selection, or enabling paper-shadow preflight.
asset_universe:
  risk_asset:
    - QQQ
  cash_defensive_asset:
    - SGOV
  leveraged_growth_asset:
    - TQQQ
data_quality:
  expected_rate_series:
    - DGS2
    - DGS10
    - DTWEXBGS
  tqqq_formal_review_required: true
  tqqq_default_research_status: TQQQ_RESEARCH_ONLY_APPROVED
  tqqq_promotion_status: TQQQ_DATA_QUALITY_BLOCKING_REVIEW_REQUIRED
exploration_weight_constraints:
  min_weight:
    QQQ: 0.0
    SGOV: 0.0
    TQQQ: 0.0
  max_weight:
    QQQ: 1.0
    SGOV: 1.0
    TQQQ: 1.0
  sum_to_one: true
  allow_short: false
  allow_external_leverage: false
promotion_candidate_constraints:
  max_weight:
    TQQQ: 0.2
  max_qqq_equivalent_exposure:
    formula: QQQ + 3 * TQQQ
    soft_cap: 1.2
    hard_cap: 1.5
  min_sgov_weight_when_tqqq_positive: 0.2
  require_stress_pass: true
  require_net_of_cost_pass: true
grid_levels:
  coarse:
    step: 0.1
    purpose: first_pass_frontier_scan
  medium:
    step: 0.05
    purpose: main_static_baseline_search
  fine:
    step: 0.025
    purpose: local_refinement_around_frontier
backtest_policy:
  rebalance_frequency: monthly
  annualization_trading_days: 252
  starting_value: 1.0
  transaction_cost_bps: 0.0
  default_start_date: 2022-12-01
  target_path_role: diagnostic_only
  actual_path_required: true
risk_buckets:
  - bucket_id: defensive
    min_qqq_equivalent_exposure: 0.0
    max_qqq_equivalent_exposure: 0.4
  - bucket_id: low_risk
    min_qqq_equivalent_exposure: 0.4
    max_qqq_equivalent_exposure: 0.7
  - bucket_id: normal_equity
    min_qqq_equivalent_exposure: 0.7
    max_qqq_equivalent_exposure: 1.0
  - bucket_id: aggressive
    min_qqq_equivalent_exposure: 1.0
    max_qqq_equivalent_exposure: 1.3
  - bucket_id: leveraged_aggressive
    min_qqq_equivalent_exposure: 1.3
    max_qqq_equivalent_exposure: 1.6
  - bucket_id: extreme_research_only
    min_qqq_equivalent_exposure: 1.6
    max_qqq_equivalent_exposure: 99.0
risk_bucket_selector:
  max_drawdown_cap_for_return_selector: -0.25
  representatives:
    - highest_sharpe
    - lowest_drawdown
    - highest_calmar
    - highest_return_under_max_dd_cap
    - lowest_turnover
state_mapping_policy:
  states:
    - risk_off
    - defensive
    - neutral
    - constructive
    - risk_on
  preferred_bucket_by_state:
    risk_off: defensive
    defensive: low_risk
    neutral: normal_equity
    constructive: aggressive
    risk_on: leveraged_aggressive
  default_require_monotonic_for_promotion: true
limited_adjustment_baseline:
  risk_off:
    QQQ: 0.45
    SGOV: 0.55
    TQQQ: 0.0
  defensive:
    QQQ: 0.45
    SGOV: 0.55
    TQQQ: 0.0
  neutral:
    QQQ: 0.65
    SGOV: 0.35
    TQQQ: 0.0
  constructive:
    QQQ: 0.65
    SGOV: 0.35
    TQQQ: 0.0
  risk_on:
    QQQ: 0.65
    SGOV: 0.35
    TQQQ: 0.0
trend_state_policy:
  short_ma_window: 50
  long_ma_window: 200
  realized_vol_window: 20
  vol_quantile_window: 252
  drawdown_window: 126
  high_vol_quantile: 0.8
  low_vol_quantile: 0.35
  risk_off_drawdown_threshold: -0.12
  defensive_drawdown_threshold: -0.06
  constructive_drawdown_floor: -0.04
random_sampling:
  enabled: true
  methods:
    - dirichlet
    - latin_hypercube
  first_pass_sample_count: 500
  refinement_sample_count: 2000
  seed_required: true
  default_seed: 1506
promotion_guardrail:
  dynamic_promotion_status: BLOCKED
  paper_shadow_allowed: false
  production_allowed: false
  broker_action: none
  owner_review_required: true
  target_path_metrics_role: diagnostic_only
actual_path_rebacktest:
  best_static_frontier_candidate_count: 5
survival_policy:
  positive_edge_floor: 0.0
  max_drawdown_worse_tolerance_abs: 0.02
  tqqq_beta_only_exposure_floor: 1.3
survival_verdicts:
  - SURVIVES_EXPANDED_UNIVERSE
  - STATIC_FRONTIER_DOMINATES
  - TQQQ_BETA_ONLY
  - RISK_TOO_HIGH
  - NO_MATERIAL_IMPROVEMENT
  - INSUFFICIENT_EVIDENCE
