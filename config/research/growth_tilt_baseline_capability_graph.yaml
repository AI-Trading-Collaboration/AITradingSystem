schema_version: growth_tilt_baseline_capability_graph_config.v1
graph_id: growth_tilt_baseline_capability_graph_v1
status: REVIEWED_READ_ONLY_INVENTORY
owner: research_governance
as_of: '2026-07-10'
market_regime: ai_after_chatgpt
source_task_id: TRADING-2438N2

policy_metadata:
  rationale: >
    Inventory only the runtime and governed capabilities that the current
    growth-tilt baseline actually exposes. Candidate discovery must not create
    a missing baseline capability in order to make a candidate name executable.
  intended_effect: >
    Separate capability readiness from candidate-mutation readiness and route
    N3 only when at least one capability passes every contract-first gate.
  validation_evidence:
    - docs/research/growth_tilt_owner_mapping_inventory.md
    - docs/research/growth_tilt_baseline_contract_adapters_readiness.md
    - docs/research/growth_tilt_replacement_candidate_contract.md
  review_condition: >
    Review after an independent baseline change alters a producer, consumption
    path, PIT lineage, hard-veto aggregate, transition, exposure scalar,
    replay binding, metric contract or mutable-dimension approval.

allowed_capability_types:
  - SIGNAL
  - DECISION_REQUEST
  - PERSISTENCE_RULE
  - HARD_VETO
  - REGIME_TRANSITION
  - EXPOSURE_SCALAR
  - EXPOSURE_CAP
  - RAMP_RULE
  - COOLDOWN_RULE
  - EXPIRY_RULE
  - METRIC
  - REPLAY_RUNNER

allowed_readiness_statuses:
  - READY
  - BLOCKED
  - DIAGNOSTIC_ONLY
  - NOT_APPLICABLE

allowed_edge_relations:
  - PRODUCES
  - CONSUMED_BY
  - GUARDED_BY
  - REQUESTS
  - APPLIES
  - CAPS
  - MEASURED_BY
  - REPLAYED_BY
  - SUPERSEDES

mutation_ready_gate:
  callable: true
  consumed_by_baseline: true
  pit_lineage_status: VALID
  semantics_approved: true
  explicit_missing_policy_required: true
  runner_binding_required: true
  mutable_dimension_count_minimum: 1
  required_dependency_status: READY
  callable_but_unconsumed_allowed: false
  diagnostic_only_allowed: false
  not_applicable_allowed: false

