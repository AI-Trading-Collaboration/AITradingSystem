schema_version: "1.0"
policy_id: controlled_strategy_research_next_stage_775_794
status: next_stage_controlled_baseline
owner: research_governance
heuristic_policy_version: controlled_strategy_next_stage_heuristic_v1
base_config_path: config/research/controlled_strategy_candidate_research.yaml
market_regime:
  regime_id: ai_after_chatgpt
  anchor_event: ChatGPT public launch on 2022-11-30
  default_start: "2022-12-01"
production_effect: none
rationale: >
  Continue only the value surface line after controlled strategy batch 1,
  audit utility-ranking sensitivity, track append-only forward evidence
  maturity, pivot GBDT by design, run residual diagnostics, and keep regret
  state-machine expansion gated until enough cases exist. This policy does not
  validate utility boundaries and does not permit promotion, paper-shadow,
  production weight, or broker changes.
controlled_scope:
  validation_only: true
  observe_only: true
  promotion_gate_allowed: false
  paper_shadow_change_allowed: false
  production_weight_change_allowed: false
  broker_action: none
value_surface_expansion:
  task_id: TRADING-775
  max_decision_dates: 72
  benchmark_required: true
  negative_controls_required: true
  gross_net_turnover_drawdown_required: true
  cluster_policy:
    unclassified_cluster: unclassified
    static_clusters:
      broad_market:
        - SPY
        - QQQ
      ai_semiconductors:
        - SMH
        - NVDA
        - AMD
        - TSM
      ai_platforms:
        - MSFT
        - GOOGL
  regime_segments:
    - segment_id: ai_after_chatgpt_full
      start_date: "2022-12-01"
      end_date: null
    - segment_id: recent_controlled_window
      trailing_decision_dates: 24
  horizon_smoothness:
    audit_only: true
    adjacent_delta_materiality_bps: 100
    rationale: >
      Materiality is an owner-review sorting threshold for sensitivity audit
      only; it is not a pass/fail promotion threshold and cannot validate a
      utility boundary.
utility_boundary_audit:
  task_id: TRADING-776
  status_cap: SENSITIVITY_TESTED
  validated_boundary_allowed: false
  dominance_share_review_floor: 0.65
  rationale: >
    Profiles decompose return, risk, cost, and uncertainty effects on ranking.
    Profile reversals are expected evidence for owner review, not automatic
    calibration or promotion evidence.
  utility_profiles:
    - profile_id: return_only
      expected_return_weight: 1.0
      median_return_weight: 0.0
      downside_risk_weight: 0.0
      cost_weight: 0.0
      uncertainty_weight: 0.0
    - profile_id: return_minus_cost
      expected_return_weight: 1.0
      median_return_weight: 0.0
      downside_risk_weight: 0.0
      cost_weight: 1.0
      uncertainty_weight: 0.0
    - profile_id: risk_adjusted
      expected_return_weight: 1.0
      median_return_weight: 0.0
      downside_risk_weight: 0.5
      cost_weight: 1.0
      uncertainty_weight: 0.0
    - profile_id: balanced_transparent
      expected_return_weight: 0.6
      median_return_weight: 0.2
      downside_risk_weight: 0.5
      cost_weight: 1.0
      uncertainty_weight: 0.1
    - profile_id: uncertainty_penalized
      expected_return_weight: 0.6
      median_return_weight: 0.2
      downside_risk_weight: 0.5
      cost_weight: 1.0
      uncertainty_weight: 0.5
  pareto_components:
    reward: expected_return
    risk: downside_risk
    cost: estimated_cost
    uncertainty: uncertainty
forward_evidence_maturity:
  task_id: TRADING-777
  append_only_outcome_policy: true
  horizons:
    - horizon_id: 1d
      days: 1
    - horizon_id: 5d
      days: 5
    - horizon_id: 10d
      days: 10
    - horizon_id: 20d
      days: 20
    - horizon_id: 60d
      days: 60
  required_artifact_families:
    - benchmark_expansion
    - control_audit
    - value_surface_controlled_expansion
    - candidate_outputs
gbdt_pivot_review:
  task_id: TRADING-778
  no_local_parameter_tuning: true
  design_only: true
  pivot_options:
    - option_id: gbdt_action_ranking_classifier
      target: action_rank_bucket
      rationale: Predict action ranking instead of noisy scalar utility.
    - option_id: gbdt_regret_type_classifier
      target: regret_type
      rationale: Predict failure mode diagnostics for value surface cases.
    - option_id: gbdt_state_transition_predictor
      target: state_transition
      rationale: Estimate controlled state transition probability.
    - option_id: gbdt_value_surface_residual_model
      target: value_surface_residual
      rationale: Explain residuals after transparent value surface policy.
regret_casebook_expansion_gate:
  task_id: TRADING-779
  status_cap: WATCHLIST
  activation_allowed_without_gate_pass: false
  minimum_case_count: 50
  minimum_distinct_regret_types: 4
  required_conditions:
    - regret_case_count_floor_met
    - regret_type_distribution_stable
    - teacher_oracle_diagnostic_difference_present
    - value_surface_failure_cases_attributed
value_surface_warning_triage:
  task_id: TRADING-780
  allowed_decisions:
    - CONTINUE
    - WATCHLIST
    - DATA_REQUIRED
    - PAUSE
    - KILL
  continue_requires:
    horizon_leakage_check_pass: true
    negative_control_promotion_count: 0
    benchmark_comparison_present: true
    action_horizon_surface_present: true
  sample_concentration_review_share: 0.50
  warning_categories:
    - category_id: data_quality_warning
      source_field: data_quality_status
      warning_when_not: PASS
      severity: review
    - category_id: utility_boundary_unvalidated
      source_field: not_validated_utility_boundary
      warning_when: true
      severity: blocking_for_promotion
    - category_id: forward_evidence_immature
      source_field: ledger_event_count
      warning_when_below: 5
      severity: review
    - category_id: sample_concentration
      source_field: max_group_share
      warning_when_above: 0.50
      severity: review
    - category_id: horizon_smoothness_material_pairs
      source_field: material_pair_count
      warning_when_above: 0
      severity: diagnostic
utility_ranking_robustness:
  task_id: TRADING-781
  status_cap: SENSITIVITY_TESTED
  validated_boundary_allowed: false
  pareto_stability_review_floor: 0.50
  diagnostic_only_when_reversal_count_above: 0
forward_evidence_continuity:
  task_id: TRADING-782
  minimum_ledger_events_for_continue: 5
  missing_archive_allowed: false
  append_only_required: true
  required_output_families:
    - benchmark_expansion
    - control_audit
    - value_surface_controlled_expansion
gbdt_pivot_selection:
  task_id: TRADING-783
  model_training_allowed: false
  selected_direction: gbdt_value_surface_residual_model
  rationale: >
    Start with residual diagnostics because it keeps the transparent value
    surface as the primary object and avoids another direct scalar utility
    regression.
  direction_details:
    - direction_id: gbdt_regret_type_classifier
      minimum_viable_experiment: classify_top_value_surface_failure_cases_by_regret_type
      required_data: value_surface_failure_cases_with_regret_taxonomy
      failure_mode: regret_labels_sparse_or_unstable
      kill_criteria: regret_type_precision_below_simple_frequency_baseline
      difference_from_previous_action_utility_model: predicts_failure_mode_not_scalar_utility
    - direction_id: gbdt_state_transition_predictor
      minimum_viable_experiment: predict_next_controlled_state_from_pit_state_features
      required_data: state_transition_casebook_with_forward_maturity
      failure_mode: state_transitions_too_rare_or_hysteresis_dominated
      kill_criteria: transition_recall_below_static_state_baseline
      difference_from_previous_action_utility_model: predicts_transition_probability_not_action_return
    - direction_id: gbdt_value_surface_residual_model
      minimum_viable_experiment: explain_residual_between_value_surface_rank_and_forward_outcome
      required_data: matured_value_surface_rows_with_benchmark_disagreement
      failure_mode: residuals_are_noise_or_follow_single_cost_return_component
      kill_criteria: residual_rank_information_not_above_simple_component_baseline
      difference_from_previous_action_utility_model: models_surface_error_after_transparent_policy
    - direction_id: gbdt_action_ranking_classifier
      minimum_viable_experiment: classify_top_action_bucket_with_time_ordered_split
      required_data: matured_action_horizon_rows_with_stable_action_labels
      failure_mode: action_labels_flip_under_utility_profile_changes
      kill_criteria: rank_top1_accuracy_below_buy_and_hold_or_cash_baseline
      difference_from_previous_action_utility_model: predicts_rank_bucket_not_continuous_utility
regret_activation_inputs:
  task_id: TRADING-784
  minimum_value_surface_losing_cases: 25
  minimum_benchmark_disagreement_cases: 15
  minimum_false_risk_off_or_missed_upside_cases: 10
  minimum_distinct_regret_types: 4
  oracle_teacher_required_for_activation: true
value_surface_walk_forward_expansion:
  task_id: TRADING-785
  allowed_decisions:
    - CONTINUE
    - WATCHLIST
    - DATA_REQUIRED
    - PAUSE
    - KILL
  max_window_count: 6
  min_decision_dates_per_window: 6
  continue_min_window_win_rate: 0.50
  continue_min_mean_delta_vs_benchmark_bps: 0
  sample_concentration_review_share: 0.50
  rationale: >
    Walk-forward thresholds are controlled-review sorting rules only. They are
    not validated investment boundaries and cannot allow promotion or
    paper-shadow.
utility_pareto_ranking_review:
  task_id: TRADING-786
  status_cap: SENSITIVITY_TESTED
  validated_boundary_allowed: false
  horizon_cliff_abs_utility_bps: 100
  rationale: >
    Ranking flip and horizon cliff checks identify heuristic utility fragility.
    They cannot upgrade the boundary to VALIDATED_BOUNDARY.
forward_evidence_daily_continuity_review:
  task_id: TRADING-787
  minimum_ledger_events_for_continuity_review: 5
  missing_archive_allowed: false
  append_only_required: true
  required_output_families:
    - benchmark_expansion
    - control_audit
    - value_surface_controlled_expansion
  rationale: >
    Forward evidence continuity is an accumulation tracker. Early continuity
    warnings are not paper-shadow readiness evidence.
gbdt_value_surface_residual_diagnostic:
  task_id: TRADING-788
  large_residual_abs_return_floor_bps: 200
  feature_importance_method: categorical_residual_separation
  strategy_signal_generated: false
  rationale: >
    The residual diagnostic can generate hypotheses about where the transparent
    value surface fails, but it does not directly generate strategy actions.
regret_casebook_activation_recheck:
  task_id: TRADING-789
  minimum_value_surface_losing_cases: 25
  minimum_benchmark_disagreement_cases: 15
  minimum_oracle_teacher_better_cases: 1
  minimum_distinct_regret_types: 4
  expansion_execution_allowed: false
  rationale: >
    This recheck only decides whether a follow-up regret casebook expansion
    task should be opened. It does not expand the casebook by itself.
value_surface_failure_attribution:
  task_id: TRADING-790
  top_losing_case_count: 25
  tail_loss_quantile: 0.10
  concentration_review_share: 0.50
  rationale: >
    Attribution explains why high beat rate can still produce negative average
    benchmark delta. Tail and concentration thresholds are diagnostic sorting
    rules, not promotion gates or validated risk boundaries.
horizon_cliff_stabilization_review:
  task_id: TRADING-791
  status_cap: SENSITIVITY_TESTED
  validated_boundary_allowed: false
  ranking_jump_review_floor: 2
  horizon_cliff_abs_utility_bps: 100
  single_horizon_action_review_share: 0.80
  rationale: >
    Horizon cliff and ranking stabilization review can suggest smoothing or
    Pareto direction, but cannot validate utility boundaries.
gbdt_residual_hypothesis_triage:
  task_id: TRADING-792
  hypothesis_candidate_limit: 10
  repair_rule_candidates:
    - tail-loss filter
    - horizon smoothing
    - regime-conditioned utility
    - cost-aware action suppression
    - drawdown-sensitive ranking
  rationale: >
    Residual triage turns diagnostic residual concentration into reviewable
    hypotheses. It does not train or deploy a GBDT strategy.
forward_evidence_continuity_extension:
  task_id: TRADING-793
  minimum_ledger_events_for_extension_review: 5
  missing_archive_allowed: false
  append_only_required: true
  rationale: >
    Continuity extension keeps forward evidence running. It does not decide
    current strategy validity or paper-shadow readiness.
value_surface_direction_review:
  task_id: TRADING-794
  allowed_decisions:
    - CONTINUE_LOCAL_FIX
    - WATCHLIST
    - PIVOT_TO_REGIME_CONDITIONED_VALUE_SURFACE
    - PIVOT_TO_PARETO_FRONTIER_POLICY
    - PIVOT_TO_TAIL_RISK_FILTER
    - KILL_CURRENT_VALUE_SURFACE_VERSION
  tail_loss_pivot_share: 0.50
  horizon_cliff_pivot_floor: 10
  broad_loss_group_share_ceiling: 0.35
  kill_mean_delta_floor_bps: -500
  rationale: >
    Direction review must not default to continuing. Negative benchmark-relative
    delta, tail loss concentration, horizon cliffs, and broad distribution risk
    decide whether to local-fix, watchlist, pivot, or kill the current version.
