benchmarks:
  - strategy_id: 100_qqq
    display_name: 100% QQQ
    candidate_role: primary_benchmark
    candidate_type: benchmark
    target_weights: {QQQ: 1.00}
    rebalance_frequency: monthly
  - strategy_id: qqq_60_sgov_40
    display_name: 60% QQQ + 40% SGOV
    candidate_role: secondary_benchmark
    candidate_type: benchmark
    target_weights: {QQQ: 0.60, SGOV: 0.40}
    rebalance_frequency: monthly
  - strategy_id: qqq_50_sgov_50
    display_name: 50% QQQ + 50% SGOV
    candidate_role: secondary_benchmark
    candidate_type: benchmark
    target_weights: {QQQ: 0.50, SGOV: 0.50}
    rebalance_frequency: monthly
  - strategy_id: equal_risk_qqq_sgov
    display_name: equal-risk QQQ / SGOV
    candidate_role: defensive_primary
    candidate_type: defensive_comparator
    target_weights: {QQQ: 0.50, SGOV: 0.50}
    rebalance_frequency: monthly
    special_policy: equal_risk
  - strategy_id: dyn_tqqq_capped_trend
    display_name: dyn TQQQ capped trend
    candidate_role: existing_challenger
    candidate_type: existing_challenger
    risk_on_weights: {TQQQ: 0.33, SGOV: 0.67}
    risk_off_weights: {QQQ: 0.20, SGOV: 0.80}
    rebalance_frequency: daily
    special_policy: trend_gated_leverage
