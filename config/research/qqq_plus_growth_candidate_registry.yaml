  - period_id: 2024
    start: 2024-01-01
    end: 2024-12-31
  - period_id: 2025_to_latest
    start: 2025-01-01
    end: latest
  - period_id: pre_2020
    start: 2012-01-01
    end: 2019-12-31
  - period_id: post_2020
