schema_version: 1
policy_id: qqq_plus_growth_candidate_registry_v1
policy_metadata:
  owner: system
  status: pilot_baseline
  rationale: >
    Establish a separate QQQ-plus growth challenger research line after
    equal_risk_qqq_sgov became the defensive primary forward-aging candidate.
  intended_effect: >
    Search QQQ/TQQQ/SGOV growth candidates that may outperform 100% QQQ while
    preserving explicit risk, turnover, leverage and regime-concentration
    checks.
  validation_evidence: >
    Focused tests and CLI smoke cover objective contract, registry review,
    candidate searches, ranking, period split, drawdown replay, edge review,
    risk budget, role allocation, watchlist and owner decision artifacts.
  review_condition: >
    Review after real cached QQQ/TQQQ/SGOV data passes validate-data and the
    owner reviews whether any growth challenger deserves forward-aging watchlist
    inclusion.
market_regime:
  regime_id: unified_primary_2021
  anchor_date: 2022-11-30
  anchor_event: ChatGPT public launch
  default_backtest_start: 2021-02-22
safety_boundary:
  production_effect: none
  broker_action: none
  promotion_allowed: false
  paper_shadow_allowed: false
  production_allowed: false
  manual_review_required: true
  research_only: true
  observe_only: true
  uses_options: false
  uses_margin: false
  max_tqqq_weight: 0.40
  max_effective_qqq_exposure: 1.80
research_policy:
  annualization_trading_days: 252
  monthly_trading_days: 21
  required_price_tickers:
    - QQQ
    - TQQQ
    - SGOV
  required_rate_series:
    - DGS2
    - DGS10
    - DTWEXBGS
  moving_average_windows:
    short: 100
    long: 200
  realized_vol_windows:
    short: 20
    medium: 60
    long: 120
  rolling_high_windows:
    long: 252
  equal_risk:
    min_weight: 0.10
    max_weight: 0.90
  objective_contract:
    policy_id: qqq_outperformance_objective_contract_v1
    primary_benchmark: 100_qqq
    secondary_benchmarks:
      - qqq_60_sgov_40
      - qqq_50_sgov_50
      - equal_risk_qqq_sgov
      - static_tqqq_sgov_baselines
    annual_return_edge_min: 0.01
    annual_return_edge_material: 0.02
    max_drawdown_multiplier_vs_qqq: 1.10
    turnover_acceptability_limit: 3.00
    max_regime_win_concentration: 0.60
    max_complexity_penalty: 0.30
    minimum_period_observations: 40
    rationale: >
      The 1%-2% annual return edge is a pilot research hurdle from the owner
      brief. It is not calibrated as a statistical boundary and must be reviewed
      before any promotion-like interpretation.
  edge_significance:
    annual_return_weight: 1.00
    calmar_weight: 0.02
    sharpe_weight: 0.01
    drawdown_penalty_weight: 0.50
    turnover_penalty_weight: 0.01
    tqqq_path_dependency_penalty_weight: 0.25
    complexity_penalty_weight: 0.25
    material_score_threshold: 0.015
    weak_score_threshold: 0.005
    rationale: >
      These weights create a pilot composite score for review prioritization.
      They are not calibrated promotion thresholds and must be revisited before
      any paper-shadow or production interpretation.
  complexity_penalties:
    benchmark: 0.00
    volatility_targeted_qqq_tqqq_sgov: 0.30
    drawdown_guarded_growth_allocation: 0.30
    trend_gated_tqqq_overlay: 0.25
    tqqq_weighted_candidate: 0.15
    other_growth: 0.10
    rationale: >
      Pilot descriptive penalties reflect review burden and path-dependency
      risk. They are ranking aids only, not promotion gates.
  period_stability:
    minimum_win_ratio: 0.50
    regime_concentration_period_ids:
      - 2023
      - 2024
      - ai_rally
    rationale: >
      A candidate needs wins in more than half of valid periods and must not
      derive every winning period from the AI-rally subset.
  drawdown_replay:
    high_tqqq_average_weight: 0.20
    recovery_episode_ids:
      - 2023_recovery
      - 2024_ai_rally
    rationale: >
      Drawdown replay flags candidates whose TQQQ exposure remains elevated
      during stress or whose risk-on recovery lags QQQ in designated recovery
      episodes.
  risk_budget:
    beta_heavy_beta_threshold: 1.05
    positive_return_threshold: 0.00
    rationale: >
      The beta-heavy flag separates true policy edge from mostly higher QQQ
      beta when total annual return is positive.
  candidate_limits:
    max_tqqq_weight: 0.40
    max_effective_qqq_exposure: 1.80
    max_growth_watchlist_size: 2
  trend_gated_policy:
    volatility_percentile_window: 252
    volatility_percentile_cutoff: 0.80
    drawdown_warning_threshold: -0.05
    drawdown_block_threshold: -0.10
    drawdown_defensive_threshold: -0.15
  volatility_targeted_search:
    target_vol:
      - 0.15
      - 0.18
      - 0.20
      - 0.22
      - 0.25
    realized_vol_window:
      - 20
      - 60
      - 120
    max_tqqq_weight:
      - 0.10
      - 0.20
      - 0.30
      - 0.40
    min_sgov_weight:
      - 0.00
      - 0.10
      - 0.20
    rebalance:
      - monthly
      - threshold
    threshold_rebalance_band: 0.05
  drawdown_guarded_policy:
    reduce_tqqq_threshold: -0.05
    zero_tqqq_threshold: -0.10
    defensive_mode_threshold: -0.15
    restore_signal:
      - qqq_above_100dma
      - qqq_above_200dma
periods:
