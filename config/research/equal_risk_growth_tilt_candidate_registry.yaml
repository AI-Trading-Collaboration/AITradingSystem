    trend_filter_rule: qqq_strong_trend_gap_trigger
    volatility_filter_rule: realized_vol_not_high
    drawdown_guard_rule: compensation_disabled_when_drawdown_high
    rebalance_rule: threshold
    max_turnover: 1.25
    max_tqqq_weight: 0.00
    max_effective_qqq_beta: 1.25
    uses_options: false
    uses_margin: false
    forward_aging_allowed: false
