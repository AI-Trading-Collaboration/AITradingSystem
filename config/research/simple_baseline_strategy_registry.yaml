schema_version: 1
policy_id: simple_baseline_strategy_registry_v1
policy_metadata:
  owner: system
  status: pilot_baseline
  rationale: >
    Establish auditable QQQ / TQQQ / SGOV simple baseline and portfolio-control
    research after the tail-risk fallback line was blocked by trigger/label
    coupling and baseline dominance concerns.
  intended_effect: >
    Compare simple static, trend-filtered, volatility-targeted, capped-leverage,
    and dynamic allocation policies before considering any paper-shadow review.
  validation_evidence: >
    Focused tests and CLI smoke cover registry review, data-gated backtests,
    PIT boundary checks, ranking, cost/regime review, forward aging, readiness,
    dry-run mapping, master review, and options gate artifacts.
  review_condition: >
    Review after real QQQ/TQQQ/SGOV cache coverage is validated and forward
    aging has enough matured samples for owner review.
market_regime:
  regime_id: ai_after_chatgpt
  anchor_date: 2022-11-30
  anchor_event: ChatGPT public launch
  default_backtest_start: 2022-12-01
safety_boundary:
  production_effect: none
  broker_action: none
  promotion_allowed: false
  paper_shadow_allowed: false
  production_allowed: false
  manual_review_required: true
  research_only: true
  observe_only: true
research_policy:
  annualization_trading_days: 252
  monthly_trading_days: 21
  quarterly_trading_days: 63
  required_price_tickers:
    - QQQ
    - TQQQ
    - SGOV
  required_rate_series:
    - DGS2
    - DGS10
    - DTWEXBGS
  moving_average_windows:
    short: 100
    long: 200
  realized_vol_windows:
    short: 20
    medium: 60
    long: 120
  rolling_high_windows:
    short: 60
    medium: 120
    long: 252
  volatility_target:
    annual_vol_target: 0.18
    min_qqq_weight: 0.20
    max_qqq_weight: 1.00
    defensive_asset: SGOV
  tqqq_volatility_cap:
    annual_vol_cap: 0.35
    min_tqqq_weight: 0.00
    max_tqqq_weight: 0.50
    defensive_asset: SGOV
  tqqq_drawdown_cap:
    qqq_drawdown_warning: -0.08
    qqq_drawdown_block: -0.15
    warning_tqqq_weight: 0.25
    block_tqqq_weight: 0.00
    defensive_asset: SGOV
  equal_risk:
    min_weight: 0.10
    max_weight: 0.90
  dynamic_policy_search:
    max_tqqq_weight: 0.50
    max_single_rebalance_turnover: 0.50
    trend_states:
      - qqq_above_100dma
      - qqq_above_200dma
      - qqq_100dma_above_200dma
    volatility_percentile_thresholds:
      - 0.60
      - 0.80
    drawdown_thresholds:
      - -0.05
      - -0.10
    candidate_allocations:
      - policy_id: dyn_qqq_trend_defensive
        risk_on_weights: {QQQ: 0.90, SGOV: 0.10}
        risk_off_weights: {QQQ: 0.30, SGOV: 0.70}
      - policy_id: dyn_tqqq_capped_trend
        risk_on_weights: {TQQQ: 0.33, SGOV: 0.67}
        risk_off_weights: {QQQ: 0.20, SGOV: 0.80}
      - policy_id: dyn_balanced_qqq_tqqq_sgov
        risk_on_weights: {QQQ: 0.50, TQQQ: 0.20, SGOV: 0.30}
        risk_off_weights: {QQQ: 0.20, SGOV: 0.80}
  regime_review:
    trend_return_threshold_60d: 0.05
    drawdown_state_threshold: -0.08
    low_vol_quantile: 0.33
    high_vol_quantile: 0.66
  cost_scenarios:
    zero_cost:
      cost_bps: 0.0
    low_cost:
      cost_bps: 1.0
    medium_cost:
      cost_bps: 5.0
    high_cost:
      cost_bps: 15.0
  readiness_rules:
    min_forward_mature_20d_samples: 20
    max_regime_concentration_score: 0.65
    max_cost_sensitivity_score: 0.40
    max_turnover: 1.50
    qqq_drawdown_improvement_required: 0.10
  dry_run:
    default_hypothetical_portfolio_value: 100000
    cash_buffer_weight: 0.01
  options_gate:
    minimum_forward_mature_60d_samples: 60
    minimum_master_review_status:
      - NARROW_TO_TOP_CANDIDATES
      - PAPER_SHADOW_REVIEWABLE_LATER
strategies:
  - strategy_id: qqq_100_static
    display_name: 100% QQQ
    asset_universe: [QQQ]
    target_weights: {QQQ: 1.00}
    rebalance_frequency: monthly
    risk_control_rule: none
    trend_filter_rule: none
    volatility_filter_rule: none
    drawdown_filter_rule: none
    max_turnover: 1.00
    max_tqqq_weight: 0.00
    uses_leverage_etf: false
    uses_options: false
    production_effect: none
    broker_action: none
