    description: Explicit monthly execution baselines.
  weekly_daily:
    description: Higher-cadence execution sensitivity policies.
  threshold:
    description: Drift-triggered policies.
  hybrid:
    description: Monthly execution plus threshold or risk-shock override.
  validity_holding_hysteresis:
    description: Recommendation expiry, holding-period and hysteresis policies.
