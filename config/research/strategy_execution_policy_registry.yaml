schema_version: 1
policy_id: strategy_execution_policy_registry_v1
policy_metadata:
  owner: research_governance
  status: research_only_baseline
  rationale: >
    Dynamic strategy backtests must distinguish signal cadence, target weight
    cadence, recommendation validity, execution permission and actual position
    path. The registry prevents unreviewed monthly execution defaults from
    being silently applied to dynamic signals.
  intended_effect: >
    Make execution assumptions reviewable for research-only backtests,
    external replay, forward-aging observations and owner reports.
  validation_evidence: >
    TRADING-1165 to 1186 focused tests validate required policy fields, CLI
    artifacts, target-vs-actual path construction and report registry coverage.
  review_condition: >
    Review before using any policy outside research-only artifacts, changing a
    drift/validity/holding threshold, changing cost assumptions, or attaching a
    policy to paper-shadow, production or broker execution.
market_regime:
  regime_id: unified_primary_2021
  anchor_date: 2022-11-30
  anchor_event: ChatGPT public launch
  default_backtest_start: 2021-02-22
safety_boundary:
  production_effect: none
  broker_action: none
  promotion_allowed: false
  paper_shadow_allowed: false
  production_allowed: false
  manual_review_required: true
  research_only: true
  observe_only: true
materiality_thresholds:
  policy_id: execution_semantics_materiality_thresholds_v1
  owner: research_governance
  status: pilot_baseline
  rationale: >
    Conservative pilot thresholds for surfacing execution lag and signal
    staleness as owner-review blockers in actual-path rebacktests. These
    thresholds are not calibrated promotion boundaries.
  intended_effect: >
    Prevent material execution delay or stale-signal costs from being silently
    waived before owner manual review.
  validation_evidence: >
    Covered by TRADING-1201 to 1220 promotion readiness and materiality tests;
    future calibration is required before production-facing interpretation.
  review_condition: >
    Review after the first owner review pack, before enabling any waiver, and
    before using these thresholds outside research-only actual-path evidence.
  thresholds:
    execution_lag_return_cost_abs_pp: 1.0
    execution_lag_return_cost_relative_pct: 20.0
    execution_lag_max_drawdown_cost_pp: 2.0
    signal_staleness_material_event_count: 3
    actual_trade_delay_days_p95: 10
