schema_version: dynamic_strategy_pit_input_registry.v1
scope: dynamic_strategy
owner: research_governance
status: active_baseline
rationale: >
  Registry-backed source of truth for dynamic strategy PIT coverage matrix
  generation and safety gate evaluation after TRADING-2404.
intended_effect: >
  Make PIT status, confidence, severity, blockers, and remediation ownership
  explicit before candidate search, observation, paper-shadow, or production
  interpretation can resume.
validation_evidence: >
  TRADING-2403 PIT coverage matrix and TRADING-2404 implementation plan identify
  growth_tilt_engine and valid_until_window as blocking gaps. TRADING-2405 adds
  reusable registry validation, matrix generation, and gate checks.
review_condition: >
  Review after TRADING-2406 and TRADING-2407 remediation plans update the core
  return signal and valid-until semantics evidence.
entries:
