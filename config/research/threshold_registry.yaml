calibration_backlog:
  - priority: P0
    focus_area: valuation_crowding_thresholds
    threshold_ids:
      - indicator_research.effectiveness_drawdown_worse_tolerance
      - indicator_research.effectiveness_missed_upside_acceptable_rate
      - indicator_research.default_masking_ablation_cap_ratio
    reason: Valuation/crowding masking can alter signal interpretation and must remain review-blocked until calibrated.
    recommended_plan: Use casebook, ablation, horizon matrix, and drawdown/upside utility to calibrate masking policy bands.

  - priority: P0
    focus_area: evidence_floor_and_sample_floor
    threshold_ids:
      - indicator_research.effectiveness_min_available_outcome_cases
      - indicator_research.effectiveness_min_short_horizon_mature_cases
      - indicator_research.min_trigger_observations_for_mapping_research
      - indicator_research.min_walk_forward_windows
      - feedback_sample_policy.decision_outcomes_promotion_floor
      - feedback_sample_policy.prediction_outcomes_promotion_floor
      - trend_calibration.minimum_sample_count
    reason: Sample floors define whether conclusions are considered mature enough for review.
    recommended_plan: Run floor sensitivity, effective sample size, and confidence interval analysis by horizon/regime/cluster.

  - priority: P0
    focus_area: masking_ratio_threshold
    threshold_ids:
      - indicator_research.masking_high_min
      - indicator_research.masking_moderate_min
      - indicator_research.dominant_hit_rate_min
      - indicator_research.dominant_share_of_adjustment_min
    reason: Masking and dominance labels can change research priority and interpretation.
    recommended_plan: Map masking-ratio and dominance bins to realized contribution and false risk-off/missed-upside labels.

  - priority: P1
    focus_area: robustness_gate_threshold
    threshold_ids:
      - indicator_research.robustness_cluster_dominance_share
      - indicator_research.robustness_top_date_concentration_share
      - backtest_validation.candidate_min_component_coverage
      - backtest_validation.candidate_min_independent_windows
      - backtest_validation.candidate_random_baseline_min_percentile
      - dynamic_robustness.walk_forward_acceptance_thresholds
      - dynamic_robustness.overfit_concentration_limits
    reason: Robustness gates determine whether evidence is broad enough or overfit.
    recommended_plan: Use leave-one-date/asset/cluster, bootstrap, random baseline, and walk-forward sensitivity studies.

  - priority: P1
    focus_area: promotion_gate_threshold
    threshold_ids:
      - promotion_gate.confirmation_target_count_minimum
      - promotion_gate.required_status_bands
      - weight_promotion.minimum_sample_counts
      - weight_promotion.maximum_synthetic_snapshot_ratio
      - weight_promotion.minimum_reconciliation_pass_ratio
      - weight_search.scorecard_promote_and_keep_testing_scores
    reason: These thresholds can be mistaken for readiness unless owner-reviewed and calibrated.
    recommended_plan: Compare promotion gate pass/fail taxonomy to later owner-reviewed forward and paper-shadow outcomes.

  - priority: P1
    focus_area: risk_off_and_trend_confirmation_threshold
    threshold_ids:
      - dynamic_allocation.risk_off_score_thresholds
      - dynamic_allocation.risk_on_confirmation_thresholds
      - dynamic_allocation.event_risk_high_threshold
      - trend_calibration.score_bands
      - dynamic_robustness.false_signal_thresholds
    reason: Risk-off and trend confirmation thresholds shape candidate allocation behavior and false defensive/aggressive shifts.
    recommended_plan: Calibrate score bands against realized drawdown, upside capture, turnover, and false risk-on/off case labels.
