schema_version: 1
registry_id: threshold_registry_v1
task_id: TRADING-693
version: 2026-06-20
status: validation_inventory
owner: system_validation
mode: validation_only
production_effect: none
rationale: >
  Inventory engineering default thresholds and magic numbers that can affect
  research conclusions, validation quality, candidate promotion interpretation,
  backtest/replay acceptance, masking diagnostics, outcome maturity, robustness,
  and allocation constraints. This registry does not change production,
  paper-shadow, or official target weights.
scope:
  include:
    - config
    - indicator_research
    - validation_pack
    - masking_diagnostics
    - outcome_maturity
    - promotion_gates
    - robustness_gates
    - backtest_replay_allocation_constraints
    - tests_with_hardcoded_thresholds
  exclude:
    - pure formatting precision
    - array indices
    - protocol or schema version numbers
    - market regime anchor dates
    - retry and timeout constants that do not affect investment interpretation
safety_boundary:
  validation_only: true
  manual_review_only: true
  production_weight_logic_changed: false
  production_weight_affecting: false
  paper_shadow_change_allowed: false
  official_target_weights_mutated: false
  broker_effect: none
  order_effect: none
  production_effect: none

thresholds:
  - threshold_id: indicator_research.effectiveness_min_available_outcome_cases
    current_value: 50
    unit: mature_cases
    where_used:
      - src/ai_trading_system/indicator_research.py:EFFECTIVENESS_MIN_AVAILABLE_OUTCOME_CASES
      - docs/requirements/TRADING-693_Long_Horizon_Evidence_Floor_Calibration_Audit.md
    purpose: Long-horizon full-advisory mature outcome floor for masking policy validation.
    impact_scope: high-impact long-horizon decision and promotion-readiness interpretation
    threshold_class: A
    decision_affecting: true
    promotion_gate_affecting: true
    production_weight_affecting: false
    default_reason: Retained as a conservative guardrail from the validation-only masking review.
    calibration_status: HEURISTIC_GUARDRAIL
    evidence_level: preliminary_short_horizon_only
    calibration_required: true
    no_promotion_dependency_without_review: true
    recommended_calibration_method: Estimate precision and stability across rolling 20d forward windows, independent dates, assets, clusters, and regimes.

  - threshold_id: indicator_research.effectiveness_min_short_horizon_mature_cases
    current_value: 50
    unit: mature_cases
    where_used:
      - src/ai_trading_system/indicator_research.py:EFFECTIVENESS_MIN_SHORT_HORIZON_MATURE_CASES
    purpose: Minimum 1d/5d mature outcomes before short-horizon masking recommendation can move beyond insufficient evidence.
    impact_scope: high-impact validation recommendation strength
    threshold_class: A
    decision_affecting: true
    promotion_gate_affecting: true
    production_weight_affecting: false
    default_reason: Conservative validation floor; not fitted to observed outcomes.
    calibration_status: HEURISTIC_GUARDRAIL
    evidence_level: preliminary
    calibration_required: true
    no_promotion_dependency_without_review: true
    recommended_calibration_method: Sensitivity analysis over 20/30/50/80/100 mature-case floors with false positive and false risk-off attribution.

  - threshold_id: indicator_research.effectiveness_drawdown_worse_tolerance
    current_value: 0.10
    unit: fraction_of_baseline_drawdown
    where_used:
      - src/ai_trading_system/indicator_research.py:EFFECTIVENESS_DRAWDOWN_WORSE_TOLERANCE
    purpose: Tolerance for treating no-masking drawdown as not materially worse than baseline.
    impact_scope: high-impact scenario conclusion boundary
    threshold_class: A
    decision_affecting: true
    promotion_gate_affecting: true
    production_weight_affecting: false
    default_reason: Validation-only materiality guardrail without statistical calibration.
    calibration_status: HEURISTIC_GUARDRAIL
    evidence_level: unit_tests_and_validation_artifacts_only
    calibration_required: true
    no_promotion_dependency_without_review: true
    recommended_calibration_method: Calibrate against drawdown-event casebook labels and bootstrapped downside-capture deltas.

  - threshold_id: indicator_research.effectiveness_missed_upside_acceptable_rate
    current_value: 0.40
    unit: share_of_cases
    where_used:
      - src/ai_trading_system/indicator_research.py:EFFECTIVENESS_MISSED_UPSIDE_ACCEPTABLE_RATE
    purpose: Maximum missed-upside rate allowed when retaining baseline valuation/crowding masking candidate.
