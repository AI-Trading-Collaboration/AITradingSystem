    threshold_class: A
    decision_affecting: true
    promotion_gate_affecting: true
    production_weight_affecting: false
    default_reason: Subjective guardrail carried by validation-only review.
    calibration_status: HEURISTIC_GUARDRAIL
    evidence_level: preliminary
    calibration_required: true
    no_promotion_dependency_without_review: true
    recommended_calibration_method: Compare missed-upside distribution to drawdown protection benefit by horizon and event window.

