policy_metadata:
  version: ai_confirmation_policy_v0_1
  status: observe_only_baseline
  owner: system
  rationale: >
    TRADING-066 baseline policy for candidate-only AI confirmation scoring. The
    policy governs score bands, component weights, and score normalization for
    observe-only calibration; it does not authorize production ETF allocation
    changes.
  validation: >
    Unit tests use deterministic toy prices to verify band mapping, component
    behavior, data coverage penalties, drawdown penalties, and safety fields.
  review_condition: >
    Review after TRADING-066 validation gate and before any AI confirmation score
    is considered for production allocation policy.

safety:
  observe_only: true
  candidate_only: true
  production_effect: none
  broker_action: none
  manual_review_required: true

score_bands:
  strong_confirm:
    min_score: 80.0
  confirm:
    min_score: 65.0
  neutral:
    min_score: 45.0
  weak:
    min_score: 30.0
  negative:
    min_score: 0.0

mega_cap_ai_score:
  group_id: mega_cap_ai
  component_weights:
    mega_cap_trend_score: 0.20
    mega_cap_momentum_score: 0.20
    mega_cap_breadth_score: 0.20
    mega_cap_relative_strength_vs_QQQ: 0.15
    mega_cap_relative_strength_vs_SPY: 0.10
    mega_cap_drawdown_penalty: 0.10
    data_coverage_penalty: 0.05
  relative_strength_full_scale_return: 0.10
  drawdown_full_penalty: -0.20
  coverage_warning_min: 0.80
  driver_positive_min: 65.0
  driver_negative_max: 40.0

ai_semiconductor_relative_strength_score:
  required_pairs:
    - numerator: QQQ
      denominator: SPY
      component: growth_vs_market
    - numerator: SMH
      denominator: QQQ
      component: semiconductor_vs_growth
    - numerator: SOXX
      denominator: QQQ
      component: semiconductor_vs_growth
    - numerator: SMH
      denominator: SPY
      component: semiconductor_vs_market
    - numerator: SOXX
      denominator: SPY
      component: semiconductor_vs_market
  optional_pairs:
    - numerator: XLK
      denominator: SPY
      component: growth_vs_market
    - numerator: IGV
      denominator: QQQ
      component: ai_proxy_vs_growth
    - numerator: AIQ
      denominator: QQQ
      component: ai_proxy_vs_growth
    - numerator: BOTZ
      denominator: QQQ
      component: ai_proxy_vs_growth
  component_weights:
    growth_vs_market: 0.25
    semiconductor_vs_growth: 0.30
    semiconductor_vs_market: 0.25
    ai_proxy_vs_growth: 0.10
    relative_drawdown_penalty: 0.10
  relative_return_full_scale: 0.10
  relative_drawdown_full_penalty: -0.15
  driver_positive_min: 65.0
  driver_negative_max: 40.0

event_risk_overlay:
  severity_scores:
    low: 20.0
    medium: 45.0
    high: 75.0
    critical: 100.0
  risk_bands:
    low:
      max_score: 24.99
    medium:
      max_score: 49.99
    high:
      max_score: 79.99
    critical:
      max_score: 100.0
  multiple_event_increment: 5.0
  maximum_event_risk_score: 100.0

ai_confirmation_composite_score:
  component_weights:
    semiconductor_breadth: 0.30
    mega_cap_ai: 0.30
    ai_relative_strength: 0.25
    event_risk_adjustment: 0.15
  insufficient_data_coverage_min: 0.60
  supports_overweight_min: 80.0
  supports_neutral_min: 45.0
  event_risk_high_min: 75.0

ai_confirmation_shadow_overlay:
  overlay_policy_id: ai_confirmation_overlay_v1
  semiconductor_symbols:
    - SMH
    - SOXX
  funding_symbols:
    - SPY
    - QQQ
  cash_symbol: CASH
  strong_confirm_min: 80.0
  confirm_min: 65.0
  neutral_min: 45.0
  weak_min: 30.0
  high_event_risk_min: 75.0
  strong_confirm_increment: 0.05
  confirm_increment: 0.02
  weak_decrement: 0.03
  negative_decrement: 0.05
  max_semiconductor_sleeve: 0.35
  min_cash_weight: 0.05
