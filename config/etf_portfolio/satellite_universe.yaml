policy_metadata:
  version: satellite_universe_v0_1
  status: observe_only_baseline
  owner: system
  rationale: >
    TRADING-067 baseline satellite stock universe. Membership defines which
    individual AI / semiconductor stocks may be evaluated as candidate-only ETF
    sleeve replacements; it does not authorize production allocation changes.
  validation: >
    Loader and validation tests cover required metadata, benchmark references,
    duplicate handling, disabled symbols, optional data handling, and mapping
    determinism.
  review_condition: >
    Review after TRADING-067 validation gate and before any later task proposes
    production use of satellite replacement evidence.

safety:
  observe_only: true
  candidate_only: true
  production_effect: none
  broker_action: none
  manual_review_required: true

allowed_benchmarks:
  - QQQ
  - SMH
  - SOXX

