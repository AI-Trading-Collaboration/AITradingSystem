    minimum_sample_count: 0
  data_quality_governance_report:
    category: data_quality
    title: Data Quality
    source_module: etf_portfolio.data_quality
    report_id: etf_data_quality_governance_report
    required: true
    max_age_days: 3
    source_metric_paths:
      - status
      - price_freshness.summary.blocking_count
      - evidence_completeness.summary.blocking_count
      - validation_gate_freshness.summary.blocking_count
    sample_count_paths:
      - summary.record_count
      - source_link_count
    validation_report_id: etf_data_quality_validation
    expected_artifact_globs:
      - reports/etf_portfolio/data_quality/governance/data_quality_report_*.json
      - reports/etf_portfolio/data_quality/governance/data_quality_report_*.md
