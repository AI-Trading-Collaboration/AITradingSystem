  operations_health_report:
    category: operations_health
    title: Operations Health
    source_module: etf_portfolio.operations
    report_id: etf_operations_health_report
    required: true
    max_age_days: 3
    source_metric_paths:
      - status
      - pipeline_status
      - run_metadata.blocking_failure_count
      - run_metadata.warning_count
    sample_count_paths:
