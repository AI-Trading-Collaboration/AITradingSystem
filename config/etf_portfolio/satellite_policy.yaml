policy_metadata:
  version: satellite_policy_v0_1
  status: observe_only_baseline
  owner: system
  rationale: >
    TRADING-067 baseline policy for candidate-only satellite stock replacement.
    Thresholds are intentionally conservative: ETF exposure is the default and
    a stock must prove relative strength versus its benchmark ETF before any
    candidate replacement plan is shown for manual review.
  validation: >
    Unit tests use deterministic toy prices to verify feature timing, score
    direction, eligibility blockers, risk constraints, replacement plans,
    reports, Reader Brief integration, and final validation gate behavior.
  review_condition: >
    Review after forward satellite attribution has enough observation samples
    and before any replacement logic is considered for production allocation.

safety:
  observe_only: true
  candidate_only: true
  production_effect: none
  broker_action: none
  manual_review_required: true

score_bands:
  strong:
    min_score: 80.0
  eligible:
    min_score: 70.0
  watch:
    min_score: 55.0
  weak:
    min_score: 35.0
  fallback:
    min_score: 0.0

score_policy:
  policy_id: satellite_candidate_score_v1
  component_weights:
    relative_strength_score: 0.28
    trend_score: 0.18
    momentum_score: 0.14
    drawdown_risk_score: 0.15
    volatility_score: 0.05
    ai_confirmation_support_score: 0.10
    event_risk_adjusted_score: 0.05
    data_coverage_score: 0.05
  relative_return_full_scale: 0.12
  momentum_return_full_scale: 0.15
  drawdown_full_penalty: -0.25
  relative_volatility_warning: 1.25
  relative_volatility_block: 1.75
  driver_positive_min: 65.0
  driver_negative_max: 40.0

eligibility_policy:
  policy_id: satellite_replacement_gate_v1
  eligible_score_min: 70.0
  watch_score_min: 55.0
  relative_return_60d_min: 0.0
  trend_score_min: 60.0
  max_drawdown: -0.20
  max_relative_volatility: 1.50
  event_risk_high_min: 75.0
  ai_confirmation_neutral_min: 45.0
  min_data_coverage: 0.80
  fallback_to_etf_on_gate_fail: true

risk_constraints:
  policy_id: satellite_replacement_risk_v1
  max_total_satellite_weight: 0.20
  max_single_stock_weight: 0.05
  max_stocks_per_sleeve: 3
  max_sector_replacement_weight: 0.15
  min_etf_residual_weight: 0.50
  max_relative_volatility: 1.50
  max_drawdown: -0.20
  event_risk_block: high
  earnings_window_block_or_discount: block
  liquidity_warning_if_available: true
