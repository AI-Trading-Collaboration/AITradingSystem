schema_version: 1

policy_metadata:
  owner: project_owner
  version: forward_pressure_capture_v1
  status: pilot_baseline
  rationale: >
    Automate lightweight forward pressure evidence collection for
    defensive_limited_adjustment while preserving RESEARCH_ONLY status until
    enough forward pressure outcomes mature.
  intended_effect: >
    Provide daily monitoring, weekly review, and event-driven capture command
    packs for QQQ/SMH pressure regimes without changing policy, broker state, or
    production portfolio behavior.
  validation_evidence: >
    Focused tests cover capture plan safety fields, trigger/no-trigger behavior,
    capture skip/run workflow, ledger source classification, and weekly summary.
  review_condition: >
    Review thresholds after at least five forward pressure samples, after owner
    label decision, or before any proposal to modify position_advisory_v1.yaml.

daily:
  enabled: true
  commands:
    - shadow-monitor run
    - position-advisory daily-run
    - consensus-drift run
    - outcome-due scan
    - pressure-trigger scan

weekly:
  enabled: true
  commands:
    - pressure-regime-tag run
    - confirmation-cycle weekly-run
    - confirmation-dashboard build
    - rule-review-queue build
    - pressure-sample-ledger update
    - weekly-defensive-evidence run

event_driven:
  enabled: true
  triggers:
    qqq_1w_drawdown_pct: -0.05
    smh_1w_drawdown_pct: -0.07
    qqq_1d_drawdown_pct: -0.03
    smh_1d_drawdown_pct: -0.04
  commands:
    - pressure-regime-tag run
    - pressure-outcome-backfill run
    - defensive-pressure-compare run
    - pressure-sample-ledger update
    - weekly-defensive-evidence run

validation:
  required_forward_pressure_samples: 5

safety:
  broker_action_allowed: false
  broker_action_taken: false
  production_effect: none
  auto_apply_policy: false
  policy_change_allowed: false
  owner_approval_required: true
