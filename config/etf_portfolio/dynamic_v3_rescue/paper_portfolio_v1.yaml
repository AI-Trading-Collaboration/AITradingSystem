schema_version: 1

policy_metadata:
  policy_id: dynamic_v3_rescue_paper_portfolio_v1
  owner: project_owner
  version: 2026-06-08
  status: pilot_baseline
  rationale: >
    Track owner-reviewed position advisory decisions in an advisory-simulation-only
    paper portfolio so advisory outcomes can be evaluated without broker action.
  intended_effect: >
    Make paper state, paper ledger, advisory outcomes, owner attribution,
    shadow aging, and weekly advisory review auditable while preserving the
    manual-review-only safety boundary.
  validation_evidence: focused tests and TRADING-136_to_140 validation chain
  review_condition: >
    Recalibrate thresholds after the first owner-reviewed weekly advisory review
    period with enough AVAILABLE outcome windows.

paper_portfolio:
  enabled: true
  mode: advisory_simulation_only
  base_currency: USD
  initial_source: manual_snapshot
  initial_snapshot_path: config/etf_portfolio/dynamic_v3_rescue/current_portfolio_snapshot.example.yaml

safety:
  broker_action_allowed: false
  broker_action_taken: false
  require_owner_review: true
  allow_auto_apply_advisory: false

simulation:
  price_source: existing_price_cache
  use_adjusted_close: true
  transaction_cost_bps: 0
  slippage_bps: 0
  min_trade_threshold: 0.01
  max_single_day_total_adjustment: 0.10
  max_single_symbol_adjustment: 0.05

outcome_tracking:
  windows_trading_days: [1, 5, 10, 20]
  compare_to:
    - no_trade
    - paper_action
    - candidate_consensus_target
    - limited_adjustment

promotion_clock_v2:
  minimum_days_observed: 30
  minimum_rebalance_count: 3
  max_drift_warning_count: 1
  max_high_disagreement_count: 1
  max_downgrade_warning_count: 0
  minimum_outcome_score: -0.01
  downgrade_outcome_score_floor: -0.02
  minimum_outcome_available_window_count: 1
  outcome_aggregation: mean_available_windows_equal_weight
  require_consensus_drift_per_monitor: true

weekly_review_v2:
  policy_id: dynamic_v3_weekly_advisory_review_v2
  owner: project_owner
  version: 2026-07-12-pilot
  status: pilot_baseline
  rationale: >
    Require one validated observation from every weekly evidence family before
    continue_monitoring can be recommended; otherwise preserve missing evidence
    as an explicit manual-review blocker rather than treating it as zero.
  intended_effect: >
    Prevent global-latest, post-week append, duplicate artifact, and null-to-zero
    evidence from overstating weekly advisory readiness.
  review_condition: >
    Recalibrate only after at least eight owner-reviewed forward weeks with
    AVAILABLE candidate-linked outcome windows across multiple market regimes.
  minimum_shadow_monitor_run_count: 1
  minimum_daily_advisory_count: 1
  minimum_owner_review_count: 1
  minimum_available_outcome_window_count: 1
  require_active_paper_portfolio: true
  require_shadow_aging: true
  max_downgrade_recommended_count: 0
  recommendation_precedence:
    - reduce_shortlist
    - manual_review_required
    - continue_monitoring

ledger:
  immutable_events: true
  allow_rebuild_from_events: true
