schema_version: dynamic_v3_signal_filter_foundation_policy.v1

policy_metadata:
  policy_version: signal_filter_foundation_v1
  owner: etf-research-governance
  status: pilot_baseline
  rationale: >-
    TRADING-326～335必须把validated dated signal evidence与failure taxonomy绑定后才允许形成
    churn、regime mismatch或quality-filter结论；缺少dated evidence时保持null/INSUFFICIENT_DATA。
  intended_effect: >-
    只生成research-screening evidence和owner-review filter prototype，不生成官方目标权重、
    不自动实施filter、不下单且不产生production effect。
  validation_evidence: ARCH-004G2.4-EB1 lineage, chronology, rebuild and tamper tests
  review_condition: >-
    获得独立validated dated signal ledger、forward returns与owner复核结果后重新校准阈值、
    failure severity和candidate method universe。

taxonomy_id: signal_feature_failure_taxonomy_v1
policy_status: pilot_research_baseline
owner: system
review_condition: Replace pilot severity labels and thresholds after owner-reviewed signal ledger evidence.

signal_quality_policy:
  candidate_dispersion_threshold: 0.15
  persistence_days: 3
  high_flip_count: 4
  harmful_event_share: 0.35
  candidate_methods:
    - limited_adjustment
    - smooth_weights_3d_limited_adjustment
    - smooth_weights_5d_limited_adjustment
    - median_target_weights
    - top5_candidate_consensus
    - cash_buffer_10_plus_smooth_2d_alpha_40
  missing_dated_signal_status: INSUFFICIENT_DATA
  missing_dated_signal_action: BUILD_VALIDATED_DATED_SIGNAL_LEDGER
  automatic_filter_implementation_allowed: false

failure_modes:
  signal_churn:
    description: Signal direction flips too frequently without improving outcome.
    severity_default: REVIEW_REQUIRED
  direction_flip_high:
    description: Direction changes are concentrated in a method or regime.
    severity_default: REVIEW_REQUIRED
  risk_asset_false_positive:
    description: Risk asset increase appears during a drawdown or weak forward outcome.
    severity_default: WARNING
  risk_asset_false_negative:
    description: Risk asset reduction or hold misses a recovery window.
    severity_default: WARNING
  semiconductor_false_positive:
    description: Semiconductor sleeve increase appears during semiconductor pullback.
    severity_default: WARNING
  semiconductor_false_negative:
    description: Semiconductor sleeve reduction misses a semiconductor recovery.
    severity_default: WARNING
  late_risk_reduction:
    description: Risk reduction signal arrives after drawdown has already occurred.
    severity_default: WARNING
  late_risk_restore:
    description: Risk restore signal lags strong recovery.
    severity_default: WARNING
  regime_mismatch:
    description: Signal action conflicts with current regime expectation.
    severity_default: WARNING
  candidate_disagreement_high:
    description: Candidate targets disagree materially; active tilt may be unreliable.
    severity_default: REVIEW_REQUIRED
  consensus_dispersion_high:
    description: Consensus dispersion is high enough to make active tilt unstable.
    severity_default: REVIEW_REQUIRED
  overreact_to_noise:
    description: Candidate reacts to small noisy changes in sideways or choppy regimes.
    severity_default: WARNING
  underreact_to_recovery:
    description: Candidate keeps a defensive or hold posture into strong recovery.
    severity_default: WARNING
  high_turnover_signal:
    description: Weight path has excessive turnover or jump activity.
    severity_default: REVIEW_REQUIRED
  unstable_top_candidate:
    description: Top candidate identity rotates frequently across nearby variants.
    severity_default: WARNING
  weak_drawdown_response:
    description: Signal does not reduce drawdown or worsens drawdown score.
    severity_default: REVIEW_REQUIRED

families:
  churn:
    modes:
      - signal_churn
      - direction_flip_high
      - high_turnover_signal
      - overreact_to_noise
  mismatch:
    modes:
      - regime_mismatch
      - risk_asset_false_positive
      - risk_asset_false_negative
      - semiconductor_false_positive
      - semiconductor_false_negative
      - late_risk_reduction
      - late_risk_restore
      - underreact_to_recovery
      - weak_drawdown_response
  disagreement:
    modes:
      - candidate_disagreement_high
      - consensus_dispersion_high
      - unstable_top_candidate

safety:
  research_only: true
  research_screening_only: true
  experiment_only: true
  not_official_target_weights: true
  not_formal_research_method: true
  broker_action_allowed: false
  broker_action_taken: false
  order_ticket_generated: false
  auto_apply: false
  production_effect: none
