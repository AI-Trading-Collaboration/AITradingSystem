schema_version: 1

method:
  name: smoothed_limited_adjustment
  base_method: limited_adjustment
  mode: research_target_only
  not_official_target_weights: true
  paper_shadow_only: true

policy_metadata:
  policy_id: dynamic_v3_rescue_smoothed_limited_adjustment_v1
  owner: project_owner
  version: 2026-06-13
  status: pilot_baseline
  rationale: >
    TRADING-239 to 245 proposed the 3d and 5d variants for research. G2.4CN
    revoked fixed primary and secondary roles because the rebuilt evidence did
    not qualify either method for recommendation. This policy therefore keeps
    both variants as unordered research candidates until evidence-backed
    selection succeeds.
  intended_effect: >
    Reduce signal churn, target weight jumps, and turnover while preserving the
    limited_adjustment return advantage and exposing lag risk during strong
    recovery regimes.
  validation_evidence: >
    TRADING-246 to 250 focused tests, smoothed config validation, generation,
    backfill, comparison, review validation, ruff, compileall, and git diff
    check.
  review_condition: >
    Revisit after owner review of the smoothed review pack and after forward
    confirmation evidence is available.

variants:
  smooth_weights_3d:
    enabled: true
    smoothing_window_days: 3
    smoothing_type: exponential
    alpha: 0.50
    min_signal_persistence_days: 2
    max_daily_total_weight_change: 0.08
    max_single_symbol_daily_change: 0.04

  smooth_weights_5d:
    enabled: true
    smoothing_window_days: 5
    smoothing_type: exponential
    alpha: 0.35
    min_signal_persistence_days: 3
    max_daily_total_weight_change: 0.06
    max_single_symbol_daily_change: 0.03

constraints:
  preserve_total_weight: true
  min_cash_weight: 0.05
  max_single_symbol_weight: 0.65
  max_semiconductor_weight: 0.35
  max_total_risk_asset_weight: 0.95

regime_context:
  sideways_choppy:
    increase_smoothing_strength: true
    alpha_multiplier: 0.75
    max_daily_total_weight_change: 0.05
    min_signal_persistence_days_add: 1

  strong_recovery:
    reduce_smoothing_strength: true
    alpha_multiplier: 1.25
    allow_faster_risk_restore: true

diagnostics:
  emit_smoothing_events: true
  emit_lag_events: true
  emit_weight_jump_reduction_summary: true

evaluation_policy:
  acceptable_return_delta_floor: -0.03
  drawdown_improvement_floor: 0.0
  turnover_improvement_ceiling: 0.0
  jump_improvement_ceiling: 0.0
  lag_cost_high_threshold: -0.02
  lag_cost_medium_threshold: -0.005
  minimum_path_observations: 2
  minimum_regime_observations: 2
  minimum_rolling_windows: 1
  candidate_priority:
    - smooth_weights_3d_limited_adjustment
    - smooth_weights_5d_limited_adjustment

evidence_policy_metadata:
  policy_id: dynamic_v3_rescue_smoothed_evidence_v2
  owner: project_owner
  version: 2026-07-14
  status: pilot_baseline
  rationale: >
    Govern evidence drilldown, regime sample sufficiency, and forward target
    registration without assuming that either smoothed method is recommended.
  intended_effect: >
    Preserve missing and insufficient evidence, require exact upstream lineage,
    and register forward targets only for an evidence-backed recommended method.
  validation_evidence: >
    ARCH-004 G2.4CO focused lineage, null, policy, tamper, CLI, architecture,
    and contract validation.
  review_condition: >
    Recalibrate after independent forward, PIT, data-quality, cost, and holdout
    evidence or when the owner explicitly rejects the current pilot policy.

evidence_policy:
  minimum_path_observations: 2
  minimum_regime_observations: 2
  benefit_reduction_floor: 0.0
  acceptable_return_delta_floor: -0.03
  drawdown_improvement_floor: 0.0
  turnover_improvement_ceiling: 0.0
  jump_improvement_ceiling: 0.0
  required_forward_events: 10
  required_sideways_events: 5
  required_recovery_events: 5
  confirmation_windows:
    - 1
    - 5
    - 10
    - 20
  forward_return_delta_floor: -0.001
  forward_drawdown_delta_floor: 0.0
  forward_turnover_delta_ceiling: 0.0
  sideways_signal_churn_delta_ceiling: 0.0
  sideways_weight_jump_delta_ceiling: 0.0
  sideways_turnover_delta_ceiling: 0.0

readiness_policy_metadata:
  policy_id: dynamic_v3_rescue_smoothed_readiness_v2
  owner: project_owner
  version: 2026-07-14
  status: pilot_baseline
  rationale: >
    Govern direct churn evidence, sideways attribution, readiness scoring, and
    owner-review options without assigning fixed 3d/5d roles or rewarding
    missing evidence. Promotion readiness must remain subordinate to the
    evidence-backed candidate selected by the upstream confirmation contract.
  intended_effect: >
    Make every readiness component auditable, preserve missing values as null,
    require exact source lineage, and prevent a score from creating a candidate
    when the reviewed upstream evidence selected none.
  validation_evidence: >
    ARCH-004 G2.4CP focused lineage, chronology, policy, null, candidate,
    tamper, CLI, architecture, and contract validation.
  review_condition: >
    Recalibrate after independent forward, PIT, data-quality, cost, and holdout
    evidence, or when the owner explicitly replaces this pilot policy.

readiness_policy:
  minimum_window_observations: 2
  weight_jump_event_threshold: 0.08
  weight_jump_high_severity_threshold: 0.16
  score_weights:
    return_preservation_score: 0.20
    drawdown_score: 0.15
    turnover_score: 0.15
    weight_jump_score: 0.15
    signal_churn_score: 0.15
    sideways_score: 0.10
    recovery_lag_score: 0.05
    forward_confirmation_score: 0.05
  status_scores:
    STRONG: 1.0
    GOOD: 1.0
    IMPROVED: 1.0
    MODERATE: 0.75
    ACCEPTABLE: 0.75
    MIXED: 0.5
    NONE: 0.5
    WEAK: 0.25
    WORSE: 0.0
    POOR: 0.0
  delta_scores:
    positive: 1.0
    neutral: 0.5
    negative: 0.0
  lag_status_scores:
    LOW: 1.0
    MEDIUM: 0.5
    HIGH: 0.0
  forward_status_scores:
    PASS: 1.0
    IN_PROGRESS: 0.4
    WATCH_ONLY: 0.3
    FAILED: 0.0
  promote_review_score: 0.75
  continue_observation_score: 0.45
  hard_block_values:
    return_preservation:
      - POOR
    recovery_lag:
      - HIGH
    sideways:
      - WORSE
    forward_confirmation:
      - FAILED
  candidate_required_for_promotion: true
  missing_component_score: null

safety:
  research_target_only: true
  paper_shadow_only: true
  not_official_target_weights: true
  broker_action_allowed: false
  broker_action_taken: false
  order_ticket_generated: false
  production_effect: none
  auto_apply: false
