schema_version: 1

model_target:
  name: dynamic_v3_rescue_research_model_target_v1
  mode: research_target_only
  not_official_target_weights: true
  paper_shadow_only: true

policy_metadata:
  policy_id: dynamic_v3_rescue_model_target_portfolio_v1
  owner: project_owner
  version: 2026-06-12
  status: pilot_baseline
  rationale: >
    Generate research-only system target portfolios from shadow shortlist,
    candidate consensus, position advisory limits, and guardrail constraints
    without using owner real portfolio state.
  intended_effect: >
    Provide auditable method-level target weights for paper shadow observation,
    not official target weights or broker instructions.
  validation_evidence: >
    TRADING-209_to_213 focused tests, model target validation, paper shadow
    validation, and owner review pack validation.
  review_condition: >
    Revisit after forward paper shadow evidence accumulates or owner changes
    accepted research target method ordering.

source:
  shadow_shortlist: latest
  candidate_cluster: latest
  position_advisory_config: config/etf_portfolio/dynamic_v3_rescue/position_advisory_v1.yaml
  pressure_regime_config: config/etf_portfolio/dynamic_v3_rescue/pressure_regime_tagging_v1.yaml
  risk_capped_limited_config: config/etf_portfolio/dynamic_v3_rescue/risk_capped_limited_adjustment_v1.yaml
  smoothed_limited_config: config/etf_portfolio/dynamic_v3_rescue/smoothed_limited_adjustment_v1.yaml

target_methods:
  enabled:
    - static_baseline
    - no_trade_baseline
    - consensus_target
    - limited_adjustment
    - smooth_weights_3d_limited_adjustment
    - smooth_weights_5d_limited_adjustment
    - risk_capped_limited_adjustment
    - defensive_limited_adjustment
    - equal_weight_shadow_candidates
    - selected_top_candidate

baseline:
  static_weights:
    QQQ: 0.50
    SMH: 0.20
    TLT: 0.10
    CASH: 0.20

method_policy:
  limited_adjustment:
    policy_id: position_advisory_limit_reuse_v1
    rationale: >
      Reuse reviewed position advisory adjustment caps so research target
      changes remain comparable with earlier manual-review guardrails.
  defensive_limited_adjustment:
    policy_id: defensive_research_overlay_v1
    rationale: >
      Keep defensive_limited_adjustment as a research-only conservative variant
      while pressure-regime evidence remains insufficient for rule approval.
    semiconductor_symbols:
      - SMH
      - SOXX
    growth_symbols:
      - QQQ
    semiconductor_reduction: 0.03
    growth_reduction: 0.02
    max_cash_weight: 0.35
  review_policy:
    policy_id: research_observation_preference_v1
    rationale: >
      Prefer limited_adjustment for continued observation when data is available;
      treat consensus_target as an upper-bound reference rather than an
      executable default.
    preferred_method_order:
      - limited_adjustment
      - defensive_limited_adjustment
      - consensus_target
    risk_adjusted_metric: return_to_volatility

constraints:
  max_single_symbol_weight: 0.65
  max_semiconductor_weight: 0.35
  min_cash_weight: 0.05
  max_total_risk_asset_weight: 0.95
  semiconductor_symbols:
    - SMH
    - SOXX
  defensive_symbols:
    - CASH
    - TLT

safety:
  research_target_only: true
  paper_shadow_only: true
  not_official_target_weights: true
  broker_action_allowed: false
  broker_action_taken: false
  order_ticket_generated: false
  production_effect: none
  auto_apply: false
