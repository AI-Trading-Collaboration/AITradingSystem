schema_version: 1

run:
  name: dynamic_v3_rescue_parameter_sweep_real_smoke
  description: "Small real evaluator smoke for dynamic v3 rescue parameter sweep"
  seed: 42
  max_candidates: 50
  mode: grid
  allow_resume: true

data:
  as_of: "2026-06-05"
  end: "2026-06-05"
  min_history_days: 260
  quality_status: PASS
  manifest_hash: real_dynamic_v3_rescue_smoke_runtime_gate
  allow_data_quality:
    - PASS
    - PASS_WITH_WARNINGS

baselines:
  static: static_baseline
  dynamic_reference:
    - dynamic_v0_2
    - dynamic_v0_3
    - dynamic_v0_4

parameter_space:
  rescue_intensity:
    values: [0.50, 0.75, 1.00, 1.25]
  smooth_window_days:
    values: [3, 5, 10]
  constraint_buffer_bps:
    values: [10, 25]
  turnover_penalty:
    values: [0.05, 0.10]
  risk_off_confirmation_days:
    values: [2, 3]
  rebalance_cooldown_days:
    values: [3, 5]
  drawdown_guard:
    values: [soft, hard]

hard_constraints:
  # small_real workflow smoke calibration: 2026-06-05 real evaluator candidates
  # cluster around 0.642-0.647 constraint-hit rate versus the v0.4 reference.
  # Keep the absolute gate permissive enough to test observe-only downstream
  # artifacts, while max_constraint_hits_delta_vs_reference still blocks
  # candidates that worsen the reference path. This is not a promotion gate.
  max_constraint_hit_rate: 0.65
  max_constraint_hits_delta_vs_reference: 0
  max_false_risk_off_delta: 30
  max_turnover: 8.0
  max_drawdown_degradation_pp: 0.02
  max_dynamic_vs_static_gap: 1.0
  require_data_quality_not_fail: true
  require_no_lookahead: true
  allow_robustness_status:
    - PASS
    - REVIEW_REQUIRED
    - FAIL
  noise_floor_improvement: 0.0

promotion_constraints:
  require_robustness_status: PASS
  require_walk_forward_status: PASS
  require_oos_status: PASS
  require_stress_bucket_status: PASS
  max_parameter_sensitivity_status: REVIEW_REQUIRED
  require_shadow_observation: true

scoring:
  objective: constrained_weighted_score
  weights:
    dynamic_vs_static_gap_improvement: 0.25
    constraint_hit_reduction: 0.25
    drawdown_preservation: 0.20
    turnover_reduction: 0.10
    false_risk_off_control: 0.10
    robustness_score: 0.10

walk_forward:
  enabled: true
  train_window_months: 12
  test_window_months: 3
  step_months: 3
  min_windows: 2
  top_n: 2

out_of_sample:
  enabled: true
  holdout_start: "2024-01-01"
  holdout_end: "2026-06-05"

robustness:
  enabled: true
  neighbor_grid_steps: 1
  require_stress_buckets:
    - high_drawdown
    - fast_recovery
  overfit_status_allow:
    - LOW_RISK
    - REVIEW_REQUIRED

shadow:
  enabled: true
  promotion_earliest_after_rebalance_count: 3
  promotion_earliest_after_days: 30
  required_observation_metrics:
    - constraint_hits
    - false_risk_off
    - turnover
    - drawdown
    - dynamic_vs_static_gap

artifact_retention:
  keep_recent_full_sweeps: 10
  keep_recent_failed_sweeps: 10
  keep_all_observe_only: true
  keep_all_promote_candidate: true
  keep_all_production_candidate: true
  stale_after_days: 14

execution:
  workers: 1
  checkpoint_every_candidates: 1
  fail_fast_on_schema_error: true
  continue_on_candidate_error: true
  evaluator: real_dynamic_v3_rescue
