schema_version: 1
policy_id: dynamic_v3_rescue_evidence_staleness_policy_v1
version: 2026-06-16
status: pilot_baseline
owner: system_validation
rationale: >
  TRADING-354 adds a read-only freshness monitor after the candidate decision
  ledger so future candidate decisions do not rely on stale price, market, or
  research evidence. TRADING-354B clarifies that market-data sources are
  evaluated against the latest completed U.S. equity trading day when the
  requested as-of is ahead of available market close. Calendar-day windows are
  pilot governance bands, not production trading thresholds.
intended_effect: >
  Surface stale or blocking upstream evidence before a candidate decision is
  reused for the next research step, while preserving manual review and
  no-production safety boundaries.
validation_evidence: >
  Focused staleness monitor tests, real CLI run/report/validation, contract
  validation suite, documentation contract, report index, and Reader Brief
  quality checks.
review_condition: >
  Recalibrate after the first month of paper-shadow protocol operation or after
  the project owner changes source update cadence.

severity_order:
  - FRESH
  - ACCEPTABLE
  - STALE
  - BLOCKING

default_next_actions:
  FRESH: continue_candidate_review
  ACCEPTABLE: continue_with_manual_freshness_note
  STALE: refresh_or_regenerate_stale_evidence_before_next_decision
  BLOCKING: stop_candidate_decision_until_blocking_evidence_is_refreshed

rules:
  price_data:
    required: true
    timestamp_basis: latest_price_cache_date_adjusted_to_latest_complete_market_date
    fresh_days: 1
    acceptable_days: 3
    blocking_days: 7
    rationale: >
      Price data can lag over weekends, holidays, and pre-close local calendar
      dates. Freshness must use the report's freshness_reference_date, normally
      the latest completed U.S. equity trading day, so a cache covering the
      latest complete market session is not marked stale only because the
      requested as-of is a later local calendar date.
  market_panel_data:
    required: true
    timestamp_basis: market_panel_as_of_adjusted_to_latest_complete_market_date
    fresh_days: 1
    acceptable_days: 3
    blocking_days: 7
    rationale: >
      Market panel interpretation should align with the latest validated price
      cache and daily report context. Freshness uses the same
      freshness_reference_date as price_data so pre-close or holiday as-of
      requests do not create a false stale blocker when the panel covers the
      latest completed market session.
  signal_artifact:
    required: true
    timestamp_basis: evidence_date_end_or_generated_at
    fresh_days: 7
    acceptable_days: 14
    blocking_days: 30
    rationale: >
      Signal evidence can remain useful for short research windows, but stale
      signal evidence should be regenerated before further promotion decisions.
  stress_backfill_result:
    required: true
    timestamp_basis: stress_backfill_generated_at
    fresh_days: 14
    acceptable_days: 30
    blocking_days: 60
    rationale: >
      Stress backfill is slower-moving than daily market data, but should not be
      treated as current after two months without review.
  ab_review:
    required: true
    timestamp_basis: ab_review_generated_at
    fresh_days: 14
    acceptable_days: 30
    blocking_days: 60
    rationale: >
      A/B review remains usable while source candidate evidence is stable, but
      must be refreshed if the comparison becomes materially dated.
  owner_review:
    required: true
    timestamp_basis: owner_review_generated_at
    fresh_days: 7
    acceptable_days: 14
    blocking_days: 30
    rationale: >
      Owner review is the most decision-facing artifact and should be revisited
      before the next candidate step if it becomes stale.
  paper_shadow_daily_observation:
    required: true
    timestamp_basis: paper_shadow_daily_observation_date_or_generated_at
    fresh_days: 3
    acceptable_days: 7
    blocking_days: 14
    rationale: >
      Daily paper-shadow observations are the most recent behavior evidence for
      the candidate. A missing or dated observation should block interpretation
      of current paper-shadow behavior.
  paper_shadow_drift_monitor:
    required: true
    timestamp_basis: paper_shadow_drift_monitor_generated_at
    fresh_days: 3
    acceptable_days: 7
    blocking_days: 14
    rationale: >
      Drift severity is only meaningful when it is close to the daily
      observation being reviewed. Stale drift findings should not support a new
      weekly or owner decision.
  paper_shadow_weekly_review:
    required: true
    timestamp_basis: paper_shadow_weekly_week_end_or_generated_at
    fresh_days: 7
    acceptable_days: 14
    blocking_days: 30
    rationale: >
      Weekly review is the owner-facing paper-shadow aggregation layer. Missing
      or stale weekly review evidence must be explicit before the next candidate
      step continues.
