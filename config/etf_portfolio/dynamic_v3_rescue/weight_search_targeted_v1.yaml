schema_version: dynamic_v3_weight_search_targeted_policy.v1
policy_metadata:
  policy_version: weight_search_targeted_v1
  owner: investment_policy_governance
  status: reviewed
  rationale: >-
    Freeze the bounded targeted-v3 recipe, data-quality backfill boundary, and
    near-miss A/B interpretation so research conclusions are reproducible and
    cannot be changed by hidden literals.
  intended_effect: >-
    Produce research-only targeted variants, data-gated replay metrics, and an
    owner-readable A/B diagnostic without changing the promotion gate or any
    portfolio state.
  validation_evidence: G2.4CW2 focused hardening and full validation
  review_condition: >-
    Review after materially new forward evidence, a revised scorecard policy,
    or an owner-approved targeted-search methodology change.

matrix:
  minimum_variants: 60
  maximum_variants: 120
  required_targeted_families:
    - cash_buffer_smoothing_hybrid
    - cash_buffer_threshold_hybrid
    - median_consensus_smoothing
    - top_k_consensus_threshold
    - sideways_cooldown_cash_buffer
    - smoothing_recovery_fast_restore
  smoothing_alpha_values: [0.40, 0.55]
  consensus_methods: [median, trimmed_mean, weighted_mean]
  consensus_smoothing_alpha: 0.50
  sideways_cooldown_days: [3, 5]
  recovery_restore_multipliers: [0.85, 0.95]
  recovery_restore_smoothing_alpha: 0.50
  default_parent_variant: cash_buffer_10
  target_failure_modes:
    - return_preservation_weak
    - rolling_consistency_unstable
    - turnover_high
  expected_benefit: retain near-miss benefit while reducing the most common failed gate
  expected_cost: may still lag strong recovery or dilute return

backfill:
  market_regime: ai_after_chatgpt
  minimum_requested_start_date: '2022-12-01'
  accepted_data_quality_statuses: [PASS, PASS_WITH_WARNINGS]
  resume_complete_status: ALREADY_COMPLETE
  resume_incomplete_status: PARTIAL_COMPLETION_REVIEW_REQUIRED
  churn_low_max_large_jump_count: 1

ab_comparison:
  v3_win:
    score_delta_min_exclusive: 0.0
    drawdown_delta_min: 0.0
    return_delta_min: -0.005
  parent_win:
    score_delta_max_exclusive: -0.03
    return_delta_max_exclusive: 0.0
    drawdown_delta_max_exclusive: 0.0
  missing_parent_status: V3_REVIEW_REQUIRED
  mixed_status: MIXED
  v3_win_status: V3_WINS
  parent_win_status: PARENT_WINS
  recommended_next_action: promotion_threshold_sensitivity

safety:
  research_screening_only: true
  experiment_only: true
  not_formal_research_method: true
  not_official_target_weights: true
  paper_shadow_only: true
  broker_action_allowed: false
  broker_action_taken: false
  order_ticket_generated: false
  auto_apply: false
  production_effect: none
