policy_metadata:
  version: etf_experiment_registry_v0_1
  status: pilot_baseline
  owner: system
  rationale: "TRADING-064A controlled ETF calibration experiment registry; definitions are observe-only and do not mutate the production baseline."
  validation: "Registry schema and safety invariants are covered by ETF experiment registry tests."
  review_condition: "Review after TRADING-064 final experiment validation gate and shadow observation evidence."

base_configs:
  default:
    assets_config: assets.yaml
    strategy_config: strategy.yaml
    risk_config: risk.yaml
    backtest_config: backtest.yaml
    asset_symbols: [SPY, QQQ, SMH, SOXX, CASH]

experiments:
  base_conservative:
    experiment_id: base_conservative
    experiment_version: trading_064_v1
    description: "Conservative base ETF allocation with higher SPY and CASH weight."
    family: base_allocation
    base_config_ref: default
    overrides:
      base_weights:
        SPY: 0.40
        QQQ: 0.35
        SMH: 0.10
        SOXX: 0.00
        CASH: 0.15
    benchmark_set: standard_etf
    expected_risk_profile: conservative_growth
    observe_only: true
    production_effect: none
    broker_action: none
    manual_review_required: true

  base_balanced_growth:
