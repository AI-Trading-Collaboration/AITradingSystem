policy_metadata:
  version: etf_experiment_packs_v0_1
  status: pilot_baseline
  owner: system
  rationale: "TRADING-064B controlled first ETF calibration pack; avoids uncontrolled combinatorial search."
  validation: "Pack integrity and safety invariants are covered by ETF experiment pack tests."
  review_condition: "Review after batch runner, comparison report, ranking, candidate gate, and final validation are implemented."

ranking_policies:
  risk_adjusted_v1:
    description: "Risk-adjusted ranking policy planned for TRADING-064E."
    policy_status: pilot_baseline
    component_weights:
      benchmark_excess_return_score: 0.30
      drawdown_reduction_score: 0.25
      risk_adjusted_return_score: 0.20
      turnover_penalty_score: 0.15
      stability_score: 0.10
    component_scales:
      excess_return_reference: 0.10
      drawdown_reduction_reference: 0.10
      risk_adjusted_return_reference: 2.00
      turnover_reference: 0.30
      constraint_hit_rate_reference: 0.30
    thresholds:
      max_turnover: 0.30
      max_drawdown_worsening_vs_baseline: 0.00
    hard_rejection_rules:
      - NO_BENCHMARK_COMPARISON
      - TURNOVER_TOO_HIGH
      - DRAWDOWN_TOO_HIGH
      - CONSTRAINT_VIOLATION
      - UNSAFE_PRODUCTION_EFFECT
      - MISSING_MANUAL_REVIEW

promotion_policies:
  shadow_only_manual_review:
    description: "Candidates can only enter shadow observation after manual-review gate; no automatic production promotion."
    policy_status: pilot_baseline
    thresholds:
      min_candidate_score: 0.50
    blocked_hard_rejection_rules:
      - NO_BENCHMARK_COMPARISON
      - CREDIBILITY_GATE_FAILED
      - UNSAFE_PRODUCTION_EFFECT
      - MISSING_MANUAL_REVIEW
    rejected_hard_rejection_rules:
      - TURNOVER_TOO_HIGH
      - DRAWDOWN_TOO_HIGH
      - CONSTRAINT_VIOLATION
    shadow_observation_allowed: true
    production_promotion_allowed: false

review_policies:
  weekly_shadow_review_v1:
    description: "Weekly observe-only review for enrolled ETF calibration shadow candidates."
    policy_status: pilot_baseline
    thresholds:
      min_review_days: 5
      min_excess_return_for_longer_observation: 0.02
      max_drawdown_abs_for_continue: 0.20
      max_turnover_for_continue: 0.30
    production_promotion_allowed: false

experiment_packs:
  etf_calibration_v1:
    pack_id: etf_calibration_v1
    description: "First controlled ETF allocation calibration pack after TRADING-063 credibility validation."
    created_for_task: TRADING-064
    experiment_ids:
      - base_conservative
      - base_balanced_growth
      - base_ai_growth
      - base_semiconductor_aggressive
      - regime_mild
      - regime_standard
      - regime_defensive
      - semicap_15
      - semicap_25
      - semicap_35
      - rebalance_02
      - rebalance_05
      - rebalance_10
      - rs_weight_10
      - rs_weight_20
      - rs_weight_30
    benchmark_set: standard_etf
    ranking_policy: risk_adjusted_v1
    promotion_policy: shadow_only_manual_review
    observe_only: true
    production_effect: none
    broker_action: none
    manual_review_required: true
