policy_metadata:
  version: ai_confirmation_universe_v0_1
  status: observe_only_baseline
  owner: system
  rationale: >
    TRADING-066A baseline AI / semiconductor confirmation universe. Membership is
    used for observe-only confirmation scoring and shadow overlay calibration, not
    for production ETF allocation.
  validation: >
    Loader and validation tests cover required metadata, benchmark references,
    duplicate handling, disabled symbols, and required versus optional data
    semantics.
  review_condition: >
    Review after TRADING-066 validation gate and before any later task proposes
    production use of AI confirmation evidence.

safety:
  observe_only: true
  candidate_only: true
  production_effect: none
  broker_action: none
  manual_review_required: true

allowed_benchmarks:
  - SPY
  - QQQ
  - SMH
  - SOXX
  - CASH
  - XLK
  - IGV
  - BOTZ
  - AIQ
  - CHAT

