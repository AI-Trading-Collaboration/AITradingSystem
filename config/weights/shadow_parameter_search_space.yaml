version: "shadow_parameter_search_space_v1"
status: "pilot"
owner: "system_validation"
production_effect: "none"
source_weight_profile_path: "config/weights/weight_profile_current.yaml"
shadow_weight_profile_manifest_path: "config/weights/shadow_weight_profiles.yaml"
shadow_gate_profile_manifest_path: "config/weights/shadow_position_gate_profiles.yaml"
include_source_weight_profile: true
include_shadow_weight_profiles: true
include_production_observed_gate_profile: true
include_shadow_gate_profiles: false
rationale: "第一版拟合式 shadow 参数搜索空间：在生产权重附近生成可审计 weight grid，并从 gate_grid 数值网格拟合 gate cap；预设 shadow gate profile 不参与最优解选择，只用于独立观察。"
review_after_reports: 8

weight_grid:
  enabled: true
  max_candidates: 1000
  signal_values:
    trend: [0.20, 0.25, 0.30, 0.35]
    fundamentals: [0.20, 0.25, 0.30, 0.35]
    macro_liquidity: [0.10, 0.15, 0.20]
    risk_sentiment: [0.10, 0.15, 0.20]
    valuation: [0.05, 0.10, 0.15]
    policy_geopolitics: [0.05, 0.10, 0.15]

gate_grid:
  enabled: true
  max_candidates: 1000
  cap_values:
    valuation: [0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70]
    risk_budget: [0.70, 0.80, 0.90]
    thesis: [0.70, 0.80, 0.90]
    confidence: [0.90, 1.00]
    data_confidence: [0.80, 0.90]
