schema_version: 1
policy_id: report_index_visibility_waivers_v1
policy_metadata:
  owner: system
  status: active_empty
  rationale: >
    Report index visibility exceptions must remain explicit and reviewable.
    The legacy/optional artifact families that previously required waivers are
    now classified in `config/report_registry.yaml` with `visibility_policy`,
    so the current report index does not need any active waiver.
  intended_effect: >
    Keep the waiver governance entry point available while requiring any new
    optional missing/stale exception to be added deliberately with owner,
    expiry, linked task, accepted impact, validation coverage, and exit
    condition.
  validation_evidence: >
    Focused report-index tests cover explicit waiver application, visibility
    policy classification, U.S. equity trading-day freshness, and required
    missing fail-closed behavior.
  review_condition: >
    Review before adding any new waiver, before a platform freeze signoff, or
    when a legacy/optional report family is promoted back to current evidence.
waivers: []
