policy_id: paper_signal_quality_policy
version: 1
status: pilot_baseline
owner: system
production_effect: none
rationale: >
  First-pass observe-only policy for explaining whether paper signal samples are
  large enough and data/execution quality is good enough for diagnostic review.
  This policy does not approve production trading, parameter promotion, or real
  broker execution.
intended_effect: >
  Gate paper signal quality interpretation when samples are too small, fills are
  too sparse, market snapshots are synthetic-heavy, historical OHLC coverage is
  weak, or reconciliation state is unreliable.
validation_evidence: TRADING-006 unit tests and ongoing paper-only daily flow observation.
review_condition: >
  Revisit thresholds after enough forward paper trading samples exist in the
  ai_after_chatgpt regime and before any use beyond observe-only diagnostics.
thresholds:
  minimum_sample_count: 7
  minimum_filled_count: 3
  maximum_synthetic_snapshot_ratio: 0.25
  minimum_historical_ohlc_coverage: 0.70
  minimum_reconciliation_pass_ratio: 0.90
confidence_buckets:
  - bucket: missing
    label: missing_confidence
  - bucket: low
    min_inclusive: 0.0
    max_exclusive: 0.5
  - bucket: medium
    min_inclusive: 0.5
    max_exclusive: 0.7
  - bucket: high
    min_inclusive: 0.7
    max_exclusive: 0.85
  - bucket: very_high
    min_inclusive: 0.85
    max_inclusive: 1.0
