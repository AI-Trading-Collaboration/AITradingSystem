schema_version: 1
policy_version: report_registry_v1
policy_metadata:
  owner: system
  status: pilot_baseline
  rationale: >
    Provide a single read-only index for report freshness, owner action, and
    production-effect boundaries without replacing docs/artifact_catalog.md.
  intended_effect: >
    Make stale or missing report artifacts visible to Reader Brief, daily task
    dashboard, and manual reviewers.
  validation_evidence: >
    Contract tests cover registry loading, latest artifact selection,
    freshness classification, HTML/JSON output, and read-only behavior.
  review_condition: >
    Review after report registry is used by at least one real daily-run bundle
    and before deriving docs/artifact_catalog.md from this registry.
defaults:
  production_effect: none
  missing_status: MISSING
  stale_status: STALE
reports:
  - report_id: daily_score
    title: Daily Score Report
    group: daily
    cadence: daily
    audience: investor
    owner: system
    command: aits score-daily
    artifact_globs:
      - outputs/reports/daily_score_*.md
    freshness_sla_days: 1
    freshness_rationale: Daily decision reports should be same-day or prior trading day only.
    owner_action: review_if_missing_or_stale
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: true
  - report_id: data_quality
    title: Data Quality Report
    group: daily
    cadence: daily
    audience: operator
    owner: system
    command: aits validate-data
    artifact_globs:
      - outputs/reports/data_quality_*.md
    freshness_sla_days: 1
    freshness_rationale: Cached data-dependent reports must disclose current data quality.
    owner_action: stop_data_dependent_workflow_if_missing_or_failed
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: true
  - report_id: backtest_input_diagnostics
    title: Backtest Input Diagnostics
    group: shadow
    cadence: ad_hoc
    audience: operator
    owner: system
    command: aits data diagnose-backtest-inputs --latest
    artifact_globs:
      - artifacts/data_quality/*/backtest_input_diagnostics.json
      - artifacts/data_quality/*/backtest_input_diagnostics.md
      - artifacts/backtest_snapshots/*/backtest_input_manifest.json
    freshness_sla_days: 3
    freshness_rationale: Shadow backtest input diagnostics should match the latest cached data before interpreting candidate results.
    owner_action: run_repair_backtest_inputs_dry_run_if_failed
    include_in_reader_brief: true
    include_in_daily_task_dashboard: true
    required_for_daily_reading: false
  - report_id: data_registry_consistency
    title: Data Registry Consistency
    group: shadow
    cadence: ad_hoc
    audience: operator
    owner: system
    command: aits data inspect-registry --latest
    artifact_globs:
      - artifacts/data_quality/*/data_registry_consistency.json
      - artifacts/data_quality/*/data_registry_consistency.md
    freshness_sla_days: 3
    freshness_rationale: Portfolio sensitivity and shadow backtest should use a consistent latest manifest and price cache view.
    owner_action: run_reconcile_price_cache_dry_run_if_failed
    include_in_reader_brief: true
    include_in_daily_task_dashboard: true
    required_for_daily_reading: false
  - report_id: price_cache_reconcile
    title: Price Cache Reconcile
    group: shadow
    cadence: ad_hoc
    audience: operator
    owner: system
    command: aits data reconcile-price-cache --latest
    artifact_globs:
      - artifacts/data_quality/*/price_cache_reconcile_summary.json
      - artifacts/data_quality/*/price_cache_reconcile_summary.md
      - artifacts/data_registry/price_cache_registry.json
    freshness_sla_days: 3
    freshness_rationale: Reconcile evidence should stay close to the latest manifest/cache state before interpreting portfolio sensitivity diagnostics.
    owner_action: run_reconcile_price_cache_if_registry_or_manifest_mismatch
    include_in_reader_brief: true
    include_in_daily_task_dashboard: true
    required_for_daily_reading: false
  - report_id: evidence_dashboard
    title: Evidence Dashboard
    group: daily
    cadence: daily
    audience: reviewer
    owner: system
    command: aits reports dashboard
    artifact_globs:
      - outputs/reports/evidence_dashboard_*.json
      - outputs/reports/evidence_dashboard_*.html
    freshness_sla_days: 1
    freshness_rationale: Evidence drill-down should match the daily decision date.
    owner_action: review_trace_bundle_if_missing
    include_in_reader_brief: true
    include_in_daily_task_dashboard: true
    required_for_daily_reading: false
  - report_id: daily_task_dashboard
    title: Daily Task Dashboard
    group: daily
    cadence: daily
    audience: operator
    owner: system
    command: aits reports daily-tasks
    artifact_globs:
      - outputs/reports/daily_task_dashboard_*.json
      - outputs/reports/daily_task_dashboard_*.html
    freshness_sla_days: 1
    freshness_rationale: Daily task status should describe the current run bundle.
    owner_action: review_daily_ops_run_if_missing
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: daily_decision_summary
    title: Daily Decision Summary
    group: daily
    cadence: daily
    audience: system
    owner: system
    command: aits reports daily-tasks
    artifact_globs:
      - outputs/reports/daily_decision_summary_*.json
    freshness_sla_days: 1
    freshness_rationale: Downstream order-intent and reader surfaces need same-day summary.
    owner_action: regenerate_daily_tasks_if_missing
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: true
  - report_id: calculation_explainers
    title: Calculation Explainers
    group: daily
    cadence: daily
    audience: reviewer
    owner: system
    command: aits reports calculation-explainers
    artifact_globs:
      - outputs/reports/calculation_explainers_*.json
    freshness_sla_days: 1
    freshness_rationale: Metric explanations should match the decision snapshot date.
    owner_action: regenerate_from_decision_snapshot_if_missing
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: score_change_attribution
    title: Score Change Attribution
    group: daily
    cadence: daily
    audience: investor
    owner: system
    command: aits reports score-change-attribution
    artifact_globs:
      - outputs/reports/score_change_attribution_*.json
      - outputs/reports/score_change_attribution_*.md
    freshness_sla_days: 1
    freshness_rationale: Change attribution is only useful when aligned with today's snapshot.
    owner_action: regenerate_if_prior_snapshot_available
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: market_panel
    title: Market Price Panel
    group: daily
    cadence: daily
    audience: investor
    owner: system
    command: aits reports market-panel
    artifact_globs:
      - outputs/reports/market_panel_*.json
      - outputs/reports/market_panel_*.md
    freshness_sla_days: 1
    freshness_rationale: Reader Brief market context should match today's decision date.
    owner_action: regenerate_after_validate_data_if_missing
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_portfolio_brief
    title: ETF Portfolio Brief
    group: daily
    cadence: daily
    audience: investor
    owner: system
    command: aits etf report daily --date YYYY-MM-DD
    artifact_globs:
      - reports/etf_portfolio/*_portfolio_brief.md
    freshness_sla_days: 1
    freshness_rationale: ETF portfolio decision-support brief should align with the latest ETF price cache date after ETF data quality passes.
    owner_action: run_aits_etf_run_daily_after_etf_data_quality_passes
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_parameter_governance
    title: ETF Parameter Governance
    group: governance
    cadence: ad_hoc
    audience: operator
    owner: system
    command: aits etf governance summary --candidate candidate.json
    artifact_globs:
      - reports/etf_portfolio/governance/*_parameter_governance.json
      - reports/etf_portfolio/governance/*_parameter_governance.md
    freshness_sla_days: 30
    freshness_rationale: ETF candidate promotion evidence is generated ad hoc and should be reviewed with the candidate package.
    owner_action: run_aits_etf_governance_summary_for_candidate_before_manual_review
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_credibility_gate
    title: ETF Credibility Gate
    group: governance
    cadence: ad_hoc
    audience: operator
    owner: system
    command: aits etf credibility validate
    artifact_globs:
      - reports/etf_portfolio/credibility/*_credibility_gate.json
      - reports/etf_portfolio/credibility/*_credibility_gate.md
    freshness_sla_days: 30
    freshness_rationale: ETF credibility gate is generated at the end of TRADING-063 or before shadow-evaluation review.
    owner_action: run_aits_etf_credibility_validate_after_063_subchecks_pass
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_data_quality
    title: ETF Data Quality Report
    group: data_quality
    cadence: daily
    audience: operator
    owner: system
    command: aits etf data validate
    artifact_globs:
      - reports/etf_portfolio/data_quality_*.md
    freshness_sla_days: 1
    freshness_rationale: ETF cached-data-dependent reports must disclose ETF-specific data quality before features, signals, allocation, backtests, and briefs are interpreted.
    owner_action: stop_etf_data_dependent_workflow_if_missing_or_failed
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_backtest_summary
    title: ETF Portfolio Backtest Summary & Standardized Metrics
    group: backtest
    cadence: ad_hoc
    audience: reviewer
    owner: system
    command: aits etf backtest run
    artifact_globs:
      - reports/etf_portfolio/backtests/*/summary.md
      - reports/etf_portfolio/backtests/*/summary.json
    freshness_sla_days: 30
    freshness_rationale: ETF portfolio backtest evidence, standardized metrics, monthly returns, benchmark excess, and null reason semantics should be refreshed after ETF strategy, risk, allocation, or config changes.
    owner_action: rerun_etf_backtest_after_etf_config_or_signal_change
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_experiment_run_manifest
