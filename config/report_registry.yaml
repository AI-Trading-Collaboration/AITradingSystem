    group: research
    cadence: ad_hoc
    visibility_policy: legacy_optional
    audience: reviewer
    owner: system
    command: aits etf experiments run --pack etf_calibration_v1
    artifact_globs:
      - reports/etf_portfolio/experiments/*/run_manifest.json
    freshness_sla_days: 30
    freshness_rationale: TRADING-064 experiment run manifest should remain discoverable for calibration audit.
    owner_action: rerun_etf_experiments_pack_when_calibration_inputs_change
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_experiment_comparison
    title: ETF Experiment Comparison
