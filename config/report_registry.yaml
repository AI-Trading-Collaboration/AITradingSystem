      - reports/etf_portfolio/experiments/*/candidate_selection_report.json
      - reports/etf_portfolio/experiments/*/candidate_selection_report.md
    freshness_sla_days: 30
    freshness_rationale: Candidate gate output is required before any shadow enrollment.
    owner_action: run_candidate_selection_before_shadow_enrollment
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_shadow_candidates
    title: ETF Shadow Candidate Registry
    group: research
    cadence: ad_hoc
    audience: reviewer
    owner: system
    command: aits etf experiments enroll-shadow --latest --top N
    artifact_globs:
      - data/simulation/etf_shadow_candidates.json
    freshness_sla_days:
    freshness_rationale: Shadow registry is runtime state; presence matters more than filename date.
    owner_action: enroll_eligible_etf_experiment_candidate_for_shadow_observation
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_experiment_weekly_review
    title: ETF Experiment Weekly Review
    group: research
    cadence: weekly
    audience: reviewer
    owner: system
    command: aits etf experiments weekly-review --latest
    artifact_globs:
      - reports/etf_portfolio/experiments/weekly_reviews/weekly_review_*.json
      - reports/etf_portfolio/experiments/weekly_reviews/weekly_review_*.md
    freshness_sla_days: 14
    freshness_rationale: Weekly review should be refreshed during active shadow observation.
    owner_action: run_weekly_review_for_active_etf_shadow_candidates
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_experiment_validation
    title: ETF Experiment Validation Gate
    group: research
    cadence: on_change
    audience: reviewer
    owner: system
    command: aits etf experiments validate --pack etf_calibration_v1
    artifact_globs:
      - reports/etf_portfolio/experiments/validation/*_experiment_validation.json
      - reports/etf_portfolio/experiments/validation/*_experiment_validation.md
    freshness_sla_days: 30
    freshness_rationale: TRADING-064 final validation should be refreshed after experiment infrastructure changes.
    owner_action: run_aits_etf_experiments_validate_before_marking_TRADING_064_done
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_forward_update
    title: ETF Forward Simulation Daily Update
    group: research
    cadence: daily
    audience: reviewer
    owner: system
    command: aits etf forward update --latest
    artifact_globs:
      - reports/etf_portfolio/forward/updates/forward_update_*.json
      - reports/etf_portfolio/forward/updates/forward_update_*.md
    freshness_sla_days: 3
    freshness_rationale: Active ETF shadow candidates should be evaluated against available forward market data after daily price cache updates.
    owner_action: run_aits_etf_forward_update_after_shadow_enrollment_and_price_refresh
    include_in_reader_brief: true
    include_in_daily_task_dashboard: true
    required_for_daily_reading: false
  - report_id: etf_forward_dashboard
