    group: research
    cadence: ad_hoc
    visibility_policy: legacy_optional
    audience: reviewer
    owner: system
    command: aits etf experiments select-candidates --latest
    artifact_globs:
      - reports/etf_portfolio/experiments/*/candidate_selection_report.json
      - reports/etf_portfolio/experiments/*/candidate_selection_report.md
    freshness_sla_days: 30
    freshness_rationale: Candidate gate output is required before any shadow enrollment.
    owner_action: run_candidate_selection_before_shadow_enrollment
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_shadow_candidates
    title: ETF Shadow Candidate Registry
    group: research
    cadence: ad_hoc
    audience: reviewer
    owner: system
    command: aits etf experiments enroll-shadow --latest --top N
    artifact_globs:
      - data/simulation/etf_shadow_candidates.json
    freshness_sla_days: 90
    freshness_rationale: Shadow registry is ad hoc runtime state; presence matters first, and a 90-day SLA keeps long-idle shadow records visible for manual review instead of silently current.
    owner_action: enroll_eligible_etf_experiment_candidate_for_shadow_observation
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
