    freshness_rationale: Governance boundary summary should reflect the latest daily report set.
    owner_action: regenerate_if_missing_or_stale
    include_in_reader_brief: true
    include_in_daily_task_dashboard: true
    required_for_daily_reading: false
  - report_id: reader_brief
    title: Reader Brief
    group: daily
    cadence: daily
    audience: investor
    owner: system
    command: aits reports reader-brief --date YYYY-MM-DD
    artifact_globs:
      - outputs/reports/reader_brief_*.json
      - outputs/reports/reader_brief_*.html
    freshness_sla_days: 1
    freshness_rationale: Reader Brief is the daily reading home and should be current.
    owner_action: regenerate_after_upstream_reports
    include_in_reader_brief: false
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
