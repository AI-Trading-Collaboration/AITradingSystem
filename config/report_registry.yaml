    freshness_rationale: AI confirmation should be visible when reviewing QQQ/SMH candidate exposure and shadow overlay evidence.
    owner_action: run_ai_confirmation_report_after_etf_data_quality_passes
    include_in_reader_brief: true
    include_in_daily_task_dashboard: true
    required_for_daily_reading: false
  - report_id: etf_ai_confirmation_overlay
