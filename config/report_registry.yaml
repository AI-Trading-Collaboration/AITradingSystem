schema_version: 1
policy_version: report_registry_v1
policy_metadata:
  owner: system
  status: pilot_baseline
  rationale: >
    Provide a single read-only index for report freshness, owner action, and
    production-effect boundaries without replacing docs/artifact_catalog.md.
  intended_effect: >
    Make stale or missing report artifacts visible to Reader Brief, daily task
    dashboard, and manual reviewers.
  validation_evidence: >
    Contract tests cover registry loading, latest artifact selection,
    freshness classification, HTML/JSON output, and read-only behavior.
  review_condition: >
    Review after report registry is used by at least one real daily-run bundle
    and before deriving docs/artifact_catalog.md from this registry.
defaults:
  production_effect: none
  missing_status: MISSING
  stale_status: STALE
  freshness_basis: calendar_days
  freshness_basis_by_cadence:
    daily: us_equity_trading_days
    weekly: us_equity_trading_days
    biweekly: us_equity_trading_days
    monthly: calendar_days
    ad_hoc: calendar_days
reports:
  - report_id: daily_score
    title: Daily Score Report
    group: daily
    cadence: daily
    audience: investor
    owner: system
    command: aits score-daily
    artifact_globs:
      - outputs/reports/daily_score_*.md
    freshness_sla_days: 1
    freshness_rationale: Daily decision reports should be same-day or prior trading day only.
    owner_action: review_if_missing_or_stale
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: true
  - report_id: data_quality
    title: Data Quality Report
    group: daily
    cadence: daily
    audience: operator
    owner: system
    command: aits validate-data
    artifact_globs:
      - outputs/reports/data_quality_*.md
    freshness_sla_days: 1
    freshness_rationale: Cached data-dependent reports must disclose current data quality.
    owner_action: stop_data_dependent_workflow_if_missing_or_failed
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: true
  - report_id: pit_source_manifest
    title: Point-in-Time Source Manifest
    group: governance
    cadence: monthly
    audience: operator
    owner: system
    command: aits data-sources pit-manifest report
    artifact_globs:
      - reports/data_governance/pit_source_manifest/*/pit_source_manifest.json
      - reports/data_governance/pit_source_manifest/*/pit_source_manifest.md
    artifact_selection_policy: latest_available
    freshness_sla_days: 45
    freshness_rationale: >
      Source-level PIT grade, revision risk, cache checksum, refresh policy and
      validation policy should be refreshed during monthly data governance or
      whenever data source catalog/cache contracts change.
    owner_action: run_aits_data_sources_pit_manifest_report_before_using_new_research_sources
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: data_refresh_audit
    title: Data Refresh Audit
    group: governance
    cadence: daily
    audience: operator
    owner: system
    command: aits data refresh-audit report --as-of YYYY-MM-DD
    artifact_globs:
      - reports/data_governance/data_refresh_audit/*/data_refresh_audit.json
      - reports/data_governance/data_refresh_audit/*/data_refresh_audit.md
    artifact_selection_policy: latest_available
    freshness_sla_days: 1
    freshness_rationale: >
      Paper-shadow data-dependent work needs same-day or latest complete-market
      evidence for refresh attempts, validate-data sidecar, checksum, row count,
      warning count and error count.
    owner_action: run_aits_validate_data_then_data_refresh_audit_report_before_paper_shadow_use
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: data_source_fallback_policy
    title: Data Source Fallback Policy
    group: governance
    cadence: daily
    audience: operator
    owner: system
    command: aits data fallback-policy run --as-of YYYY-MM-DD
    artifact_globs:
      - reports/data_governance/data_source_fallback_policy/*/data_source_fallback_policy.json
      - reports/data_governance/data_source_fallback_policy/*/data_source_fallback_policy.md
    artifact_selection_policy: latest_available
    freshness_sla_days: 1
    freshness_rationale: >
      Paper-shadow data-dependent work must know whether primary data was used,
      eligible fallback data was explicitly declared, or no valid source is
      available before freshness/readiness conclusions are interpreted.
    owner_action: run_aits_data_fallback_policy_before_paper_shadow_data_use
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: cache_catalog
    title: Checksum and Cache Catalog
    group: governance
    cadence: daily
    audience: operator
    owner: system
    command: aits data cache-catalog run --as-of YYYY-MM-DD
    artifact_globs:
      - reports/data_governance/cache_catalog/*/cache_catalog.json
      - reports/data_governance/cache_catalog/*/cache_catalog.md
    artifact_selection_policy: latest_available
    freshness_sla_days: 1
    freshness_rationale: >
      Paper-shadow data-dependent work must know whether required cache
      artifacts exist, match expected checksums, expose row/column counts, and
      link to refresh/validation evidence before cached data is interpreted.
    owner_action: run_aits_data_cache_catalog_before_paper_shadow_data_use
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: backtest_input_diagnostics
    title: Backtest Input Diagnostics
    group: shadow
    cadence: ad_hoc
    audience: operator
    owner: system
    command: aits data diagnose-backtest-inputs --latest
    artifact_globs:
      - artifacts/data_quality/*/backtest_input_diagnostics.json
      - artifacts/data_quality/*/backtest_input_diagnostics.md
      - artifacts/backtest_snapshots/*/backtest_input_manifest.json
    freshness_sla_days: 3
    freshness_rationale: Shadow backtest input diagnostics should match the latest cached data before interpreting candidate results.
    owner_action: run_repair_backtest_inputs_dry_run_if_failed
    include_in_reader_brief: true
    include_in_daily_task_dashboard: true
    required_for_daily_reading: false
  - report_id: data_registry_consistency
    title: Data Registry Consistency
    group: shadow
    cadence: ad_hoc
    visibility_policy: legacy_optional
    audience: operator
    owner: system
    command: aits data inspect-registry --latest
    artifact_globs:
