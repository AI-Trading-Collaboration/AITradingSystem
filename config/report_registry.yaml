    artifact_globs:
      - reports/etf_portfolio/experiments/*/comparison_report.json
      - reports/etf_portfolio/experiments/*/comparison_report.md
    freshness_sla_days: 30
    freshness_rationale: Experiment comparison is required before interpreting ranking or selection results.
    owner_action: run_aits_etf_experiments_compare_after_batch_run
    include_in_reader_brief: true
    include_in_daily_task_dashboard: false
    required_for_daily_reading: false
  - report_id: etf_experiment_candidate_selection
