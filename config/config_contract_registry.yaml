schema_version: 1
policy_id: config_contract_registry_v1
policy_version: 2026-06-19
policy_metadata:
  owner: system
  status: baseline
  rationale: >
    Register legacy configuration files that do not yet carry inline
    schema_version or policy_metadata so Stage B engineering closeout can audit
    their owner, status, and review boundary without mass-editing operational
    config payloads.
  intended_effect: >
    Provide explicit config contract coverage for release-readiness checks while
    preserving existing config semantics, strategy behavior, data flows, and
    production boundaries.
  validation_evidence: >
    Validated by aits reports engineering-stage-b-readiness and
    validate-engineering-stage-b-readiness.
  review_condition: >
    Review before platform freeze, before changing config schema compatibility
    rules, or when a registered config migrates to inline schema_version or
    policy_metadata.
defaults:
  owner: system
  status: legacy_registered
  schema_contract: legacy_unversioned_config
  rationale: >
    Existing config is covered by this registry for auditability; inline schema
    migration remains preferred when the config contract changes.
  review_condition: >
    Replace registry coverage with inline schema_version or policy_metadata when
    the owning module next changes the config contract.
