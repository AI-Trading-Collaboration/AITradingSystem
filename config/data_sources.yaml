sources:
  - source_id: yahoo_finance_daily_prices
    provider: Yahoo Finance via yfinance
    source_type: public_convenience
    status: active
    domains:
      - market_prices
    endpoint: yfinance.download
    adapter: YFinancePriceProvider
    cadence: daily
    requires_credentials: false
    cache_paths:
      - data/raw/prices_daily.csv
    primary_for:
      - daily_ohlcv
      - adjusted_close
      - volume
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - completeness
      - freshness
      - duplicate_keys
      - suspicious_returns
      - adjustment_ratio_changes
    limitations:
      - 公开便利源，不是交易所一手行情源。
      - 公司行动和复权调整必须在下游评分前通过校验。
    owner_notes: 当前 MVP 市场价格来源；数据质量门禁必须保持强制执行。

  - source_id: marketstack_eod_daily_prices
    provider: Marketstack
    source_type: paid_vendor
    status: active
    domains:
      - market_prices
    endpoint: https://api.marketstack.com/v2/eod
    adapter: MarketstackPriceProvider
    cadence: daily
    requires_credentials: true
    cache_paths:
      - data/raw/prices_marketstack_daily.csv
    primary_for:
      - daily_ohlcv_second_source
      - raw_close_reconciliation
      - adjusted_close_basis_crosscheck
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - completeness
      - freshness
      - duplicate_keys
      - suspicious_returns
      - cross_provider_close_reconciliation
      - adjusted_close_basis_warning
      - manifest_checksum
      - provider_symbol_alias
      - no_secret_leakage
    limitations:
      - Marketstack Basic 当前作为股票和 ETF 日线第二来源，不替代一手交易所行情。
      - Basic 历史深度约 10 年，足够覆盖 `ai_after_chatgpt` 默认窗口和当前 warm-up，但不支持更长历史压力测试。
      - "`^VIX` 等 Yahoo 风格宏观代理不在当前 Marketstack Basic 覆盖内，质量门禁需显式排除或标记限制。"
      - Marketstack 对部分 ETF 的 `adj_close` 与 Yahoo 分红复权口径不同；质量门禁以 raw `close` 作为阻塞核验，adjusted close 差异作为限制或调查项输出。
      - 第二来源只用于 cross-provider reconciliation，不自动平滑、覆盖或修正主价格缓存。
      - API plan 可能限制请求量、历史深度和字段覆盖。
    llm_permission:
      license_scope: paid_vendor_terms_not_reviewed_for_external_llm
      personal_use_only: true
      external_llm_allowed: false
      cache_allowed: true
      redistribution_allowed: false
      max_content_sent_level: metadata_only
      approval_ref: not_approved_for_external_llm_2026-05-05
      reviewed_at: 2026-05-05
    owner_notes: MARKETSTACK_API_KEY 只从环境变量读取；请求和报告不得输出密钥。

  - source_id: fred_daily_rates
    provider: Federal Reserve Economic Data
    source_type: primary_source
    status: active
    domains:
      - macro_rates
    endpoint: https://fred.stlouisfed.org/graph/fredgraph.csv
    adapter: FredRateProvider
    cadence: daily
    requires_credentials: false
    cache_paths:
      - data/raw/rates_daily.csv
    primary_for:
      - treasury_rates
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - completeness
      - freshness
      - duplicate_keys
      - plausible_ranges
      - suspicious_rate_changes
    limitations:
      - 利率序列可能在美股收盘后或非交易日更新。
    owner_notes: 当前 MVP 宏观利率来源。

  - source_id: local_trade_theses
    provider: Local YAML input
    source_type: manual_input
    status: active
    domains:
      - trade_thesis
    endpoint: data/external/trade_theses/*.yaml
    adapter: load_trade_thesis_store
    cadence: manual
    requires_credentials: false
    cache_paths:
      - data/external/trade_theses
    primary_for:
      - trade_hypothesis
      - falsification_conditions
    audit_fields:
      - provider
      - file_path
      - captured_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - duplicate_ids
      - watchlist_references
      - industry_chain_references
      - review_freshness
    limitations:
      - 手工输入，证据来源质量取决于交易记录纪律。
    owner_notes: 缺失时不能被报告视为高置信度交易假设。

  - source_id: local_valuation_snapshots
    provider: Local YAML input
    source_type: manual_input
    status: active
    domains:
      - valuation
    endpoint: data/external/valuation_snapshots/*.yaml
    adapter: load_valuation_snapshot_store
    cadence: manual
    requires_credentials: false
    cache_paths:
      - data/external/valuation_snapshots
    primary_for:
      - valuation_snapshot
      - expectation_snapshot
      - crowding_snapshot
    audit_fields:
      - provider
      - source_name
      - source_type
      - captured_at
      - file_path
      - checksum
    validation_checks:
      - schema
      - duplicate_ids
      - source_type
      - snapshot_freshness
      - plausible_percentiles
    limitations:
      - 手工快照只作为复核输入，不能直接变成自动估值评分。
    owner_notes: 自动评分前仍需接入正式供应商或一手披露数据。

  - source_id: structured_valuation_csv_imports
    provider: Structured valuation CSV export
    source_type: manual_input
    status: active
    domains:
      - valuation
    endpoint: data/external/valuation_imports/*.csv
    adapter: import_valuation_snapshots_from_csv
    cadence: manual
    requires_credentials: false
    cache_paths:
      - data/external/valuation_snapshots
      - outputs/reports/valuation_import_YYYY-MM-DD.md
    primary_for:
      - valuation_snapshot
      - expectation_snapshot
      - crowding_snapshot
    audit_fields:
      - provider
      - file_path
      - source_name
      - source_type
      - captured_at
      - row_count
      - checksum
    validation_checks:
      - required_columns
      - date_parsing
      - numeric_parsing
      - source_type
      - public_convenience_warning
      - downstream_snapshot_validation
    limitations:
      - 导入器只接受结构化宽表 CSV，不抓取网页，也不使用 LLM 生成估值结论。
      - CSV 每行仍必须声明真实 source_name 和 source_type；公开便利源只能作为辅助。
    owner_notes: 用于减少估值 YAML 手工维护；正式 vendor/API 接入前仍需保留来源审计。

  - source_id: fmp_valuation_expectations
    provider: Financial Modeling Prep
    source_type: paid_vendor
    status: active
    domains:
      - valuation
      - fundamentals
    endpoint: https://financialmodelingprep.com/stable/{quote-short,key-metrics-ttm,ratios-ttm,analyst-estimates,key-metrics,ratios}
    adapter: fetch_fmp_valuation_snapshots
    cadence: daily
    requires_credentials: true
    cache_paths:
      - data/raw/fmp_analyst_estimates
      - data/raw/fmp_historical_valuation
      - data/raw/fmp_forward_pit
      - data/external/valuation_snapshots
      - data/processed/pit_snapshots/fmp_forward_pit_YYYY-MM-DD.csv
      - outputs/reports/fmp_valuation_fetch_YYYY-MM-DD.md
      - outputs/reports/fmp_historical_valuation_fetch_YYYY-MM-DD.md
      - outputs/reports/fmp_forward_pit_fetch_YYYY-MM-DD.md
      - outputs/reports/fmp_analyst_history_validation_YYYY-MM-DD.md
      - outputs/reports/valuation_validation_YYYY-MM-DD.md
    primary_for:
      - valuation_snapshot
      - valuation_history_snapshot
      - expectation_snapshot
      - price_target_snapshot
      - analyst_rating_snapshot
      - earnings_calendar_snapshot
      - forward_only_pit_archive
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
      - source_name
      - source_type
    validation_checks:
      - endpoint_response
      - fmp_analyst_history_validation
      - fmp_historical_valuation_raw_payload
      - snapshot_schema
      - numeric_parsing
      - source_type
      - checksum
      - analyst_estimate_history_checksum
      - eps_revision_history_window
      - valuation_percentile_local_history
      - historical_valuation_captured_at
      - fmp_forward_pit_raw_payload
      - fmp_forward_pit_available_time
      - fmp_forward_pit_normalized_schema
      - fmp_forward_pit_as_of_query
      - downstream_snapshot_validation
    limitations:
      - forward_pe 使用当前 quote 与最近未来 annual EPS estimate 计算。
      - revenue_growth_next_12m_pct 是 annual estimate 代理口径，不是真正滚动 NTM 共识增速。
      - eps_revision_90d_pct 需要读取接近 90 天前的同一 fiscal estimate date 历史 analyst-estimates 快照；历史不足时会明确警告并跳过该指标。
      - valuation_percentile 使用本地估值快照历史计算；historical key metrics/ratios endpoint 权限不足时，不伪造供应商历史分位。
      - fetch-fmp-valuation-history 可用 FMP historical key-metrics/ratios 回填历史估值分布；这些快照的 captured_at 固定为采集日，历史回测在采集日前不可见。
      - historical key-metrics/ratios 是当前供应商历史接口返回的历史倍数，不替代真实 point-in-time vendor archive。
      - "内部 ticker 与 FMP provider symbol 不一致时必须用显式 alias；当前 `GOOG` 请求 FMP 使用 `GOOGL`，快照仍归属内部 ticker `GOOG`。"
      - FMP 返回负数估值倍数时记录警告并跳过该指标，避免把不可解释倍数写入自动评分输入。
      - HTTPS 连接、SSL、超时、429 和 5xx 临时错误会有限重试；402 等权限错误不重试，必须按 entitlement 问题处理。
      - forward-only PIT 抓取的 analyst estimates、price target、ratings 和 earnings calendar 只从采集日后可见，不改变当前评分语义；下游必须使用 available_time <= decision_time。
      - "`eps_revision_90d_pct` 只有在自建 PIT normalized 索引存在足够 90 天历史时才可计算；样本不足时必须降级。"
      - API plan 或 entitlement 可能限制 endpoint 字段和请求频率。
    llm_permission:
      license_scope: paid_vendor_terms_not_reviewed_for_external_llm
      personal_use_only: true
      external_llm_allowed: false
      cache_allowed: true
      redistribution_allowed: false
      max_content_sent_level: metadata_only
      approval_ref: not_approved_for_external_llm_2026-05-04
      reviewed_at: 2026-05-04
    owner_notes: FMP_API_KEY 只从环境变量读取，命令、报告和错误信息不得输出密钥。

  - source_id: eodhd_earnings_trends
    provider: EODHD
    source_type: paid_vendor
    status: active
    domains:
      - valuation
      - fundamentals
    endpoint: https://eodhd.com/api/calendar/trends
    adapter: fetch_eodhd_earnings_trend_snapshots
    cadence: daily
    requires_credentials: true
    cache_paths:
      - data/raw/eodhd_earnings_trends
      - data/external/valuation_snapshots
      - outputs/reports/eodhd_earnings_trends_fetch_YYYY-MM-DD.md
      - outputs/reports/valuation_validation_YYYY-MM-DD.md
    primary_for:
      - expectation_snapshot
      - eps_revision_90d_pct_current_baseline
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
      - source_name
      - source_type
      - base_snapshot_id
    validation_checks:
      - endpoint_response
      - raw_payload_checksum
      - trend_schema
      - provider_symbol_alias
      - positive_epsTrendCurrent
      - positive_epsTrend90daysAgo
      - base_valuation_snapshot_presence
      - captured_at_forward_only
      - downstream_snapshot_validation
    limitations:
      - 该 baseline 只把 EODHD Earnings Trends 的 epsTrendCurrent 和 epsTrend90daysAgo 合并进当前可见基础估值快照，用于生成当前 eps_revision_90d_pct。
      - EODHD trends 合并快照继承基础快照的估值倍数、估值分位、拥挤度和相关来源说明；不会从 trends 推断估值指标。
      - 生成快照标记为 captured_snapshot、vendor_current_trend 和 captured_at_forward_only；采集日前严格回测不能把这些 trend 字段当作当时可见数据。
      - 该来源不能替代 Intrinio/Zacks、FactSet 或等价真实 point-in-time estimates archive。
      - EODHD provider symbol 默认把内部美股 ticker 映射为 TICKER.US，异常映射必须显式登记。
      - API plan 或 entitlement 可能限制 endpoint 字段、历史深度和请求频率。
    llm_permission:
      license_scope: paid_vendor_terms_not_reviewed_for_external_llm
      personal_use_only: true
      external_llm_allowed: false
      cache_allowed: true
      redistribution_allowed: false
      max_content_sent_level: metadata_only
      approval_ref: not_approved_for_external_llm_2026-05-04
      reviewed_at: 2026-05-04
    owner_notes: EODHD_API_KEY 只从环境变量读取，命令、报告和错误信息不得输出密钥；该来源是 DATA-001 baseline，不是完整 PIT 完成条件。

  - source_id: self_archived_pit_snapshots
    provider: Local forward-only PIT snapshot archive
    source_type: manual_input
    status: active
    domains:
      - valuation
      - fundamentals
    endpoint: data/raw/pit_snapshots/manifest.csv
    adapter: pit_snapshots.validate
    cadence: daily
    requires_credentials: false
    cache_paths:
      - data/raw/pit_snapshots/manifest.csv
      - data/processed/pit_snapshots/fmp_forward_pit_YYYY-MM-DD.csv
      - outputs/reports/pit_snapshots_validation_YYYY-MM-DD.md
    primary_for:
      - raw_snapshot_manifest
      - self_archived_as_of_inputs
      - forward_only_pit_evidence
    audit_fields:
      - snapshot_id
      - source_id
      - provider
      - file_path
      - endpoint
      - request_parameters
      - raw_payload_path
      - raw_payload_sha256
      - checksum
      - raw_payload_bytes
      - row_count
      - ingested_at
      - available_time
      - point_in_time_class
      - backtest_use
      - license_use_class
    validation_checks:
      - manifest_schema
      - required_fields
      - raw_payload_exists
      - raw_payload_checksum
      - raw_payload_bytes
      - row_count
      - duplicate_snapshot_id
      - available_time
      - strict_point_in_time_claims
      - provider_permissions
      - no_secret_leakage
    limitations:
      - forward-only 自建 PIT 快照只能从采集日向后积累，漏跑日期不能事后补写成严格 PIT。
      - 第一阶段只校验 manifest 和 raw payload，不改变 `score-daily` 评分语义。
      - 供应商 raw payload 的缓存、再分发和外部 LLM 处理权限仍以原始 provider 条款为准。
    llm_permission:
      license_scope: local_metadata_manifest_only
      personal_use_only: true
      external_llm_allowed: false
      cache_allowed: true
      redistribution_allowed: false
      max_content_sent_level: metadata_only
      approval_ref: pit_manifest_metadata_only_2026-05-05
      reviewed_at: 2026-05-05
    owner_notes: DATA-003 阶段 1 的通用自建 PIT raw snapshot manifest；下游只能通过 available_time <= decision_time 查询。

  - source_id: local_risk_event_occurrences
    provider: Local YAML input
    source_type: manual_input
    status: active
    domains:
      - risk_events
      - news_events
    endpoint: data/external/risk_event_occurrences/*.yaml
    adapter: load_risk_event_occurrence_store
    cadence: event_driven
    requires_credentials: false
    cache_paths:
      - data/external/risk_event_occurrences
    primary_for:
      - policy_event_occurrences
      - geopolitical_event_occurrences
      - risk_event_scoring_inputs
    audit_fields:
      - provider
      - event_id
      - occurrence_id
      - status
      - triggered_at
      - last_confirmed_at
      - evidence_sources
      - captured_at
      - source_url
      - file_path
      - checksum
    validation_checks:
      - schema
      - duplicate_ids
      - known_event_id
      - date_bounds
      - source_attribution
      - source_policy_grade
      - active_event_freshness
      - review_attestation_freshness
      - public_convenience_exclusion
    limitations:
      - 手工发生记录只说明已审计的触发事件；空目录不能证明当前没有政策或地缘风险。
      - 当前有效复核声明只说明人工复核覆盖窗口和列出的来源范围，不能替代后续 active/watch 发生记录。
      - public_convenience 证据只能作为辅助线索，不能单独进入评分。
      - 保守 source policy 下，S/A 级 active 风险证据可支持普通评分和仓位闸门；B 级只可进入普通评分；C/D/X 只能进入报告或人工复核。
    owner_notes: 日报政策/地缘评分只读取已通过校验的发生记录，不读取监控规则的 active 字段。

  - source_id: reviewed_risk_event_daily_attestations
    provider: Human-reviewed daily risk event attestation
    source_type: manual_input
    status: active
    domains:
      - risk_events
      - news_events
    endpoint: data/external/risk_event_occurrences/review_attestation_*.yaml
    adapter: load_risk_event_occurrence_store
    cadence: daily
    requires_credentials: false
    cache_paths:
      - data/external/risk_event_occurrences
      - outputs/reports/risk_event_occurrences_YYYY-MM-DD.md
    primary_for:
      - policy_geopolitics_review_attestation
      - risk_event_scoring_input_completeness
    audit_fields:
      - provider
      - file_path
      - checksum
      - attestation_id
      - review_date
      - coverage_start
      - coverage_end
      - reviewer
      - reviewed_at
      - review_decision
      - next_review_due
      - checked_sources
      - rationale
    validation_checks:
      - schema
      - duplicate_ids
      - date_bounds
      - coverage_includes_as_of
      - authoritative_source_scope
      - review_due_freshness
    limitations:
      - 复核声明只代表指定窗口和来源范围内的人工检查结果；不是自动风险消除证明。
      - 只有覆盖 as_of、未过期、结论为 confirmed_no_unrecorded_material_events 且来源范围合格时，才允许政策/地缘模块摆脱 insufficient_data。
      - 复核声明不会触发仓位闸门，也不会覆盖已记录的 active/watch 发生记录。
    owner_notes: 系统不得自动代填真实声明；CLI 只在用户显式提供复核人、来源范围和理由时写入。

  - source_id: reviewed_risk_event_occurrence_csv_imports
    provider: Human-reviewed event occurrence CSV
    source_type: manual_input
    status: active
    domains:
      - risk_events
      - news_events
    endpoint: data/external/risk_event_imports/*.csv
    adapter: import_risk_event_occurrences_csv
    cadence: event_driven
    requires_credentials: false
    cache_paths:
      - data/external/risk_event_occurrences
      - outputs/reports/risk_event_occurrence_import_YYYY-MM-DD.md
    primary_for:
      - policy_event_occurrences
      - geopolitical_event_occurrences
      - risk_event_scoring_inputs
    audit_fields:
      - provider
      - file_path
      - occurrence_id
      - event_id
      - status
      - captured_at
      - row_count
      - checksum
    validation_checks:
      - required_columns
      - duplicate_occurrence_merge
      - source_type
      - source_policy_grade
      - date_parsing
      - source_attribution
      - downstream_occurrence_validation
    limitations:
      - CSV 必须是人工复核后的事件发生记录，不能把原始新闻自动转换为交易动作。
      - 多行同一 occurrence_id 只用于合并证据来源，关键字段不一致会停止导入。
      - 缺失 action_class 时默认 manual_review；B 级证据不得单独触发 position gate。
    owner_notes: 用于减少风险事件 YAML 手工维护；L2/L3 仍必须经过人工复核。

  - source_id: local_trade_records
    provider: Local YAML input
    source_type: manual_input
    status: active
    domains:
      - trade_records
    endpoint: data/external/trades/*.yaml
    adapter: load_trade_record_store
    cadence: manual
    requires_credentials: false
    cache_paths:
      - data/external/trades
    primary_for:
      - trade_review
      - attribution_inputs
    audit_fields:
      - provider
      - file_path
      - captured_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - duplicate_ids
      - known_tickers
      - date_bounds
      - thesis_reference_presence
    limitations:
      - 手工交易记录依赖记录纪律；缺少 thesis 关联会降低归因质量。
    owner_notes: 在市场数据质量门禁通过后供 review-trades 使用。

  - source_id: local_portfolio_positions
    provider: Local CSV input
    source_type: manual_input
    status: active
    domains:
      - portfolio_positions
    endpoint: data/external/portfolio_positions/current_positions.csv
    adapter: build_portfolio_exposure_report
    cadence: manual
    requires_credentials: false
    cache_paths:
      - data/external/portfolio_positions/current_positions.csv
    primary_for:
      - portfolio_exposure
      - daily_report_read_only_context
    audit_fields:
      - provider
      - file_path
      - as_of
      - ticker
      - market_value
      - currency
      - ai_exposure_pct
      - checksum
    validation_checks:
      - required_columns
      - row_schema
      - snapshot_selection
      - non_usd_warning
      - node_mapping_coverage
      - no_watchlist_substitution
    limitations:
      - 只接受项目 owner 提供的真实持仓文件，不能用观察池、模型建议仓位或 AI 产业链评分替代。
      - 基础版只做只读暴露分解，不改变评分、仓位闸门、执行建议或回测仓位。
      - 非 USD 持仓只提示风险，基础版不做 FX 换算。
    owner_notes: PORTFOLIO-002 第一阶段输入；缺少文件时日报显示 NOT_CONNECTED。

