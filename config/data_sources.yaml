sources:
  - source_id: fmp_eod_daily_prices
    provider: Financial Modeling Prep
    source_type: paid_vendor
    status: active
    domains:
      - market_prices
    endpoint: https://financialmodelingprep.com/stable/historical-price-eod/non-split-adjusted; https://financialmodelingprep.com/stable/historical-price-eod/dividend-adjusted
    adapter: FmpPriceProvider
    cadence: daily
    requires_credentials: true
    cache_paths:
      - data/raw/prices_daily.csv
    primary_for:
      - daily_ohlcv_primary
      - adjusted_close
      - volume
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
      - provider_symbol_alias
      - adjusted_price_endpoint
    validation_checks:
      - schema
      - completeness
      - freshness
      - duplicate_keys
      - suspicious_returns
      - adjustment_ratio_changes
      - manifest_checksum
      - no_secret_leakage
    limitations:
      - FMP Starter plan 当前用于低成本股票/ETF 日线主源；历史深度上限按 plan 约束，长历史压力测试可能不足。
      - "`^VIX` 不通过 FMP 股票价格主源抓取，由 `cboe_vix_daily_prices` 单独补入主价格缓存。"
      - "股票/ETF 价格路径直接按内部 ticker 请求；`GOOG` 不再映射为 `GOOGL`。估值/PIT 路径的 provider alias 独立维护，不能复用到价格路径。"
      - 2026-05-05 质量复核显示，此前 SPY、INTC、MSFT、SOXX 的硬错误主要落在 Marketstack 第二源缓存；下一次真实下载后仍必须用质量门禁重新验证 FMP 主源，不能本地静默修正。
      - 与 Marketstack 的 adjusted close 分红复权口径差异必须保留为质量门禁限制或调查项，不能自动平滑。
      - API plan 可能限制历史深度、请求频率和字段覆盖。
    llm_permission:
      license_scope: paid_vendor_terms_not_reviewed_for_external_llm
      personal_use_only: true
      external_llm_allowed: false
      cache_allowed: true
      redistribution_allowed: false
      max_content_sent_level: metadata_only
      approval_ref: not_approved_for_external_llm_2026-05-05
      reviewed_at: 2026-05-05
    owner_notes: FMP_API_KEY 只从环境变量读取；默认 `aits download-data` 使用该来源写入主价格缓存，命令、报告和 manifest 不得输出密钥。

  - source_id: cboe_vix_daily_prices
    provider: Cboe Global Markets
    source_type: primary_source
    status: active
    domains:
      - market_prices
    endpoint: https://cdn.cboe.com/api/global/us_indices/daily_prices/VIX_History.csv
    adapter: CboeVixPriceProvider
    cadence: daily
    requires_credentials: false
    cache_paths:
      - data/raw/prices_daily.csv
    primary_for:
      - vix_index
      - risk_sentiment
      - macro_risk_asset_budget
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - completeness
      - freshness
      - duplicate_keys
      - suspicious_returns
      - no_secret_leakage
    limitations:
      - Cboe VIX CSV 只提供 VIX Index OHLC，不提供成交量；标准化缓存中 `volume` 留空。
      - "`adj_close` 等于 `close`，因为 VIX Index 不适用股票分红复权。"
      - Cboe 下载失败、schema 异常或目标日期范围空结果必须 fail closed，不得用 Yahoo 或本地缓存补写。
    llm_permission:
      license_scope: public_official_index_reference
      personal_use_only: false
      external_llm_allowed: true
      cache_allowed: true
      redistribution_allowed: false
      max_content_sent_level: metadata_only
      approval_ref: public_cboe_vix_history_2026-05-05
      reviewed_at: 2026-05-05
    owner_notes: 用于补 FMP 不覆盖的内部 ticker `^VIX`；默认 `aits download-data` 将其合并进主价格缓存并在 manifest 单独记录。

  - source_id: yahoo_finance_daily_prices
    provider: Yahoo Finance via yfinance
    source_type: public_convenience
    status: inactive
    domains:
      - market_prices
    endpoint: yfinance.download
    adapter: YFinancePriceProvider
    cadence: daily
    requires_credentials: false
    cache_paths:
      - data/raw/prices_daily.csv
    primary_for:
      - daily_ohlcv
      - adjusted_close
      - volume
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - completeness
      - freshness
      - duplicate_keys
      - suspicious_returns
      - adjustment_ratio_changes
    limitations:
      - 公开便利源，不是交易所一手行情源。
      - 公司行动和复权调整必须在下游评分前通过校验。
      - 2026-05-05 数据质量门禁发现 SPY 非正价格、OHLC 逻辑异常和供应商复权口径冲突，已从默认生产主源移除。
      - 后续可作为 Marketstack 明显自身坏行的显式诊断性第三来源复查；复查结果只能进入数据源健康或调查报告，不得写入主价格缓存、第二源缓存、评分、回测真值或仓位闸门。
    owner_notes: 仅保留为显式 `--price-provider yahoo` 迁移调查选项和 DATA-012 诊断复查候选；默认生产主源已切换为 FMP。

  - source_id: marketstack_eod_daily_prices
    provider: Marketstack
    source_type: paid_vendor
    status: active
    domains:
      - market_prices
    endpoint: https://api.marketstack.com/v2/eod
    adapter: MarketstackPriceProvider
    cadence: daily
    requires_credentials: true
    cache_paths:
      - data/raw/prices_marketstack_daily.csv
    primary_for:
      - daily_ohlcv_second_source
      - raw_close_reconciliation
      - adjusted_close_basis_crosscheck
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - completeness
      - freshness
      - duplicate_keys
      - suspicious_returns
      - cross_provider_close_reconciliation
      - adjusted_close_basis_warning
      - manifest_checksum
      - provider_symbol_alias
      - no_secret_leakage
    limitations:
      - Marketstack Basic 当前作为股票和 ETF 日线第二来源，不替代一手交易所行情。
      - Basic 历史深度约 10 年，足够覆盖 `ai_after_chatgpt` 默认窗口和当前 warm-up，但不支持更长历史压力测试。
      - "`^VIX` 等 Yahoo 风格宏观代理不在当前 Marketstack Basic 覆盖内，质量门禁需显式排除或标记限制。"
      - Marketstack 对部分 ETF 的 `adj_close` 与 Yahoo 分红复权口径不同；质量门禁以 raw `close` 作为阻塞核验，adjusted close 差异作为限制或调查项输出。
      - 2026-05-05 真实缓存复核发现 SPY 非正价格、INTC/MSFT OHLC 异常和 SOXX split 日 adjusted close 异常主要落在 Marketstack 第二源；第二源自身异常默认作为数据源健康告警显式报告，不得自动覆盖或修正主价格缓存。
      - 第二来源只用于 cross-provider reconciliation，不自动平滑、覆盖或修正主价格缓存；主源/二源 raw close 未解决冲突仍会阻断下游流程。
      - 当 Marketstack 自身坏行明显且 FMP 主源对应行通过时，可用 Yahoo 做只读诊断复查；Yahoo 一致性只能增强归因，不得自动把 Marketstack 或 FMP 的缓存改写。
      - API plan 可能限制请求量、历史深度和字段覆盖。
    llm_permission:
      license_scope: paid_vendor_terms_not_reviewed_for_external_llm
      personal_use_only: true
      external_llm_allowed: false
      cache_allowed: true
      redistribution_allowed: false
      max_content_sent_level: metadata_only
      approval_ref: not_approved_for_external_llm_2026-05-05
      reviewed_at: 2026-05-05
    owner_notes: MARKETSTACK_API_KEY 只从环境变量读取；请求和报告不得输出密钥。

  - source_id: fred_daily_rates
    provider: Federal Reserve Economic Data
    source_type: primary_source
    status: active
    domains:
      - macro_rates
    endpoint: https://fred.stlouisfed.org/graph/fredgraph.csv
    adapter: FredRateProvider
    cadence: daily
    requires_credentials: false
    cache_paths:
      - data/raw/rates_daily.csv
    primary_for:
      - treasury_rates
      - broad_usd_index
    audit_fields:
      - provider
      - endpoint
      - request_parameters
      - downloaded_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - completeness
      - freshness
      - duplicate_keys
      - series_specific_plausible_ranges
      - suspicious_rate_or_index_changes
    limitations:
      - FRED 宏观序列可能在美股收盘后或非交易日更新。
      - Federal Reserve H.10 通常按周发布上一周的每日汇率和美元指数；`DTWEXBGS` freshness 必须按 series 级阈值解释。
      - "`DTWEXBGS` 是 Federal Reserve 广义美元指数代理，不是 ICE DXY；报告不得把它称为 official DXY。"
    owner_notes: 当前 MVP 宏观利率和广义美元指数来源。

  - source_id: local_trade_theses
    provider: Local YAML input
    source_type: manual_input
    status: active
    domains:
      - trade_thesis
    endpoint: data/external/trade_theses/*.yaml
    adapter: load_trade_thesis_store
    cadence: manual
    requires_credentials: false
    cache_paths:
      - data/external/trade_theses
    primary_for:
      - trade_hypothesis
      - falsification_conditions
    audit_fields:
      - provider
      - file_path
      - captured_at
      - row_count
      - checksum
    validation_checks:
      - schema
      - duplicate_ids
      - watchlist_references
      - industry_chain_references
      - review_freshness
    limitations:
      - 手工输入，证据来源质量取决于交易记录纪律。
    owner_notes: 缺失时不能被报告视为高置信度交易假设。

  - source_id: local_valuation_snapshots
