policy_metadata:
  version: scoring_rules_v1
  status: pilot
  owner: system
  rationale: "将既有评分、仓位、日报结论和置信度边界迁入可审计配置；初始数值保持迁移前行为不变，后续由 market feedback optimization 回测与复盘迭代。"
  validation: "配置加载由 tests/test_config.py 覆盖；评分路径由 tests/test_position_model.py 与 tests/test_daily_scoring.py 覆盖；权重和阈值迭代跟踪 CALIBRATION-003/GOV-004。"
  review_after_reports: 8

weights:
  trend: 25
  fundamentals: 25
  macro_liquidity: 15
  risk_sentiment: 15
  valuation: 10
  policy_geopolitics: 10

minimum_signal_coverage: 0.50

position_bands:
  - min_score: 80
    min_position: 0.80
    max_position: 1.00
    label: "重仓"
  - min_score: 65
    min_position: 0.60
    max_position: 0.80
    label: "偏重仓"
  - min_score: 50
    min_position: 0.40
    max_position: 0.60
    label: "中性"
  - min_score: 35
    min_position: 0.20
    max_position: 0.40
    label: "防守"
  - min_score: 0
    min_position: 0.00
    max_position: 0.20
    label: "极端防守"

daily_conclusion:
  defensive_score_below: 45
  constrained_score_min: 55
  aggressive_score_min: 65
  constructive_score_min: 55
  attractiveness_strong_min: 65
  attractiveness_medium_strong_min: 55
  attractiveness_neutral_min: 45
  watch_condition_score_min: 55
  support_score_min: 55
  support_confidence_min: 0.60
  pressure_score_below: 50
  pressure_confidence_below: 0.60
  weak_fundamentals_score_below: 45
  fundamentals_constructive_min: 50
  valuation_pressure_score_below: 50
  trend_or_risk_pressure_score_below: 50
  low_component_score_below: 50
  core_module_reduction_score_below: 45

confidence_policy:
  high_confidence_min: 0.75
  medium_confidence_min: 0.60
  low_component_confidence_below: 0.60
  data_quality_fail_penalty: 100
  data_quality_warning_penalty: 15
  feature_warning_penalty: 5
  fundamental_warning_penalty: 5
  manual_review_failure_penalty: 30
  manual_review_warning_penalty: 10
  position_cap_bands:
    - min_confidence_score: 75
      cap_multiplier: 1.00
    - min_confidence_score: 60
      cap_multiplier: 0.85
    - min_confidence_score: 45
      cap_multiplier: 0.70
    - min_confidence_score: 0
      cap_multiplier: 0.50

source_type_confidence:
  partial_hard_data_base: 0.55
  partial_hard_data_coverage_multiplier: 0.35
  partial_hard_data_max: 0.90
  manual_input_max: 0.75
  partial_manual_input_max: 0.60
  llm_formal_assessment: 0.65
  partial_llm_formal_assessment: 0.55
  insufficient_data: 0.35
  placeholder: 0.25
  derived: 1.00
  unknown_source_type_max: 0.50

trend:
  neutral_score: 50
  signals:
    - subject: SPY
      feature: above_ma_100
      bullish_above: 0.5
      points: 10
    - subject: SPY
      feature: above_ma_200
      bullish_above: 0.5
      points: 10
    - subject: QQQ
      feature: above_ma_100
      bullish_above: 0.5
      points: 10
    - subject: QQQ
      feature: above_ma_200
      bullish_above: 0.5
      points: 10
    - subject: SMH
      feature: above_ma_100
      bullish_above: 0.5
      points: 12
    - subject: SMH
      feature: above_ma_200
      bullish_above: 0.5
      points: 12
    - subject: SOXX
      feature: above_ma_100
      bullish_above: 0.5
      points: 8
    - subject: SOXX
      feature: above_ma_200
      bullish_above: 0.5
      points: 8
    - subject: AI_CORE_WATCHLIST
      feature: above_ma_200_ratio
      scale_min: 0.0
      scale_max: 1.0
      points: 10
    - subject: SMH/SPY
      feature: relative_strength_return_20d
      bullish_above: 0.0
      points: 10

fundamentals:
  neutral_score: 50
  signals:
    - subject: AI_CORE_MEDIAN
      feature: gross_margin_quarterly_median
      scale_min: 0.35
      scale_max: 0.70
      points: 25
    - subject: AI_CORE_MEDIAN
      feature: operating_margin_quarterly_median
      scale_min: 0.05
      scale_max: 0.40
      points: 25
    - subject: AI_CORE_MEDIAN
      feature: net_margin_quarterly_median
      scale_min: 0.00
      scale_max: 0.30
      points: 20
    - subject: AI_CORE_MEDIAN
      feature: research_and_development_intensity_quarterly_median
      scale_min: 0.05
      scale_max: 0.18
      points: 15
    - subject: AI_CORE_MEDIAN
      feature: capex_intensity_annual_median
      scale_min: 0.05
      scale_max: 0.30
      points: 15

macro_liquidity:
  neutral_score: 50
  signals:
    - subject: DGS10
      feature: rate_change_20d
      bearish_above: 0.25
      bullish_below: -0.10
      points: 40
    - subject: DGS2
      feature: rate_change_20d
      bearish_above: 0.25
      bullish_below: -0.10
      points: 30
    - subject: DTWEXBGS
      feature: return_20d
      bearish_above: 0.03
      bullish_below: -0.03
      points: 30

risk_sentiment:
  neutral_score: 50
  signals:
    - subject: ^VIX
      feature: vix_current
      bullish_below: 16.0
      bearish_above: 25.0
      points: 35
    - subject: ^VIX
      feature: vix_percentile_252
      bullish_below: 0.40
      bearish_above: 0.80
      points: 35
    - subject: ^VIX
      feature: return_5d
      bullish_below: -0.10
      bearish_above: 0.20
      points: 30

valuation:
  neutral_score: 50
  signals:
    - subject: AI_CORE_MEDIAN
      feature: valuation_percentile
      bullish_below: 35
      bearish_above: 85
      points: 60
    - subject: AI_CORE
      feature: overheated_snapshot_ratio
      bullish_below: 0.10
      bearish_above: 0.50
      points: 40

policy_geopolitics:
  neutral_score: 50
  signals:
    - subject: POLICY_GEOPOLITICS
      feature: active_or_watch_l3_count
      bullish_below: 0.5
      bearish_above: 1.0
      points: 45
    - subject: POLICY_GEOPOLITICS
      feature: active_or_watch_l2_count
      bullish_below: 0.5
      bearish_above: 2.0
      points: 35
    - subject: POLICY_GEOPOLITICS
      feature: minimum_exposure_multiplier
      bullish_above: 0.95
      bearish_below: 0.25
      points: 20

placeholders:
  fundamentals:
    score: 50
    reason: "基本面硬数据占位：未向评分流程传入已通过校验的 SEC 基本面特征。"
  valuation:
    score: 50
    reason: "MVP 阶段占位：尚未接入估值和预期数据。"
  policy_geopolitics:
    score: 50
    reason: "政策/地缘占位：未向评分流程传入已校验的风险事件发生记录。"

position_change:
  minimum_action_delta: 0.05

position_gates:
  valuation:
    expensive_or_crowded_max_position: 0.70
    extreme_overheated_max_position: 0.40
  thesis:
    warning_max_position: 0.70
    failure_max_position: 0.00
  data_confidence:
    data_quality_warning_max_position: 0.80
    insufficient_data_max_position: 0.60
    placeholder_max_position: 0.80
