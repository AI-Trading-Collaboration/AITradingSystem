weights:
  trend: 25
  fundamentals: 25
  macro_liquidity: 15
  risk_sentiment: 15
  valuation: 10
  policy_geopolitics: 10

minimum_signal_coverage: 0.50

trend:
  neutral_score: 50
  signals:
    - subject: SPY
      feature: above_ma_100
      bullish_above: 0.5
      points: 10
    - subject: SPY
      feature: above_ma_200
      bullish_above: 0.5
      points: 10
    - subject: QQQ
      feature: above_ma_100
      bullish_above: 0.5
      points: 10
    - subject: QQQ
      feature: above_ma_200
      bullish_above: 0.5
      points: 10
    - subject: SMH
      feature: above_ma_100
      bullish_above: 0.5
      points: 12
    - subject: SMH
      feature: above_ma_200
      bullish_above: 0.5
      points: 12
    - subject: SOXX
      feature: above_ma_100
      bullish_above: 0.5
      points: 8
    - subject: SOXX
      feature: above_ma_200
      bullish_above: 0.5
      points: 8
    - subject: AI_CORE_WATCHLIST
      feature: above_ma_200_ratio
      scale_min: 0.0
      scale_max: 1.0
      points: 10
    - subject: SMH/SPY
      feature: relative_strength_return_20d
      bullish_above: 0.0
      points: 10

fundamentals:
  neutral_score: 50
  signals:
    - subject: AI_CORE_MEDIAN
      feature: gross_margin_quarterly_median
      scale_min: 0.35
      scale_max: 0.70
      points: 25
    - subject: AI_CORE_MEDIAN
      feature: operating_margin_quarterly_median
      scale_min: 0.05
      scale_max: 0.40
      points: 25
    - subject: AI_CORE_MEDIAN
      feature: net_margin_quarterly_median
      scale_min: 0.00
      scale_max: 0.30
      points: 20
    - subject: AI_CORE_MEDIAN
      feature: research_and_development_intensity_quarterly_median
      scale_min: 0.05
      scale_max: 0.18
      points: 15
    - subject: AI_CORE_MEDIAN
      feature: capex_intensity_annual_median
      scale_min: 0.05
      scale_max: 0.30
      points: 15

macro_liquidity:
  neutral_score: 50
  signals:
    - subject: DGS10
      feature: rate_change_20d
      bearish_above: 0.25
      bullish_below: -0.10
      points: 40
    - subject: DGS2
      feature: rate_change_20d
      bearish_above: 0.25
      bullish_below: -0.10
      points: 30
    - subject: DX-Y.NYB
      feature: return_20d
      bearish_above: 0.03
      bullish_below: -0.03
      points: 30

risk_sentiment:
  neutral_score: 50
  signals:
    - subject: ^VIX
      feature: vix_current
      bullish_below: 16.0
      bearish_above: 25.0
      points: 35
    - subject: ^VIX
      feature: vix_percentile_252
      bullish_below: 0.40
      bearish_above: 0.80
      points: 35
    - subject: ^VIX
      feature: return_5d
      bullish_below: -0.10
      bearish_above: 0.20
      points: 30

valuation:
  neutral_score: 50
  signals:
    - subject: AI_CORE_MEDIAN
      feature: valuation_percentile
      bullish_below: 35
      bearish_above: 85
      points: 60
    - subject: AI_CORE
      feature: overheated_snapshot_ratio
      bullish_below: 0.10
      bearish_above: 0.50
      points: 40

policy_geopolitics:
  neutral_score: 50
  signals:
    - subject: POLICY_GEOPOLITICS
      feature: active_or_watch_l3_count
      bullish_below: 0.5
      bearish_above: 1.0
      points: 45
    - subject: POLICY_GEOPOLITICS
      feature: active_or_watch_l2_count
      bullish_below: 0.5
      bearish_above: 2.0
      points: 35
    - subject: POLICY_GEOPOLITICS
      feature: minimum_exposure_multiplier
      bullish_above: 0.95
      bearish_below: 0.25
      points: 20

placeholders:
  fundamentals:
    score: 50
    reason: "基本面硬数据占位：未向评分流程传入已通过校验的 SEC 基本面特征。"
  valuation:
    score: 50
    reason: "MVP 阶段占位：尚未接入估值和预期数据。"
  policy_geopolitics:
    score: 50
    reason: "政策/地缘占位：未向评分流程传入已校验的风险事件发生记录。"

position_change:
  minimum_action_delta: 0.05

position_gates:
  valuation:
    expensive_or_crowded_max_position: 0.70
    extreme_overheated_max_position: 0.40
  thesis:
    warning_max_position: 0.70
    failure_max_position: 0.00
  data_confidence:
    data_quality_warning_max_position: 0.80
    insufficient_data_max_position: 0.60
    placeholder_max_position: 0.80
