        command: aits sec-pit review-candidates --latest
        production_effect: none
      - task_id: ad_hoc_large_parameter_search
        title: Large parameter search
        command: aits feedback search-shadow-parameters
        production_effect: none
      - task_id: ad_hoc_cache_only_replay_window
        title: Cache-only replay window
        command: aits ops replay-window --mode cache-only
        production_effect: none
      - task_id: ad_hoc_dynamic_v3_rescue_data_audit
        title: Dynamic v3 rescue data audit
        command: aits etf dynamic-v3-rescue data-audit run --as-of {as_of} --end {as_of}
        date_gate: "Owner-selected manual research date range; never dispatched by daily-run."
        trigger_condition: "Run before any small_real, medium_real, or overnight_real real evaluator sweep."
        data_quality_gate: "Must pass the cached market/macro validation path equivalent to aits validate-data before downstream metrics are interpreted."
        manual_review_required: true
        production_effect: none
      - task_id: ad_hoc_dynamic_v3_rescue_profile_validate
        title: Dynamic v3 rescue profile validation
        command: aits etf dynamic-v3-rescue sweep profile-validate
        date_gate: "Owner-selected manual research date range; never dispatched by daily-run."
        trigger_condition: "Run before any profile-based sweep execution."
        data_quality_gate: "Config/profile validation is config-only; real evaluator execution still requires cached data quality PASS."
        manual_review_required: true
        production_effect: none
      - task_id: ad_hoc_dynamic_v3_rescue_small_real_sweep
        title: Dynamic v3 rescue small_real sweep
        command: aits etf dynamic-v3-rescue sweep run-profile --profile small_real --as-of {as_of} --end {as_of} --workers 1
        date_gate: "Owner-selected manual research date range; never dispatched by daily-run."
        trigger_condition: "Run only after data-audit and profile-validate PASS and when owner requests a small_real research smoke."
        data_quality_gate: "Real evaluator candidates must pass cached market/macro validation and link metrics to real evaluation artifacts."
        manual_review_required: true
        production_effect: none
      - task_id: ad_hoc_dynamic_v3_rescue_injection_audit
        title: Dynamic v3 rescue injection audit
        command: aits etf dynamic-v3-rescue injection-audit run --as-of {as_of} --end {as_of} --max-candidates {max_candidates}
        date_gate: "Owner-selected manual research date range; never dispatched by daily-run."
        trigger_condition: "Run after a real evaluator sweep to confirm parameter injection and candidate coverage."
        data_quality_gate: "Uses the same validated real evaluator artifact chain as the source sweep."
        manual_review_required: true
        production_effect: none
      - task_id: ad_hoc_dynamic_v3_rescue_candidate_attribution
        title: Dynamic v3 rescue candidate attribution
        command: aits etf dynamic-v3-rescue candidate attribution --sweep-id <sweep_id> --candidate-id <candidate_id>
        date_gate: "Owner-selected manual research artifact review; never dispatched by daily-run."
        trigger_condition: "Run only for a completed real evaluator candidate selected from the leaderboard."
        data_quality_gate: "Candidate metrics must come from linked real evaluation artifacts with disclosed data quality status."
        manual_review_required: true
        production_effect: none
      - task_id: ad_hoc_dynamic_v3_rescue_walk_forward_selection
        title: Dynamic v3 rescue walk-forward selection
