      - task_id: daily_dynamic_v3_rescue_schedule_observe
        daily_plan_step_id: dynamic_v3_rescue_schedule_observe
        title: Dynamic v3 rescue scheduled observation gate
        command: aits etf dynamic-v3-rescue schedule observe --as-of {as_of}
        command_contains:
          - etf
          - dynamic-v3-rescue
          - schedule
          - observe
        closed_market_behavior: run
        date_gate: "Daily scheduler may call only this lightweight gate; it self-skips unless the as-of date is the weekly last completed U.S. equity trading day."
        trigger_condition: "On due dates, run latest pointer validation, stale detection, and optional observe-only shadow monitor when registry candidates exist; never run parameter sweeps or promotion packs."
        data_quality_gate: "The daily validate_data step must have completed earlier in the same daily-run; real evaluator source artifacts must preserve their own cached data quality status."
        manual_review_required: true
        production_effect: none
        production_weight_write: false
        active_shadow_weight_write: false
        broker_action: false
      - task_id: daily_ops_health
        daily_plan_step_id: pipeline_health
        title: Run ops health
        command: aits ops health --as-of {as_of}
        command_contains:
          - ops
          - health
        closed_market_behavior: run_with_non_trading_day_flag
        production_effect: none
      - task_id: daily_secret_scan
        daily_plan_step_id: secret_hygiene
        title: Scan secrets
        command: aits security scan-secrets --as-of {as_of}
        command_contains:
          - security
          - scan-secrets
        closed_market_behavior: run
        production_effect: none
  weekly:
    description: Weekly governance and evidence refresh; registered but not part of daily-run.
    tasks:
      - task_id: weekly_backtest
        title: Backtest
        command: aits backtest --regime ai_after_chatgpt
        production_effect: none
      - task_id: weekly_backtest_robustness
        title: Backtest robustness
        command: aits backtest --regime ai_after_chatgpt --robustness-report
        production_effect: none
      - task_id: weekly_parameter_replay
        title: Parameter replay
        command: aits feedback build-parameter-replay --as-of {as_of}
        production_effect: none
      - task_id: weekly_parameter_candidates
        title: Parameter candidates
        command: aits feedback build-parameter-candidates --as-of {as_of}
        production_effect: none
      - task_id: weekly_parameter_governance
        title: Parameter governance
        command: aits feedback evaluate-parameter-governance --as-of {as_of}
        production_effect: none
      - task_id: weekly_weight_candidate_evaluation
        title: Weight candidate evaluation
        command: python scripts/run_weight_candidate_evaluation.py --date {as_of}
        production_effect: none
      - task_id: weekly_weight_promotion_gate
        title: Weight promotion gate
        command: python scripts/run_weight_promotion_gate.py --date {as_of}
        production_effect: none
      - task_id: weekly_research_governance_summary_review
        title: Research governance summary review
        command: aits reports research-governance-summary --latest
        production_effect: none
      - task_id: weekly_etf_forward_review
        title: ETF forward simulation weekly review
        command: aits etf forward weekly-review --latest
        production_effect: none
      - task_id: weekly_dynamic_v3_rescue_artifact_validate
        title: Dynamic v3 rescue artifact pointer validation
        command: aits etf dynamic-v3-rescue artifacts validate
        date_gate: "Weekly manual research review date; not run by daily-run."
        trigger_condition: "Run after latest dynamic v3 rescue research artifacts exist or before owner promotion review."
        data_quality_gate: "Reads existing artifacts only; source artifacts must disclose cached data quality status."
        manual_review_required: true
        production_effect: none
      - task_id: weekly_dynamic_v3_rescue_artifact_stale
        title: Dynamic v3 rescue artifact staleness review
        command: aits etf dynamic-v3-rescue artifacts stale --config config/etf_portfolio/dynamic_v3_rescue/parameter_sweep_v1.yaml
        date_gate: "Weekly manual research review date; not run by daily-run."
        trigger_condition: "Run after artifact pointer validation to flag stale latest sweep, leaderboard, robustness, shadow, and promotion evidence."
        data_quality_gate: "Reads existing artifacts only; source artifacts must disclose cached data quality status."
        manual_review_required: true
        production_effect: none
      - task_id: weekly_dynamic_v3_rescue_governance_validate
        title: Dynamic v3 rescue parameter governance validation
        command: aits etf dynamic-v3-rescue governance validate
        date_gate: "Weekly manual research review date; not run by daily-run."
        trigger_condition: "Run before interpreting any small_real, medium_real, or overnight_real parameter research result."
        data_quality_gate: "Governance validation is config-only; any real evaluator run still requires cached data quality PASS before metrics are interpreted."
        manual_review_required: true
        production_effect: none
      - task_id: weekly_dynamic_v3_rescue_research_index
        title: Dynamic v3 rescue research index refresh
        command: aits etf dynamic-v3-rescue research index-build
        date_gate: "Weekly manual research review date; not run by daily-run."
        trigger_condition: "Run after latest pointer validation and any completed manual research artifact chain."
        data_quality_gate: "Reads existing artifacts only; source artifacts must disclose cached data quality status."
        manual_review_required: true
        production_effect: none
      - task_id: weekly_dynamic_v3_rescue_shadow_monitor
        title: Dynamic v3 rescue shadow monitor observation
        command: aits etf dynamic-v3-rescue shadow monitor-run --as-of {as_of}
        date_gate: "Weekly manual research review date after the daily data quality gate for the as-of date has passed."
        trigger_condition: "Run only when observe-only dynamic v3 rescue shadow candidates are registered and artifact validation passes."
        data_quality_gate: "Must use the same cached market/macro validation path as aits validate-data for the as-of date before interpreting monitor output."
        manual_review_required: true
        production_effect: none
  biweekly:
    description: Biweekly manual review cadence; registered but not part of daily-run.
    tasks:
      - task_id: biweekly_investment_review
        title: Investment review
        command: aits reports investment-review --period weekly --as-of {as_of}
        production_effect: none
      - task_id: biweekly_feedback_loop_review
        title: Feedback loop review
        command: aits feedback loop-review --as-of {as_of}
        production_effect: none
      - task_id: biweekly_shadow_lane_review
        title: Shadow lane review
        command: python scripts/run_shadow_vs_production_multi_day_review.py --date {as_of}
        production_effect: none
      - task_id: biweekly_sec_pit_observe_only_review
        title: SEC PIT observe-only review
        command: aits sec-pit shadow-monitor --latest
        production_effect: none
      - task_id: biweekly_manual_thesis_review
        title: Manual thesis review
        command: aits thesis review --as-of {as_of}
        production_effect: none
      - task_id: biweekly_manual_risk_review
        title: Manual risk review
        command: aits risk-events validate-occurrences --as-of {as_of}
        production_effect: none
  monthly:
    description: Monthly audit cadence; registered but not part of daily-run.
    tasks:
      - task_id: monthly_documentation_contract_audit
        title: Documentation contract audit
        command: aits docs report-contract --as-of {as_of}
        production_effect: none
      - task_id: monthly_artifact_catalog_review
        title: Artifact catalog review
        command: manual review docs/artifact_catalog.md against latest report outputs
        production_effect: none
      - task_id: monthly_report_registry_audit
        title: Report registry audit
        command: aits reports index --as-of {as_of}
        production_effect: none
      - task_id: monthly_data_source_coverage_review
        title: Data source coverage review
        command: aits data-sources validate --as-of {as_of}
        production_effect: none
      - task_id: monthly_pit_coverage_review
        title: PIT coverage review
        command: aits backtest-pit-coverage --as-of {as_of}
        production_effect: none
      - task_id: monthly_long_window_backtest_review
        title: Long-window backtest review
        command: aits backtest --regime ai_after_chatgpt --to {as_of}
        production_effect: none
  ad_hoc_research:
    description: Manual or owner-approved research commands; never part of daily-run.
    tasks:
      - task_id: ad_hoc_sec_pit_historical_backfill
        title: SEC PIT historical backfill
        command: aits sec-pit backfill
