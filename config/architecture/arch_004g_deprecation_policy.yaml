schema_version: arch_004g_deprecation_policy.v1
policy_id: arch_004g_deprecation_policy_v1
owner: architecture_governance
version: 1.0.0
status: active_g0
policy_metadata:
  rationale: >
    ARCH-004 A-F established canonical contracts and reference paths while the
    real domain surfaces remain large and reachable. G requires explicit,
    evidence-backed migration and subtraction without permanent dual tracks.
  intended_effect: >
    Inventory each priority surface, freeze lifecycle and removal gates, then
    allow a surface to move toward removal only when all reachability,
    compatibility, reproducibility, safety, and owner gates pass.
  validation_evidence: >
    Deterministic inventory, lifecycle transition tests, drift checks,
    architecture fitness, compatibility parity, and full parallel validation.
  review_condition: >
    Review before changing a lifecycle, replacement, compatibility window,
    sunset condition, required removal gate, target scope, or safety boundary.
lifecycle:
  states: [EXPERIMENTAL, ACTIVE, DEPRECATED, FROZEN, REMOVED]
  allowed_transitions:
    EXPERIMENTAL: [ACTIVE]
    ACTIVE: [DEPRECATED]
    DEPRECATED: [FROZEN]
    FROZEN: [REMOVED]
    REMOVED: []
removal_policy:
  required_gate_ids:
    - replacement_resolved
    - usage_evidence_current
    - runtime_reachability_zero_or_facade
    - import_reachability_zero_or_facade
    - cli_reachability_zero_or_facade
    - report_registry_reachability_zero_or_facade
    - docs_tests_runbooks_migrated
    - historical_reproducibility_preserved
    - safety_contracts_preserved
    - compatibility_window_elapsed
    - sunset_condition_met
    - owner_signoff
  permanent_dual_track_allowed: false
  g0_runtime_removal_allowed: false
  artifact_retention_separate_from_code_removal: true
  unknown_reachability_is_removal_ready: false
targets:
  - surface_id: shared_direct_writer_calls
    lane: shared_platform
    scan_mode: repository_metric
    path: inputs/architecture/arch_004c_direct_writer_baseline.yaml
    owner: architecture_governance
    replacement: ai_trading_system.platform.artifacts
    replacement_status: PARTIAL
    lifecycle: ACTIVE
    migration_wave: G1
    compatibility_window: through_G1_parity
    sunset_condition: selected_helper_families_have_zero_legacy_callers
    usage_evidence_ref: inputs/architecture/arch_004e_architecture_fitness.yaml
    interpretation_sensitive: false
  - surface_id: etf_portfolio_cli_god_module
    lane: interfaces
    scan_mode: python_file
    path: src/ai_trading_system/cli_commands/etf_portfolio.py
    owner: interface_platform
    replacement: ai_trading_system.interfaces.cli.etf_portfolio
    replacement_status: PLANNED_NOT_CUT_OVER
    lifecycle: ACTIVE
    migration_wave: G2
    compatibility_window: command_parity_plus_two_daily_fixtures
    sunset_condition: root_module_is_thin_registration_facade
