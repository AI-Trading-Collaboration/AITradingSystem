schema_version: arch_004_research_semantic_glossary.v2
glossary_id: arch_004_research_semantic_glossary_v2
status: owner_approved_active
owner: project_owner_and_research_governance
effective_date: 2026-07-21
supersedes: config/architecture/research_semantic_glossary.yaml
policy_metadata:
  rationale: >
    The owner unified the active project regime and the validated three-asset
    primary research start at 2021-02-22. The former 2022-12-01 boundary remains
    useful only as a named historical ChatGPT-cycle comparison and must not supply
    an active default, lower bound, or primary conclusion.
  intended_effect: >
    Make active regime, research window, historical comparison, requested range,
    actual range, effective coverage and information cutoff mechanically distinct.
  validation_evidence:
    - config/market_regimes.yaml
    - config/research/primary_research_window_policy.yaml
    - config/research/research_window_registry.yaml
    - docs/requirements/TRADING-2452_Unified_2021_Primary_Window_and_Clean_Run.md
  review_condition: >
    Owner review is required before changing a canonical term, primary date,
    evidence role, prospective-holdout boundary or conflict behavior.

canonical_terms:
  anchor_event_date:
    type: date
    canonical_value: 2021-02-22
    meaning: First date of validated common QQQ/SGOV/TQQQ history used by active research.
    not_equivalent_to: [requested_start, actual_start, point_in_time_cutoff]
  market_regime:
    type: governed_identifier
    canonical_value: unified_primary_2021
    meaning: Active project-level interpretation regime for new strategy research.
    source: config/market_regimes.yaml
    required_companion_fields: [market_regime_start, research_window_id]
  market_regime_start:
    type: date
    canonical_value: 2021-02-22
    meaning: Active default strategy-research and primary-conclusion start.
    source: config/market_regimes.yaml
    forbidden_interpretations: [universal_data_start, point_in_time_cutoff]
  primary_research_window_id:
    type: governed_identifier
    canonical_value: exact_three_asset_validated
    scope:
      assets: [QQQ, SGOV, TQQQ]
      research_lines: [first_layer, second_layer, actual_path, main_leaderboard, owner_review]
    source: config/research/primary_research_window_policy.yaml
    not_global_for_unrelated_asset_families: true
  primary_research_window_start:
    type: date
    canonical_value: 2021-02-22
    scope_ref: primary_research_window_id
    meaning: Governed primary validated start for the scoped research lines.
    forbidden_interpretations: [universal_data_start, promotion_approval]
  legacy_comparison_window_id:
    type: governed_identifier
    canonical_value: legacy_research_window_2022_12
    market_regime_id: ai_after_chatgpt
    anchor_event_date: 2022-11-30
    start: 2022-12-01
    evidence_role: LEGACY_COMPARISON_EVIDENCE
    primary_owner_decision_evidence_allowed: false
    active_default_allowed: false
  sensitivity_window_id:
    type: governed_identifier
    canonical_value: exact_three_asset_primary_only_extension
    start: 2020-05-28
    evidence_role: SENSITIVITY_EVIDENCE_WITH_CAVEAT
    required_caveat: sgov_secondary_gap_2020_05_28_to_2021_02_19
  requested_date_range:
    type: interval
    fields: [requested_start, requested_end]
    meaning: Date interval explicitly requested by a command, user or workflow.
    may_differ_from: [actual_date_range, effective_coverage]
  actual_date_range:
    type: interval
    fields: [actual_start, actual_end]
    meaning: Date interval actually evaluated after common-tradable and validation constraints.
    must_not_be_inferred_from_requested_range: true
  effective_coverage:
    type: per_input_interval_map
    meaning: Actual usable coverage for each required input after PIT and quality gates.
    aggregate_only_allowed_when_component_coverage_is_linked: true
  point_in_time_cutoff:
    type: timestamp_or_date
    canonical_field: as_of
    meaning: Latest information time visible to the evaluation.
    required_related_fields: [available_at, observed_at, valid_until]
  data_quality_as_of:
    type: date
    meaning: Date for which the data-quality result is valid.
  generated_at:
    type: timestamp
    meaning: Artifact serialization time; it carries no market-information visibility meaning.
  conclusion_window:
    type: governed_evidence_scope
    required_fields:
      - conclusion_window_id
      - evidence_role
      - requested_date_range
      - actual_date_range
      - effective_coverage

resolution_rules:
  precedence:
    - explicit_workflow_or_cli_value
    - governed_domain_profile
    - governed_project_default_when_term_scope_matches
  no_match_behavior: FAIL_CLOSED
  conflict_behavior: FAIL_CLOSED
  implicit_date_aliasing_allowed: false
  one_field_multiple_term_meanings_allowed: false
  derived_value_requires_lineage: true

reporting_contract:
  required_context_fields:
    - market_regime
    - market_regime_start
    - research_window_id
    - requested_date_range
    - actual_date_range
    - effective_coverage
    - as_of
    - data_quality_status
    - policy_refs
  generated_at_may_substitute_as_of: false
  market_regime_start_may_substitute_research_window_start: false
  missing_required_context_behavior: BLOCKED

implementation_boundary:
  runtime_enforcement_implemented: true
  runtime_enforcement_scope:
    - new_investment_facing_artifacts
    - active_default_resolution
  existing_artifact_migration_status: VERSIONED_ACTIVE_MIGRATION
  context_schema_version: research_evaluation_context.v1
  historical_v1_rewrite_allowed: false
  strategy_logic_changed: false
  threshold_changed: false
  production_effect: none
  promotion_allowed: false
  paper_shadow_allowed: false
  production_allowed: false
  broker_action: none
