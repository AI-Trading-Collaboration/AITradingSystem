    layer: contracts
    category: semantic_and_platform_contracts
    public_contract: true
    test_globs: [tests/test_arch_004*.py, tests/test_core_contracts.py]
    validation_tiers: [architecture-fitness, contract-validation]
  - rule_id: core
    path_prefix: src/ai_trading_system/core/
    owner_profile: platform
    layer: core
    category: shared_runtime_primitives
    public_contract: true
    test_globs: [tests/test_core_contracts.py]
    validation_tiers: [architecture-fitness, fast-unit]
  - rule_id: platform
    path_prefix: src/ai_trading_system/platform/
    owner_profile: platform
