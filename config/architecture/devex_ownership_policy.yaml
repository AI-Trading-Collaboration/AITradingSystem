schema_version: arch_004e_devex_ownership_policy.v1
policy_id: arch_004e_devex_ownership_policy
status: active_phase_e
owner: architecture_governance
policy_metadata:
  rationale: >
    Give every source and test file one effective ownership/classification rule,
    make changed-file test selection deterministic, and keep shared integration
    files under coordinator control while generated fragments mature.
  intended_effect: >
    Eliminate orphan/overlapping ownership, expose focused validation impact,
    and prevent parallel workers from editing root aggregates directly.
  validation_evidence: >
    ARCH-004E manifest, impact-selection, scaffold, aggregate reproducibility,
    architecture-fitness, validation-tier, documentation and full-suite tests.
  review_condition: >
    Review when adding a top-level package/test family, owner profile, shared
    aggregate, validation tier, scaffold kind, or deprecation state.

owner_profiles:
  architecture:
    code_owner: architecture_governance
    policy_owner: architecture_governance
    data_owner: data_governance
    artifact_owner: architecture_governance
    runtime_owner: architecture_governance
  platform:
    code_owner: platform_engineering
    policy_owner: architecture_governance
    data_owner: data_governance
    artifact_owner: platform_io
    runtime_owner: platform_operations
  research:
    code_owner: research_platform
    policy_owner: research_governance
    data_owner: research_data_governance
    artifact_owner: research_governance
    runtime_owner: research_operations
  reporting:
    code_owner: reporting_platform
    policy_owner: reporting_governance
    data_owner: data_governance
    artifact_owner: reporting_governance
    runtime_owner: reporting_operations
  data:
    code_owner: data_platform
    policy_owner: data_governance
    data_owner: data_governance
    artifact_owner: data_governance
    runtime_owner: data_operations
  trading:
    code_owner: trading_runtime
    policy_owner: trading_governance
    data_owner: trading_data_governance
    artifact_owner: trading_audit
    runtime_owner: trading_operations
  portfolio:
