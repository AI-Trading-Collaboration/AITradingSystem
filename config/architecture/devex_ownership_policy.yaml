    fallback: true
    path_prefix: src/ai_trading_system/
    owner_profile: general
    layer: legacy_monolith
    category: root_module_migration_debt
    public_contract: false
    deprecation_status: migrate_by_arch_004g_lane
    test_globs: [tests/test_*.py]
    validation_tiers: [fast-unit]

test_rules:
  - rule_id: architecture_tests
    path_prefix: tests/test_arch_004
    owner_profile: quality
    category: architecture
    suite: architecture-fitness
    covered_module_prefixes: [src/ai_trading_system/contracts/, src/ai_trading_system/platform/, src/ai_trading_system/research_framework/]
  - rule_id: architecture_control_tests
    exact_paths:
      - tests/test_documentation_contract.py
      - tests/test_docs_freshness.py
      - tests/test_task_register_consistency.py
      - tests/test_validation_tier_script.py
      - tests/test_engineering_closeout.py
    owner_profile: quality
    category: architecture
    suite: architecture-fitness
    covered_module_prefixes: [docs/, config/architecture/, scripts/]
  - rule_id: trading_engine_tests
    path_prefix: tests/trading_engine/
    owner_profile: quality
    category: trading_engine
    suite: integration
    covered_module_prefixes: [src/ai_trading_system/trading_engine/]
  - rule_id: research_strategy_tests
    path_prefix: tests/research_strategies/
    owner_profile: quality
    category: research_strategy
    suite: slow-research-regression
    covered_module_prefixes: [src/ai_trading_system/research_quality/, src/ai_trading_system/research_framework/]
  - rule_id: research_trend_tests
    path_prefix: tests/research_trends/
    owner_profile: quality
    category: research_trend
    suite: slow-research-regression
    covered_module_prefixes: [src/ai_trading_system/]
  - rule_id: research_quality_tests
    path_prefix: tests/research_quality/
    owner_profile: quality
    category: research_quality
    suite: contract-validation
    covered_module_prefixes: [src/ai_trading_system/research_quality/]
  - rule_id: root_tests_fallback
    fallback: true
    path_prefix: tests/
    owner_profile: quality
    category: unit_or_support
    suite: full
    covered_module_prefixes: [src/ai_trading_system/]

change_rules:
  - rule_id: architecture_config
    path_prefix: config/architecture/
    owner_profile: architecture
    test_globs: [tests/test_arch_004*.py, tests/test_engineering_closeout.py]
    validation_tiers: [architecture-fitness, contract-validation]
  - rule_id: research_config
    path_prefix: config/research/
    owner_profile: research
    test_globs: [tests/research_strategies/test_*.py, tests/test_research*.py]
    validation_tiers: [architecture-fitness, contract-validation]
  - rule_id: scripts
    path_prefix: scripts/
    owner_profile: platform
    test_globs: [tests/test_validation_tier_script.py, tests/test_arch_004e_*.py]
    validation_tiers: [architecture-fitness, fast-unit]
  - rule_id: documentation
    path_prefix: docs/
    owner_profile: reporting
    test_globs: [tests/test_documentation_contract.py, tests/test_docs_freshness.py, tests/test_task_register_consistency.py]
    validation_tiers: [architecture-fitness, contract-validation]
  - rule_id: config_fallback
    path_prefix: config/
    owner_profile: general
    test_globs: [tests/test_config.py, tests/test_documentation_contract.py]
    validation_tiers: [fast-unit, contract-validation]
  - rule_id: unknown_fallback
    fallback: true
    path_prefix: ""
    owner_profile: architecture
    test_globs: [tests/test_arch_004e_*.py]
    validation_tiers: [architecture-fitness, full]

shared_integration_paths:
  - src/ai_trading_system/cli.py
  - config/report_registry.yaml
  - docs/artifact_catalog.md
  - docs/system_flow.md
  - docs/task_register.md
  - config/architecture/arch_004_refactor_policy.yaml
  - inputs/architecture/arch_004_compatibility_baseline.yaml

aggregate_targets:
  - target_id: report_registry
    current_path: config/report_registry.yaml
    fragment_root: config/architecture/fragments/reports
  - target_id: artifact_catalog
    current_path: docs/artifact_catalog.md
    fragment_root: config/architecture/fragments/artifacts
  - target_id: system_flow
    current_path: docs/system_flow.md
    fragment_root: config/architecture/fragments/flows

generated_outputs:
  module_manifest: inputs/architecture/arch_004e_module_manifest.yaml
  test_manifest: inputs/architecture/arch_004e_test_manifest.yaml
  aggregate_shadow_index: inputs/architecture/arch_004e_aggregate_shadow_index.yaml
  architecture_fitness: inputs/architecture/arch_004e_architecture_fitness.yaml

safety_boundary:
  production_effect: none
  impact_selection_replaces_full_gate: false
  scaffold_edits_shared_aggregate: false
  existing_aggregate_source_of_truth_changed: false
