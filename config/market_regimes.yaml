default_backtest_regime: unified_primary_2021
regimes:
  - regime_id: unified_primary_2021
    name: 统一 AI 研究主窗口
    start_date: 2021-02-22
    anchor_date: 2021-02-22
    anchor_event: QQQ/SGOV/TQQQ exact-three-asset validated coverage begins
    description: >
      项目后续活跃策略研究、主回测和主要结论的默认窗口。该窗口由三资产
      可验证共同覆盖定义，不以单一市场事件作为起点。
    primary: true
  - regime_id: ai_after_chatgpt
    name: ChatGPT 后 AI 主线行情（历史比较）
    start_date: 2022-12-01
    anchor_date: 2022-11-30
    anchor_event: ChatGPT 公开发布
    description: >
      历史比较窗口，仅用于解释旧 run 和 immutable evidence；不再是 active default、
      primary conclusion boundary、required comparator 或 minimum allowed start。
    primary: false
  - regime_id: ai_infra_acceleration
    name: AI 基建加速行情
    start_date: 2023-05-25
    anchor_date: 2023-05-24
    anchor_event: NVDA FY2024 Q1 业绩后数据中心指引显著上修
    description: >
      更严格聚焦 AI 基建重新定价后的行情阶段，可用于验证 GPU、HBM、
      先进封装、晶圆代工等链条的加速交易表现。
    primary: false
  - regime_id: cross_cycle_stress
    name: 跨周期压力测试
    start_date: 2019-01-01
    anchor_date: 2018-01-01
    anchor_event: 使用 2018 年历史作为长均线和 VIX 分位 warm-up
    description: >
      非默认解释区间，用于覆盖疫情、加息、风险偏好收缩等不同市场状态。
      该阶段可用于压力测试，但不应作为 AI 主线行情的默认结论窗口。
    primary: false
