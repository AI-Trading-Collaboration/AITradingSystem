    text: '`daily-run` 执行 `aits ...` 子命令时若项目 `.venv` Python 存在，必须使用该解释器调用 direct dispatcher；找不到时才回退当前
      `sys.executable`；子命令必须强制使用稳定 Python env、每次运行唯一 `PYTHONPYCACHEPREFIX`，并在启动前清理源码
      `__pycache__`；PIT 等轻量子命令不得因无关 valuation pydantic class construction 或 Typer
      全局 command tree annotation 解析崩溃；报告仍展示逻辑命令，主报告/metadata 不记录 secret 或未脱敏 stdout/stderr
      原文；失败步骤必须写入脱敏 stdout/stderr 诊断 artifact 并在执行报告/metadata 暴露路径；真实 daily-run 必须完成最新交易日链路或报告新的真实门禁原因'
