    text: '`aits ops daily-plan` 与 `aits ops daily-run` 必须识别非交易日并在报告中声明 market session、休市原因和上一交易日；当上一交易日价格缓存已覆盖时不得用休市日作为
      `download-data --end`；休市日不得生成新的 `daily_score`、decision snapshot、执行动作或 score-derived
      alerts；仍可运行官方政策来源、PIT、SEC、valuation、ops health 和 secret scan，且 health 不得把缺少休市日日报当作失败；系统流图、README、测试和需求文档同步更新'
