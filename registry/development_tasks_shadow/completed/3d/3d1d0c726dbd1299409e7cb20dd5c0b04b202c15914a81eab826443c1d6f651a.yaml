    - '2026-05-12: 新增并进入 IN_PROGRESS，原因：owner 明确所有外部供应商接口存在调用次数限制，要求所有向外请求的数据都必须 cache，且相同请求不得重复发送。2026-05-12:
      从 IN_PROGRESS 改为 VALIDATING，原因：新增 `external_request_cache` 并接入主要外部供应商路径；目标测试
      123 passed，`ruff check src tests` 和 `git diff --check` 通过，仍需真实 daily-run 观察。2026-05-13:
      从 VALIDATING 改回 IN_PROGRESS，原因：真实 daily-run 两次在 `download_data` 阻断，cache metadata
      显示 FMP/Cboe/FRED 已有 200 响应但无 Marketstack metadata；需要增强 Marketstack/download-data
      失败诊断，避免只看到 stderr 行数。2026-05-13: 从 IN_PROGRESS 改为 VALIDATING，原因：Marketstack
      provider 已在 HTTP 前、HTTP status、provider error、JSON/schema 和 normalization 阶段抛出结构化诊断；`aits
      download-data` 失败时写入脱敏 `download_data_diagnostics_YYYY-MM-DD.md`；daily-run 计划列出该报告；ruff、目标
      pytest 和 `git diff --check` 通过。2026-05-13: 从 VALIDATING 改回 IN_PROGRESS，原因：增强后真实
      daily-run 诊断把阻断定位到 FRED response 前 `ReadTimeout`，但 FRED provider 尚未提供 series_id/cache/stage
      结构化诊断，仍需补齐后再重跑确认。2026-05-13: 从 IN_PROGRESS 改为 VALIDATING，原因：FRED provider 已在
      HTTP 前、HTTP status、CSV parse 和 schema 阶段输出结构化诊断，包含 series id、cache key 和预期 metadata
      path；ruff、目标 pytest 35 passed 和 `git diff --check` 通过。2026-05-13: live daily-run
      验证确认当前阻断为 FRED `DGS10` 请求 `ReadTimeout`，stage=`http_request`，cache_status=`MISS_NO_RESPONSE`，DGS2
      同范围已有 cache 200；下游按 fail-closed 未执行。2026-05-13: 实现 FRED 无响应超时韧性：timeout_seconds=60、max_attempts=2、retry_backoff_seconds=3，仅对未获得
      HTTP response 的网络异常上重试；诊断报告新增 attempt_count、max_attempts 和 timeout_seconds。2026-05-13:
      修复后真实 `daily-run` 先越过 `download_data`、PIT、SEC 和 valuation，最终复跑 `daily_ops_run:2026-05-11:20260512T170255Z`
      11/11 步 PASS；外部请求 cache metadata 覆盖 FMP、Marketstack、Cboe、FRED、SEC、TSMC IR 和
      official policy。2026-06-04: 从 VALIDATING 改回 IN_PROGRESS，原因：`daily_ops_run:2026-06-03:20260603T223206Z`
      和重跑 `20260603T223626Z` 均在 `download_data` fail closed；诊断定位 FRED `DGS2` exact
      full-window 请求 response 前 `ReadTimeout`，curl exact URL 约 60 秒后返回 HTTP 504，但
      `DGS2 2026-06-02..2026-06-03`、`DGS10 2026-06-01..2026-06-03` 和 `DTWEXBGS 2026-05-29..2026-06-03`
      tail windows 可快速返回真实 FRED CSV；需要实现 FRED tail refresh 合并，避免因 as_of 当日尚未发布观测而每天重拉全量窗口。2026-06-04:
      从 IN_PROGRESS 改为 VALIDATING，原因：`FredRateProvider` 已改为先查同 series/start 最近 2xx
      request cache，解析最近有效观测日，再请求 `latest_observation_date..as_of` tail window 并合并去重；非
      2xx cache 不作为 seed；验证通过目标 pytest/ruff/black/diff check、真实 `download-data --start
      2018-01-01 --end 2026-06-03`、`validate-data --as-of 2026-06-03` PASS，以及 `daily_ops_run:2026-06-03:20260604T011839Z`
      31/31 PASS。2026-06-09: 从 VALIDATING 改为 DONE，原因：当前 metadata 覆盖 Cboe 14、FRED 57、FMP
      1090、Marketstack 963、official policy 80、SEC 31、TSMC IR 2、Yahoo 1，OpenAI agent
      request cache 本地文件数 514；市场/宏观、估值/PIT、SEC/TSMC IR、官方政策和 OpenAI request cache
      focused tests 共 117 passed，相关 ruff、Black check、compileall 和 `validate-data --as-of
      2026-06-05` PASS；同步 Black 格式化 `tests/test_market_data.py` 中 Cboe VIX cache 测试字面量，不改变行为。'
