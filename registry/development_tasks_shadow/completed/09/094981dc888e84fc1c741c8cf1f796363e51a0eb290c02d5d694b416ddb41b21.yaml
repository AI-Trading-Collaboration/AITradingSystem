    - '2026-05-10: 新增并进入实现，原因：owner 指出该项理论上可把日报置信度从 61 提升到约 76；实现必须可审计，不允许静默忽略。2026-05-10:
      从 IN_PROGRESS 改为 VALIDATING，原因：新增 INFO severity、指数 volume/拆股/Marketstack 自身坏点/adjusted
      close 口径差异 reconciliation CSV；真实 `validate-data --as-of 2026-05-10` 为 PASS，错误
      0、警告 0、信息 11。2026-05-11: 从 VALIDATING 改回 IN_PROGRESS，原因：expanded universe 真实价格刷新后，`NOW`
      官方 5-for-1 split 导致 Marketstack 在拆股窗口提前按 split-adjusted raw close 记录 2025-12-17，当前规则仍按未解释
      raw close mismatch 阻断，需要补 corporate-action window 归因。2026-05-11: 从 IN_PROGRESS
      改为 VALIDATING，原因：已补 `NOW` 官方 5-for-1 split 配置和 `known_split_raw_close_basis_difference`
      reconciliation 分类；`validate-data --as-of 2026-05-10 --full-universe` 与 replay
      内 `data_quality_2026-05-08` 均为 PASS，错误 0、警告 0。2026-06-07: 继续保持 VALIDATING，原因：最新真实
      `daily-run --as-of 2026-06-05` 的数据质量门禁 PASS、错误 0、警告 0，但本轮 reconciliation CSV
      未覆盖 NOW/full-universe 拆股窗口证据；不能仅凭有限 reconciliation 样本归档。2026-06-09: 从 VALIDATING
      改为 IN_PROGRESS 后收口，原因：直接复跑 `validate-data --as-of 2026-06-05 --full-universe`
      首次暴露默认 core cache 缺 ASX，正确路径是 full-universe 刷新而非降级缺口；先在 `outputs/tmp/data_full_universe_20260605`
      跑 `download-data --start 2018-01-01 --end 2026-06-05 --full-universe` 和临时 `validate-data`
      确认 PASS，再刷新正式 `data/raw` cache。2026-06-09: 从 IN_PROGRESS 改为 DONE，原因：正式 `validate-data
      --as-of 2026-06-05 --full-universe` 为 PASS、错误 0、警告 0、信息 12；报告覆盖 SPY/QQQ/SMH/SOXX/TLT/SHY/^VIX/MSFT/GOOG/TSM/INTC/AMD/NVDA/AMZN/META/AVGO/MRVL/ASML/AMAT/LRCX/MU/PLTR/CRM/NOW/ASX；Marketstack
      reconciliation CSV 记录 `known_split_raw_close_basis_difference=1`（NOW 2025-12-17，primary_close
      782.4，secondary_close 156.478，close_diff_pct 0.8000025562372188）、`marketstack_bad_point_primary_available=26`、`adjusted_close_dividend_basis_difference=9349`；同时修正
      `validate-data` manifest provenance 判定，使历史 reconstructed manifest 行不会在当前 checksum
      已有更新 provider 记录时污染当前数据质量状态，保留当前 checksum 为 reconstructed 时的 warning。'
