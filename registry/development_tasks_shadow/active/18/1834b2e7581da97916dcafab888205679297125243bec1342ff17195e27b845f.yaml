  acceptance_criteria:
  - criterion_id: legacy_markdown
    text: '`aits download-data` / daily scheduler 在已有 cache 覆盖到上一交易日时只请求下一美股交易日起的尾部缺口，不因
      `start=2018-01-01` 非交易日、周末/节假日 tail gap 或 ticker 上市前自然缺口生成全历史/多自然日窗口；Marketstack
      quota 预估不足时默认 fail closed，只有 `config/data_source_request_budget_policy.yaml`
      允许的单窗口、单日、estimated usage <= 50 且 projected shortfall <= quota_limit 10% 情况可标记
      `OWNER_APPROVED_SMALL_DAILY_OVERAGE` 并继续；当 cache 已覆盖请求结束日、`estimated_increment_usage=0`
      且不会发起 live request 时，命令必须输出可审计 cache-only/no-live-request request-budget 状态并继续进入
      `aits validate-data`；下游 manifest/report 显示 data-quality status、request budget、cache
      hit/miss；FMP/Marketstack reconciliation 不被静默关闭；focused parallel pytest、Ruff、compileall、`git
      diff --check`、真实 no-live-request rerun 和真实 2026-06-29 tail refresh + daily-run
      复验通过；后续 Marketstack quota 恢复、套餐/供应商政策变更、projected overage 超过 10% 或单日估算超过上限时必须移除/收紧临时批准。'
