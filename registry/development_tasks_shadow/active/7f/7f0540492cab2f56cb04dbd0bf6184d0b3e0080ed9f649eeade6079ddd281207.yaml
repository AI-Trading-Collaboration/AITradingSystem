    - '2026-05-05: 新增并进入实现，原因：owner 要求先用 OpenAI key 做政策/地缘预审，并加入日报前自动流程；同时明确默认不把正常无关结果加入人工确认输入。2026-05-05:
      从 IN_PROGRESS 改为 BASELINE_DONE，原因：新增官方候选批量 OpenAI 预审、`score-daily --risk-event-openai-precheck`
      前置流程、README、系统流图和测试；`ruff check src tests` 通过，`pytest -q` 362 passed。2026-05-05:
      owner 确认默认 OpenAI 响应可能超过 60 秒，已将默认请求读超时调为 600 秒并开放 CLI 参数；单候选真实 smoke 等待约 408
      秒后收到 OpenAI HTTP 502，按 fail-closed 未写队列。2026-05-05: `gpt-5.5` 单候选 smoke 可收到正常响应；同步修正
      irrelevant/none 但带 risk_id 的输出不入人工队列。2026-05-05: owner 决策后续默认使用 `gpt-5.5`，不再默认使用较不稳定的
      `gpt-5.5-pro`；代码常量、README、系统流图、数据源目录和示例已同步；不带 `--openai-model` 的单候选日报前预审 smoke
      约 96 秒完成，预审 PASS_WITH_WARNINGS，待复核队列 0，日报 PASS_WITH_LIMITATIONS。2026-05-05:
      owner 决策把 OpenAI 默认配置改为 `gpt-5.5` + `reasoning.effort=high` + 120 秒读超时；`score-daily`
      默认启用日报前预审，候选排序改为 AI 政策/出口管制优先，日报正文新增预审摘要。2026-05-05: 默认 20 条真实样本已执行，官方来源抓取 PASS、8
      个 payload、402 条候选；OpenAI 预审上限 20 条，LLM claim 数 23，HTTP 502 错误 1、警告 13，按 fail
      closed 未写新队列，日报评分未继续。2026-05-05: owner 批准单个 OpenAI 请求失败时重试 2 次；第 3 次仍失败则整批 fail
      closed，不做断点续跑或部分成功入队。2026-05-05: 已实现并验证请求级重试和批量失败停止；`ruff check src tests`、目标测试
      42 passed、完整 `pytest -q` 366 passed；默认 20 条真实样本官方抓取 PASS，OpenAI 预审在单请求 3 次尝试后仍失败，报告
      FAIL、LLM claim 16、错误 1、警告 7，未写新队列，日报未继续。'
