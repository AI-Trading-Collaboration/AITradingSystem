  acceptance_criteria:
  - criterion_id: legacy_markdown
    text: '`score-daily` 默认在风险事件发生记录校验前抓取官方来源并调用 OpenAI Responses API，可用 `--skip-risk-event-openai-precheck`
      跳过；默认最多处理 20 条官方候选，OpenAI 默认模型 `gpt-5.5`、`reasoning.effort=high`、读超时 120 秒；单个
      OpenAI 请求失败时重试该请求 2 次，仍失败则整批 fail closed；输出官方抓取报告、OpenAI 预审报告和 `risk_event_prereview_queue.json`；缺
      `OPENAI_API_KEY`、官方来源抓取失败、provider LLM 权限失败或 OpenAI 请求最终失败时停止日报评分；无候选或 irrelevant
      结果不增加人工队列；预审输出仍为 `llm_extracted / pending_review`，不得写 occurrence、复核声明、评分、仓位闸门或
      thesis 状态；完整 `DONE` 仍需 owner 人工复核纪律'
