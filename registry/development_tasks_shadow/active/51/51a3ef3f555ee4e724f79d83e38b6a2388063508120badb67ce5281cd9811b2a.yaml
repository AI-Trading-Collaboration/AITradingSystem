  acceptance_criteria:
  - criterion_id: legacy_markdown
    text: '`config/etf_portfolio/dynamic_shadow.yaml` 存在且 safety fields mandatory；`aits
      etf dynamic-shadow package --latest --top N`、`approve --package <path> --candidate
      <candidate_id>`、`enroll-approved --latest`、`update`、`weekly-review` 和 `validate`
      可运行；dynamic candidate enrollment 必须要求 dynamic calibration validation、dynamic
      robustness validation、data quality gate、ops validation、owner approval、`production_effect=none`、`broker_action=none`；未批准或前置
      gate 缺失的 candidate 不得 enroll；forward tracking records 包含 dynamic_candidate_return、static_base_return、current_baseline_return、QQQ_return、SPY_return、SMH_return、excess_vs_static、excess_vs_baseline、drawdown、turnover、regime_switch_count、false_signal_count、constraint_hit_count；weekly
      review 展示 active_shadow / needs_more_data / watch / reject_pending_review /
