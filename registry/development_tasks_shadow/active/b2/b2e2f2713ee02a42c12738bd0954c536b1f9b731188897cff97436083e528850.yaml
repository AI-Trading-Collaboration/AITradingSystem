      reporting/pilot/diagnostic/promotion floor；当前 2026-05-12 outcome、因果链、学习队列、规则实验、shadow
      maturity 和优化报告均已跑通，readiness=`PILOT_DIAGNOSTIC_REVIEW`。2026-05-13: 2026-05-11
      严格 outcome 刷新因价格缓存包含 2026-05-12 被数据质量门禁阻断；未绕过门禁，后续如需历史 as_of 刷新应补 replay-scoped
      feedback calibration 输入。2026-05-13: 从 VALIDATING 改回 IN_PROGRESS，原因：owner 要求推进整个复盘迭代闭环，当前缺少把参数候选复测收益变化纳入
      feedback 报告的功能。2026-05-13: 从 IN_PROGRESS 改为 VALIDATING，原因：新增 `aits feedback
      build-parameter-replay`、`parameter_replay_YYYY-MM-DD.md/json`、`optimize-market-feedback`
      参数 replay 汇总、系统流图/runbook/README 和测试；真实 smoke 已从最新 robustness summary 生成参数 replay
      报告，因来源 summary 较旧仍披露 module_weight_perturbation 缺口。2026-05-13: 从 VALIDATING
      改回 IN_PROGRESS，原因：owner 明确要求继续推进到当前数据可测试跑通、并能持续迭代的回测调参闭环。2026-05-13: 从 IN_PROGRESS
      改为 VALIDATING，原因：新增 `aits feedback build-parameter-candidates`、`data/processed/parameter_candidates.json`
      和 `parameter_candidates_YYYY-MM-DD.md`；当前数据已跑通 `parameter replay -> candidate
      ledger -> optimize-market-feedback` 烟测，报告汇总 3 个 trial / 3 个 candidate，因 materiality
      policy 缺失仍保持 `PASS_WITH_LIMITATIONS` 且不进入 production。2026-05-13: 从 VALIDATING
      改回 IN_PROGRESS，原因：owner 要求继续排查 materiality policy 阻塞并保证闭环跑通。2026-05-13: 从 IN_PROGRESS
      改为 VALIDATING，原因：`build-parameter-replay` 已对旧 robustness summary 缺 policy 的情况读取当前
      `config/backtest_validation_policy.yaml` 并披露 limitation；当前闭环 smoke 显示 Needs
      materiality policy=0、1 个正向 owner review、1 个负向 risk review、1 个 observe-only，仍保持
      production_effect=none。2026-05-13: 从 VALIDATING 改回 IN_PROGRESS，原因：owner 要求处理所有阻塞点，确保从头开始的回测调参闭环完整跑通；当前阻塞集中在最新
      `backtest --robustness-report` 超时且不落盘。2026-05-13: 从 IN_PROGRESS 改为 VALIDATING，原因：robustness
      派生场景已复用基础回测已审计行，默认全窗口 `backtest --robustness-report --to 2026-05-12 --quality-as-of
      2026-05-13` 已完成并写出带 as-run policy 的 summary；随后 parameter replay/candidates/overview
      默认链路均跑通，replay/candidate 为 PASS，overview 为 PASS_WITH_LIMITATIONS（受 outcome/shadow/overlay
      样本限制）。2026-05-14: 从 VALIDATING 改回 IN_PROGRESS，原因：owner 认为长期维护“跑一次后复用基础行派生指标”会影响回测正确性，要求不要维护两套计算逻辑；本轮改为缓存
      PIT feature/report 上下文，但权重扰动、成本压力和窗口切分等调参场景必须继续调用同一评分/回测执行路径。2026-05-14: 从 IN_PROGRESS
      改为 VALIDATING，原因：`backtest` 已拆出 prepared PIT context，非 lag 调参场景复用缓存输入但仍重走同一
