      parameter replay/candidates/overview 均读取新产物跑通。验证通过 `ruff check src tests`、目标
      pytest 32 passed、全量 pytest 513 passed、`git diff --check`。2026-05-14: 从 VALIDATING
      改回 IN_PROGRESS，原因：外部方案复核确认当前短板是 effective weights 未成为评分/回测单一入口，以及 parameter
